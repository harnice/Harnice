<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harnice Network Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#111214;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:#18191c;border-bottom:1px solid #2a2b30;flex-shrink:0}
#topbar h1{font-size:13px;color:#9a9ba0;font-weight:normal;margin-right:8px;letter-spacing:.04em}
#part-rev{font-size:11px;color:#555}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:5px 16px;border-radius:5px 5px 0 0;cursor:pointer;font-size:12px;background:#1e1f23;border:1px solid #2a2b30;border-bottom:none;color:#666;transition:background .15s,color .15s}
.tab.active{background:#111214;color:#d4a017;border-color:#3a3b40;border-bottom-color:#111214}
.tab:hover:not(.active){background:#25262a;color:#aaa}
#main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;overflow:hidden}
.panel.active{display:flex}
.sidebar{width:260px;min-width:260px;background:#18191c;border-right:1px solid #2a2b30;display:flex;flex-direction:column;gap:8px;padding:10px;overflow-y:auto}
.section{background:#1e1f23;border-radius:6px;padding:9px;border:1px solid #2a2b30}
.section h2{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px}
button{background:#25262a;color:#bbb;border:1px solid #2e2f34;border-radius:4px;padding:5px 9px;cursor:pointer;font-size:12px;width:100%;margin-top:4px;transition:background .12s,border-color .12s,color .12s}
button:hover{background:#2d2e33;border-color:#444;color:#eee}
button.active-tool{background:#2a2200;border:1px solid #d4a017;color:#d4a017}
button.danger{background:#1e1010;border-color:#5a2020;color:#c06060}
button.danger:hover{background:#2a1515;border-color:#7a3030;color:#e07070}
label{font-size:11px;color:#555;display:block;margin-top:6px}
input{width:100%;padding:4px 7px;border-radius:4px;background:#111214;border:1px solid #2e2f34;color:#ccc;font-size:12px;margin-top:2px;transition:border-color .15s}
input:focus{outline:none;border-color:#666}
.row{display:flex;gap:5px}
.row>*{flex:1}
.input-zero{display:flex;gap:4px;margin-top:2px}
.input-zero input{margin-top:0;flex:1}
.zero-btn{flex:none;width:28px;padding:0;font-size:10px;background:#1a1b1f;border:1px solid #333;border-radius:4px;color:#555;cursor:pointer;margin-top:0}
.zero-btn:hover{background:#25262a;color:#aaa}
.sep{border:none;border-top:1px solid #2a2b30;margin:8px 0}
#autosave-indicator{font-size:10px;color:#333;text-align:right;padding:2px 4px}
.viewport{flex:1;position:relative;overflow:hidden;display:flex}
.viewcube-wrap{position:absolute;top:12px;right:12px;width:84px;z-index:10}
.viewcube-wrap canvas{display:block;cursor:pointer}
#av-3d-btn,#ch-3d-btn{width:84px;padding:7px 0;font-size:11px;background:#1a1600;border:1px solid #d4a017;border-radius:5px;color:#d4a017;cursor:pointer;margin-top:0;text-align:center;transition:background .12s}
#av-3d-btn:hover,#ch-3d-btn:hover{background:#221c00;color:#f0c040}
#flat-wrap{flex:1;position:relative;overflow:hidden}
#flat-svg{width:100%;height:100%;display:block;cursor:default}
.read-only-val{font-size:12px;color:#ccc;padding:3px 0 0 2px;display:block}
#props-av,#props-ch{display:none}
.props-visible{display:block !important}
.follow-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px 3px 7px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid #333;background:#1e1f23;color:#666;width:auto;margin-top:5px;transition:background .12s,border-color .12s}
.follow-pill:hover{background:#25262a;border-color:#666}
.follow-pill.linked{background:#0e2016;border-color:#2a6040;color:#4db87a}
.follow-pill.linked:hover{background:#132819;border-color:#4db87a}
.follow-pill.orphan{background:#1a1600;border-color:#5a4800;color:#d4a017}
.follow-pill.orphan:hover{background:#221c00;border-color:#d4a017}
.follow-pill .pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill-menu{background:#171819;border:1px solid #2e2f34;border-radius:5px;padding:4px;margin-top:3px}
.pill-opt{background:#1e1f23;color:#aaa;border:1px solid #2e2f34;border-radius:4px;padding:4px 8px;font-size:11px;width:100%;margin-top:3px;text-align:left;cursor:pointer}
.pill-opt:hover{background:#25262a;border-color:#555;color:#eee}
.pill-opt:first-child{margin-top:0}
.end-block{margin-top:6px}
.end-block .end-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
</style>
</head>
<body>
<div id="topbar">
  <h1>Harnice Network Editor</h1>
  <span id="part-rev"></span>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('available')">Available</div>
    <div class="tab" onclick="switchTab('chosen')">Chosen</div>
    <div class="tab" onclick="switchTab('flattened')">Flattened</div>
  </div>
  <span id="autosave-indicator">●</span>
</div>
<div id="main">
  <div class="panel active" id="panel-available">
    <div class="sidebar">
      <div class="section">
        <h2>Tools</h2>
        <button id="btn-av-select" onclick="avSetTool('select')" class="active-tool">▶ Select</button>
        <button id="btn-av-addnode" onclick="avSetTool('add-node')">＋ Add Node</button>
        <button id="btn-av-addseg" onclick="avSetTool('add-seg')">⟶ Add Segment</button>
        <button id="btn-av-delete" onclick="avSetTool('delete')">✕ Delete</button>
      </div>
      <div class="section" id="props-av">
        <h2 id="props-av-title">Properties</h2>
        <div id="props-av-content"></div>
        <button class="danger" style="margin-top:8px" onclick="avDeleteSelected()">Delete</button>
      </div>
      <div class="section"><h2>View</h2><button onclick="avFitView()">Fit View</button></div>
    </div>
    <div class="viewport" id="av-viewport">
      <canvas id="av-canvas" tabindex="0" style="width:100%;height:100%;display:block;position:absolute;top:0;left:0"></canvas>
      <canvas id="av-label-canvas" style="width:100%;height:100%;display:block;position:absolute;top:0;left:0;pointer-events:none"></canvas>
      <div id="av-status" style="display:none;position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#1a1b1f;border:1px solid #3a3b40;border-radius:6px;padding:5px 14px;font-size:11px;color:#d4a017;pointer-events:none;white-space:nowrap;z-index:20"></div>
      <div class="viewcube-wrap">
        <canvas id="av-cube-canvas" width="84" height="84"></canvas>
        <button id="av-3d-btn" style="display:none" onclick="enable3D('available')">3D Editor</button>
      </div>
    </div>
  </div>
  <div class="panel" id="panel-chosen">
    <div class="sidebar">
      <div class="section">
        <h2>Instructions</h2>
        <p style="font-size:11px;color:#555;line-height:1.7">Click a segment to toggle.<br>
        <span style="color:#d4a017">■</span> Chosen &nbsp;<span style="color:#2a2b30">■</span> Not chosen<br>
        <span style="color:#c73652">●</span> Resolved nodes</p>
      </div>
      <div class="section" id="props-ch">
        <h2 id="props-ch-title">Selection</h2>
        <div id="props-ch-content"></div>
      </div>
      <div class="section"><h2>View</h2><button onclick="chFitView()">Fit View</button></div>
    </div>
    <div class="viewport" id="ch-viewport">
      <canvas id="ch-canvas" tabindex="0" style="width:100%;height:100%;display:block;position:absolute;top:0;left:0"></canvas>
      <canvas id="ch-label-canvas" style="width:100%;height:100%;display:block;position:absolute;top:0;left:0;pointer-events:none"></canvas>
      <div class="viewcube-wrap">
        <canvas id="ch-cube-canvas" width="84" height="84"></canvas>
        <button id="ch-3d-btn" style="display:none" onclick="enable3D('chosen')">3D Editor</button>
      </div>
    </div>
  </div>
  <div class="panel" id="panel-flattened">
    <div class="sidebar">
      <div class="section">
        <h2>Segment</h2>
        <label>ID</label><span class="read-only-val" id="flat-prop-id">—</span>
        <label>Node A</label><span class="read-only-val" id="flat-prop-na">—</span>
        <label>Node B</label><span class="read-only-val" id="flat-prop-nb">—</span>
        <label>Length</label><span class="read-only-val" id="flat-prop-len">—</span>
        <label>Angle (°)</label>
        <input id="flat-prop-angle" type="number" min="0" max="360" step="1" oninput="flatAngleChanged(this.value)">
        <p id="flat-no-sel" style="font-size:11px;color:#444;margin-top:6px">Click a segment to edit its angle.</p>
      </div>
      <div class="section"><h2>View</h2><button onclick="flatFitView()">Fit View</button></div>
    </div>
    <div id="flat-wrap"><svg id="flat-svg"></svg></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

var C_AMBER=0xd4a017,C_RED=0xc73652;
var C_SEG_DEFAULT=0x3a6ea5,C_SEG_CHOSEN=0xd4a017,C_SEG_NOTCHOSEN=0x1e2433;
var C_NODE_SEL_RING=0xffffff;
var AUTOSAVE_MS=3000;
var PX_PER_MM=(window.devicePixelRatio||1)*96/25.4;
var DEG=Math.PI/180;
var FOLLOW_EPS=1e-6;

// ── State ─────────────────────────────────────────────────────────────────────
var dirty={available:false,chosen:false,flattened:false};
var saveTimers={};
var currentTab='available';
var avData={segments:[],nodes:[]};
var chosenList=[],chosenNetData=null;
var flatData={fieldnames:[],rows:[]};
var avSelected=null,avTool='select',avConnectStart=null,avPendingLink=null;
var avArrows=[];
var flatPan={x:400,y:300},flatScale=1,flatIsPanning=false,flatPanStart={x:0,y:0},flatSelected=null;
var avRenderer,avScene,avCamera,avOrbit,avCube,avNodeMeshes={},avSegLines={},avRay;
var chRenderer,chScene,chCamera,chOrbit,chCube,chSegLines={},chNodeMeshes={},chRay;
var followLinks={};
var force3D={available:false,chosen:false};

// ── Data checks ───────────────────────────────────────────────────────────────
function isDataFlat(){
  var eps=1e-6,nodes=avData.nodes||[],segs=avData.segments||[];
  if(!nodes.length&&!segs.length) return false;
  for(var i=0;i<nodes.length;i++) if(Math.abs(nodes[i].location[2])>eps) return false;
  for(var i=0;i<segs.length;i++){
    if(Math.abs(segs[i].location_at_end_a[2])>eps) return false;
    if(Math.abs(segs[i].location_at_end_b[2])>eps) return false;
  }
  return true;
}
function is2D(tab){ return !force3D[tab]&&isDataFlat(); }
function apply2DMode(tab,orbit,camera,viewSize){
  var CAM_DIST=500;
  camera.position.set(orbit.target.x,orbit.target.y,orbit.target.z+CAM_DIST);
  camera.up.set(0,1,0); camera.lookAt(orbit.target);
  orbit.phi=Math.PI/2; orbit.theta=Math.PI/2;
  updateOrthoFrustum(camera,viewSize().w,viewSize().h);
}
function updateViewCubeVisibility(tab,orbit,camera,viewSize){
  var cubeId=tab==='available'?'av-cube-canvas':'ch-cube-canvas';
  var btnId =tab==='available'?'av-3d-btn':'ch-3d-btn';
  var flat=is2D(tab);
  document.getElementById(cubeId).style.display=flat?'none':'block';
  document.getElementById(btnId).style.display =flat?'block':'none';
  if(flat) apply2DMode(tab,orbit,camera,viewSize);
}

// ── Follow links ──────────────────────────────────────────────────────────────
function followGet(segId){ return followLinks[segId]||{a:null,b:null}; }
function followSet(segId,end,nodeId){
  if(!followLinks[segId]) followLinks[segId]={a:null,b:null};
  followLinks[segId][end]=nodeId;
}
function followClear(segId){ delete followLinks[segId]; }
function locEq(a,b){
  return Math.abs(a[0]-b[0])<FOLLOW_EPS&&Math.abs(a[1]-b[1])<FOLLOW_EPS&&Math.abs(a[2]-b[2])<FOLLOW_EPS;
}
function nodeAtLoc(loc){
  var n=(avData.nodes||[]).find(function(n){return locEq(n.location,loc);});
  return n?n.node_id:null;
}
function rebuildFollowLinks(){
  followLinks={};
  (avData.segments||[]).forEach(function(seg){
    var a=nodeAtLoc(seg.location_at_end_a),b=nodeAtLoc(seg.location_at_end_b);
    if(a||b) followLinks[seg.segment_id]={a:a||null,b:b||null};
  });
}
function syncFollowers(nodeId){
  var n=(avData.nodes||[]).find(function(n){return n.node_id===nodeId;});
  if(!n) return;
  (avData.segments||[]).forEach(function(seg){
    var lk=followLinks[seg.segment_id]; if(!lk) return;
    if(lk.a===nodeId) seg.location_at_end_a=n.location.slice();
    if(lk.b===nodeId) seg.location_at_end_b=n.location.slice();
  });
}
function syncNodeFromSeg(seg,end){
  var lk=followLinks[seg.segment_id]; if(!lk) return;
  var nodeId=end==='a'?lk.a:lk.b; if(!nodeId) return;
  var n=(avData.nodes||[]).find(function(n){return n.node_id===nodeId;}); if(!n) return;
  n.location=(end==='a'?seg.location_at_end_a:seg.location_at_end_b).slice();
}
function cleanSegForSave(seg){
  var s=Object.assign({},seg);
  delete s.node_at_end_a; delete s.node_at_end_b; return s;
}

// ── Rotation helpers ──────────────────────────────────────────────────────────
function nodeRotMatrix(alpha,beta,gamma){
  return new THREE.Matrix4().makeRotationFromEuler(new THREE.Euler(alpha*DEG,beta*DEG,gamma*DEG,'ZYX'));
}
function localAxes(alpha,beta,gamma){
  var m=nodeRotMatrix(alpha,beta,gamma);
  return{
    x:new THREE.Vector3().setFromMatrixColumn(m,0).normalize(),
    y:new THREE.Vector3().setFromMatrixColumn(m,1).normalize(),
    z:new THREE.Vector3().setFromMatrixColumn(m,2).normalize()
  };
}
function normaliseNode(n){
  if(n.alpha==null)n.alpha=0; if(n.beta==null)n.beta=0; if(n.gamma==null)n.gamma=0;
}

// ── Drag state ────────────────────────────────────────────────────────────────
var drag={mode:null,moved:false,wasTriad:false,lastX:0,lastY:0,axis:null,nodeId:null,
  startLoc:null,startX:0,startY:0,screenDir:null,rotAxis:null,startQ:null,
  nodeScrPx:null,prevAngle:0,orbit:null,v0x:0,v0y:0};

// ── Autosave ──────────────────────────────────────────────────────────────────
function markDirty(tab){
  dirty[tab]=true;
  document.getElementById('autosave-indicator').style.color='#d4a017';
  clearTimeout(saveTimers[tab]);
  saveTimers[tab]=setTimeout(function(){saveTab(tab);},AUTOSAVE_MS);
}
async function saveTab(tab){
  try{
    if(tab==='available'){
      var payload=Object.assign({},avData,{segments:(avData.segments||[]).map(cleanSegForSave)});
      await fetch('/api/available',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }
    if(tab==='chosen') await fetch('/api/chosen_list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(chosenList)});
    if(tab==='flattened') await fetch('/api/flattened',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(flatData)});
    dirty[tab]=false;
    if(!Object.values(dirty).some(Boolean)) document.getElementById('autosave-indicator').style.color='#333';
  }catch(e){ document.getElementById('autosave-indicator').style.color='#c73652'; }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['available','chosen','flattened'][i]===t);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+t).classList.add('active');
  setTimeout(function(){
    if(t==='available'){avOnResize();avRender();}
    if(t==='chosen'){chOnResize();chRender();}
    if(t==='flattened') flatRender();
  },30);
}

// ── Data load ─────────────────────────────────────────────────────────────────
async function loadAll(){
  var res=await Promise.all([
    fetch('/api/info').then(function(r){return r.json();}).catch(function(){return {};}),
    fetch('/api/available').then(function(r){return r.json();}).catch(function(){return {segments:[],nodes:[]};}),
    fetch('/api/chosen_list').then(function(r){return r.json();}).catch(function(){return [];}),
    fetch('/api/chosen_net').then(function(r){return r.json();}).catch(function(){return null;}),
    fetch('/api/flattened').then(function(r){return r.json();}).catch(function(){return {fieldnames:[],rows:[]};})
  ]);
  var info=res[0];
  if(info.part_number||info.rev)
    document.getElementById('part-rev').textContent=((info.part_number||'')+' '+(info.rev||'')).trim();
  avData=res[1]; (avData.nodes||[]).forEach(normaliseNode); rebuildFollowLinks();
  chosenList=res[2]||[]; chosenNetData=res[3]; flatData=res[4];
  avBuildScene(); chBuildScene(); flatRender();
}

// ── Three.js helpers ──────────────────────────────────────────────────────────
function makeRenderer(canvas){
  var r=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
  r.setPixelRatio(window.devicePixelRatio); r.setClearColor(0x111214);
  return r;
}
function makeOrthoCamera(w,h){
  var hs=15,asp=w/(h||1);
  var c=new THREE.OrthographicCamera(-hs*asp,hs*asp,hs,-hs,-10000,10000);
  c.position.set(0,0,500); c.up.set(0,1,0); c.lookAt(0,0,0); c.userData.halfSize=hs;
  return c;
}
function updateOrthoFrustum(cam,w,h){
  var hs=cam.userData.halfSize,asp=w/(h||1);
  cam.left=-hs*asp; cam.right=hs*asp; cam.top=hs; cam.bottom=-hs; cam.updateProjectionMatrix();
}
function makeWorldAxes(size){
  var g=new THREE.Group(); g.userData.fixedPxRadius=size*28;
  function addAxis(dir,col){
    var geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),dir.clone().normalize().multiplyScalar(size)]);
    g.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:col,linewidth:2})));
    var cone=new THREE.Mesh(new THREE.ConeGeometry(size*0.04,size*0.15,8),new THREE.MeshBasicMaterial({color:col}));
    cone.position.copy(dir.clone().normalize().multiplyScalar(size));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
    g.add(cone);
  }
  addAxis(new THREE.Vector3(1,0,0),0xff3333);
  addAxis(new THREE.Vector3(0,1,0),0x44cc44);
  addAxis(new THREE.Vector3(0,0,1),0x4499ff);
  return g;
}
function scaleFixedPx(scene,cam,renderer){
  var sz=renderer.getSize(new THREE.Vector2());
  var worldPerPx=(2*cam.userData.halfSize)/sz.height;
  scene.traverse(function(obj){
    if(obj.userData.fixedPxRadius) obj.scale.setScalar(obj.userData.fixedPxRadius*worldPerPx);
    if(obj.userData.fixedSegWidth){
      var ribbonR=worldPerPx*PX_PER_MM*0.28;
      var glowR  =worldPerPx*PX_PER_MM*0.72;
      if(obj.userData.isGlow) obj.scale.set(glowR,obj.userData.segLen,glowR);
      else                    obj.scale.set(ribbonR,obj.userData.segLen,ribbonR);
    }
  });
}

// ── Node screen position ──────────────────────────────────────────────────────
function getNodeScreenPos(node,cam){
  var ndc=new THREE.Vector3(node.location[0],node.location[1],node.location[2]).project(cam);
  var canvas=document.getElementById('av-canvas');
  var rect=canvas.getBoundingClientRect();
  return{x:(ndc.x*0.5+0.5)*rect.width+rect.left,y:(-ndc.y*0.5+0.5)*rect.height+rect.top};
}

// ── Label overlay ─────────────────────────────────────────────────────────────
function worldToScreen(pos,camera,canvas){
  var ndc=pos.clone().project(camera);
  return{
    x:(ndc.x*0.5+0.5)*canvas.width/window.devicePixelRatio,
    y:(-ndc.y*0.5+0.5)*canvas.height/window.devicePixelRatio
  };
}
function drawLabels(labelCanvas,camera,nodes,segments){
  var dpr=window.devicePixelRatio||1;
  var w=labelCanvas.parentElement.clientWidth,h=labelCanvas.parentElement.clientHeight;
  if(labelCanvas.width!==w*dpr||labelCanvas.height!==h*dpr){
    labelCanvas.width=w*dpr; labelCanvas.height=h*dpr;
    labelCanvas.style.width=w+'px'; labelCanvas.style.height=h+'px';
  }
  var ctx=labelCanvas.getContext('2d');
  ctx.clearRect(0,0,labelCanvas.width,labelCanvas.height);
  ctx.save(); ctx.scale(dpr,dpr);
  ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
  var OFF=10;
  (nodes||[]).forEach(function(n){
    if(!n.node_id) return;
    var sc=worldToScreen(new THREE.Vector3(n.location[0],n.location[1],n.location[2]),camera,labelCanvas);
    ctx.fillStyle='rgba(180,190,210,0.55)';
    ctx.fillText(n.node_id,sc.x,sc.y-OFF);
  });
  (segments||[]).forEach(function(s){
    if(!s.segment_id) return;
    var mid=new THREE.Vector3(
      (s.location_at_end_a[0]+s.location_at_end_b[0])/2,
      (s.location_at_end_a[1]+s.location_at_end_b[1])/2,
      (s.location_at_end_a[2]+s.location_at_end_b[2])/2
    );
    var sc=worldToScreen(mid,camera,labelCanvas);
    ctx.fillStyle='rgba(130,150,180,0.4)';
    ctx.fillText(s.segment_id,sc.x,sc.y-OFF);
  });
  ctx.restore();
}

// ── Status bar ────────────────────────────────────────────────────────────────
function avSetStatusMsg(msg){
  var el=document.getElementById('av-status');
  if(msg){el.textContent=msg;el.style.display='block';}
  else el.style.display='none';
}

// Esc cancels pending link
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&avPendingLink){

// ══════════════════════════════════════════════════════════════════════════════
//  VIEW CUBE
// ══════════════════════════════════════════════════════════════════════════════
function cv3(x,y,z){return{x:x,y:y,z:z};}
function cvscale(v,s){return cv3(v.x*s,v.y*s,v.z*s);}
function cvdot(a,b){return a.x*b.x+a.y*b.y+a.z*b.z;}
function cvnorm(v){var l=Math.sqrt(cvdot(v,v))||1;return cvscale(v,1/l);}
function cvcross(a,b){return cv3(a.y*b.z-a.z*b.y,a.z*b.x-a.x*b.z,a.x*b.y-a.y*b.x);}
function cvadd(a,b){return cv3(a.x+b.x,a.y+b.y,a.z+b.z);}
function cvOrthogonalize(cam){cam.fwd=cvnorm(cam.fwd);var r=cvnorm(cvcross(cam.fwd,cam.up));cam.up=cvnorm(cvcross(r,cam.fwd));}
var CV_GAP=0.15,CV_T=0.02,CV_AX_LEN=1.18;
var CV_AXES=[{dir:cv3(1,0,0),color:'#ff4444',label:'X'},{dir:cv3(0,1,0),color:'#44cc44',label:'Y'},{dir:cv3(0,0,1),color:'#4499ff',label:'Z'}];
var CV_FACE_DEFS=[
  {name:'Right',normal:cv3(1,0,0)},{name:'Left',normal:cv3(-1,0,0)},
  {name:'Back',normal:cv3(0,1,0)},{name:'Front',normal:cv3(0,-1,0)},
  {name:'Top',normal:cv3(0,0,1)},{name:'Bottom',normal:cv3(0,0,-1)}
];
function cvBuildSlab(fd){
  var n=fd.normal,ax=n.x!==0?0:n.y!==0?1:2;
  var hi=(ax===0?n.x:ax===1?n.y:n.z)>0?1:0;
  var outer=hi?1.0:0.0,inner=hi?1.0-CV_T:CV_T;
  var ta=ax===0?1:0,tb=ax===0?2:ax===1?2:1;
  var lo=CV_GAP,hi2=1-CV_GAP;
  function pt(a0,a1,a2){var r=[0,0,0];r[ax]=a0;r[ta]=a1;r[tb]=a2;return cv3(r[0],r[1],r[2]);}
  var inNorm=cvscale(fd.normal,-1),quads=[];
  quads.push({pts:[pt(outer,lo,lo),pt(outer,hi2,lo),pt(outer,hi2,hi2),pt(outer,lo,hi2)],normal:fd.normal,shade:1.0,isOuter:true});
  quads.push({pts:[pt(inner,lo,lo),pt(inner,lo,hi2),pt(inner,hi2,hi2),pt(inner,hi2,lo)],normal:inNorm,shade:0.6});
  [{pts:[pt(outer,lo,lo),pt(inner,lo,lo),pt(inner,lo,hi2),pt(outer,lo,hi2)],ni:ta,ns:-1},
   {pts:[pt(outer,hi2,lo),pt(outer,hi2,hi2),pt(inner,hi2,hi2),pt(inner,hi2,lo)],ni:ta,ns:1},
   {pts:[pt(outer,lo,lo),pt(outer,hi2,lo),pt(inner,hi2,lo),pt(inner,lo,lo)],ni:tb,ns:-1},
   {pts:[pt(outer,lo,hi2),pt(inner,lo,hi2),pt(inner,hi2,hi2),pt(outer,hi2,hi2)],ni:tb,ns:1}
  ].forEach(function(s){var nn=[0,0,0];nn[s.ni]=s.ns;quads.push({pts:s.pts,normal:cv3(nn[0],nn[1],nn[2]),shade:0.75});});
  return quads;
}
function makeViewCube(canvasEl,getThreeCam,onSnapRequest){
  var S=canvasEl.width,DS=0.55;
  var ctx=canvasEl.getContext('2d');
  var cam={fwd:cv3(0,0,-1),up:cv3(0,1,0)};
  function syncFromThree(){
    var tc=getThreeCam(),fwd=new THREE.Vector3(); tc.getWorldDirection(fwd);
    cam.fwd=cv3(fwd.x,fwd.y,fwd.z); cam.up=cv3(tc.up.x,tc.up.y,tc.up.z);
    cvOrthogonalize(cam);
  }
  function project(v){
    var cv=cv3(v.x-0.5,v.y-0.5,v.z-0.5);
    var right=cvnorm(cvcross(cam.fwd,cam.up));
    return{x:S/2+cvdot(cv,right)*S*DS,y:S/2-cvdot(cv,cam.up)*S*DS,depth:cvdot(cv,cam.fwd)};
  }
  function draw(){
    syncFromThree(); ctx.clearRect(0,0,S,S);
    var allQuads=[];
    CV_FACE_DEFS.forEach(function(fd){
      cvBuildSlab(fd).forEach(function(q){
        if(cvdot(q.normal,cam.fwd)<0.02){
          var pts2d=q.pts.map(project);
          var avgDepth=pts2d.reduce(function(s,p){return s+p.depth;},0)/pts2d.length;
          allQuads.push({pts2d:pts2d,shade:q.shade,avgDepth:avgDepth,labelName:q.isOuter?fd.name:null});
        }
      });
    });
    allQuads.sort(function(a,b){return b.avgDepth-a.avgDepth;});
    var orig2d=project(cv3(0,0,0));
    CV_AXES.map(function(ax){return{ax:ax,tip2d:project(cvscale(ax.dir,CV_AX_LEN))};})
      .sort(function(a,b){return b.tip2d.depth-a.tip2d.depth;})
      .forEach(function(item){
        var tip=item.tip2d,ax=item.ax;
        ctx.globalAlpha=tip.depth<0.02?1.0:0.22;
        ctx.strokeStyle=ax.color; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(orig2d.x,orig2d.y); ctx.lineTo(tip.x,tip.y); ctx.stroke();
        var dx=tip.x-orig2d.x,dy=tip.y-orig2d.y,l=Math.hypot(dx,dy)||1,ux=dx/l,uy=dy/l;
        ctx.fillStyle=ax.color;
        ctx.beginPath(); ctx.moveTo(tip.x,tip.y);
        ctx.lineTo(tip.x-ux*7-uy*3.5,tip.y-uy*7+ux*3.5);
        ctx.lineTo(tip.x-ux*7+uy*3.5,tip.y-uy*7-ux*3.5);
        ctx.closePath(); ctx.fill();
        ctx.globalAlpha=tip.depth<0.02?1.0:0.35;
        ctx.fillStyle=ax.color; ctx.font='bold 10px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ax.label,tip.x+ux*12,tip.y+uy*12);
      });
    ctx.globalAlpha=1.0;
    allQuads.forEach(function(q){
      var pts=q.pts2d,v=Math.round(18+q.shade*32);
      ctx.fillStyle=q.labelName?'rgb('+v+','+(v+2)+','+(v+6)+')':'#0d1a33';
      ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
      for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath(); ctx.fill();
    });
    allQuads.forEach(function(q){
      if(!q.labelName) return;
      var pts=q.pts2d,cx=0,cy=0;
      pts.forEach(function(p){cx+=p.x;cy+=p.y;}); cx/=4; cy/=4;
      ctx.fillStyle='#8899bb'; ctx.font='bold 8px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(q.labelName,cx,cy);
    });
  }
  canvasEl.addEventListener('click',function(e){
    syncFromThree();
    var rect=canvasEl.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    var best=null,bestDist=Infinity;
    CV_FACE_DEFS.forEach(function(fd){
      if(cvdot(fd.normal,cam.fwd)>=0.02) return;
      var cp=project(cvadd(cv3(0.5,0.5,0.5),cvscale(fd.normal,0.5)));
      var d=Math.hypot(cp.x-mx,cp.y-my);
      if(d<bestDist){bestDist=d;best=fd;}
    });
    if(best&&bestDist<S*0.45) onSnapRequest(best.name);
  });
  return{draw:draw};
}

// ── Camera snap ───────────────────────────────────────────────────────────────
var CUBE_FACES=[
  {name:'Front',normal:new THREE.Vector3(0,-1,0),up:new THREE.Vector3(0,0,1)},
  {name:'Back', normal:new THREE.Vector3(0,1,0), up:new THREE.Vector3(0,0,1)},
  {name:'Right',normal:new THREE.Vector3(1,0,0), up:new THREE.Vector3(0,0,1)},
  {name:'Left', normal:new THREE.Vector3(-1,0,0),up:new THREE.Vector3(0,0,1)},
  {name:'Top',  normal:new THREE.Vector3(0,0,1), up:new THREE.Vector3(0,1,0)},
  {name:'Bottom',normal:new THREE.Vector3(0,0,-1),up:new THREE.Vector3(0,1,0)}
];
function animateCameraToFace(orbit,face){
  var CAM_DIST=500,endPos=face.normal.clone().multiplyScalar(CAM_DIST).add(orbit.target);
  var startPos=orbit.camera.position.clone(),startUp=orbit.camera.up.clone();
  var t0=performance.now(),dur=400;
  function step(now){
    var t=Math.min((now-t0)/dur,1),ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    orbit.camera.position.lerpVectors(startPos,endPos,ease);
    orbit.camera.up.lerpVectors(startUp,face.up,ease).normalize();
    orbit.camera.lookAt(orbit.target);
    var rel=orbit.camera.position.clone().sub(orbit.target).normalize();
    orbit.phi=Math.acos(Math.max(-1,Math.min(1,rel.y)));
    orbit.theta=Math.atan2(rel.z,rel.x);
    orbit.renderFn();
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function enable3D(tab){
  force3D[tab]=true;
  document.getElementById(tab==='available'?'av-cube-canvas':'ch-cube-canvas').style.display='block';
  document.getElementById(tab==='available'?'av-3d-btn':'ch-3d-btn').style.display='none';
}
function avSnapTo(name){var f=CUBE_FACES.find(function(f){return f.name===name;});if(f)animateCameraToFace(avOrbit,f);}
function chSnapTo(name){var f=CUBE_FACES.find(function(f){return f.name===name;});if(f)animateCameraToFace(chOrbit,f);}

// ── Orbit controller ──────────────────────────────────────────────────────────
function makeOrbit(camera,renderFn,getViewportSize){
  var CAM_DIST=500;
  var o={camera:camera,renderFn:renderFn,getViewportSize:getViewportSize,target:new THREE.Vector3(),phi:Math.PI/2,theta:Math.PI/2};
  o.apply=function(){
    camera.position.set(
      o.target.x+CAM_DIST*Math.sin(o.phi)*Math.cos(o.theta),
      o.target.y+CAM_DIST*Math.cos(o.phi),
      o.target.z+CAM_DIST*Math.sin(o.phi)*Math.sin(o.theta)
    );
    camera.lookAt(o.target); renderFn();
  };
  o.fitToBox=function(box){
    var center=new THREE.Vector3(); box.getCenter(center);
    var size=new THREE.Vector3(); box.getSize(size);
    o.target.copy(center);
    var sz=getViewportSize(),asp=(sz.w||800)/(sz.h||600);
    camera.userData.halfSize=Math.max((size.y/2)*1.4,(size.x/2/asp)*1.4,0.5);
    updateOrthoFrustum(camera,sz.w,sz.h); o.apply();
  };
  o.apply(); return o;
}
function avViewSize(){var vp=document.getElementById('av-viewport');return{w:vp.clientWidth,h:vp.clientHeight};}
function chViewSize(){var vp=document.getElementById('ch-viewport');return{w:vp.clientWidth,h:vp.clientHeight};}

// ══════════════════════════════════════════════════════════════════════════════
//  TRIAD
// ══════════════════════════════════════════════════════════════════════════════
function makeBasis(axisDir,tangent){
  var y=axisDir.clone().normalize(),x=tangent.clone().normalize();
  var z=new THREE.Vector3().crossVectors(x,y).normalize();
  x.crossVectors(y,z).normalize();
  var m=new THREE.Matrix4(); m.makeBasis(x,y,z); return m;
}
function makeArcPoints(startDeg,arcDeg,segs){
  var pts=[],step=arcDeg/segs;
  for(var i=0;i<=segs;i++){var a=(startDeg+i*step)*DEG;pts.push(new THREE.Vector3(Math.cos(a),0,Math.sin(a)));}
  return pts;
}
function buildTriad(node){
  var alpha=node.alpha||0,beta=node.beta||0,gamma=node.gamma||0;
  var axes=localAxes(alpha,beta,gamma);
  var pos=new THREE.Vector3(node.location[0],node.location[1],node.location[2]);
  var master=new THREE.Group();
  master.position.copy(pos); master.userData.fixedPxRadius=52; master.userData.isTriadMaster=true;
  var ARM=0.72,CONE_R=0.11,CONE_H=0.24,SHAFT_R=0.035,ARC_R=0.88,ARC_DEG=60;
  [{axis:'x',dir:axes.x,col:0xff3333},{axis:'y',dir:axes.y,col:0x44cc44},{axis:'z',dir:axes.z,col:0x4499ff}]
  .forEach(function(td){
    var g=new THREE.Group();
    g.userData.triadType='translate'; g.userData.axis=td.axis; g.userData.transWorldAxis=td.dir.clone().normalize();
    var shaft=new THREE.Mesh(new THREE.CylinderGeometry(SHAFT_R,SHAFT_R,ARM,8),new THREE.MeshLambertMaterial({color:td.col}));
    shaft.position.copy(td.dir.clone().multiplyScalar(ARM*0.5));
    shaft.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),td.dir.clone().normalize());
    shaft.userData={triadType:'translate',axis:td.axis};
    var cone=new THREE.Mesh(new THREE.ConeGeometry(CONE_R,CONE_H,10),new THREE.MeshLambertMaterial({color:td.col}));
    cone.position.copy(td.dir.clone().normalize().multiplyScalar(ARM));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),td.dir.clone().normalize());
    cone.userData={triadType:'translate',axis:td.axis};
    var hit=new THREE.Mesh(new THREE.CylinderGeometry(0.17,0.17,ARM+CONE_H,8),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
    hit.position.copy(td.dir.clone().normalize().multiplyScalar((ARM+CONE_H)*0.5));
    hit.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),td.dir.clone().normalize());
    hit.userData={triadType:'translate',axis:td.axis};
    g.add(shaft,cone,hit); master.add(g);
  });
  [{axis:'x',col:0xff3333,basisY:axes.x.clone().negate(),basisX:axes.z},
   {axis:'y',col:0x44cc44,basisY:axes.y.clone().negate(),basisX:axes.x},
   {axis:'z',col:0x4499ff,basisY:axes.z.clone().negate(),basisX:axes.y}]
  .forEach(function(rd){
    var g=new THREE.Group();
    g.userData.triadType='rotate'; g.userData.axis=rd.axis;
    g.userData.rotWorldAxis=({x:axes.x,y:axes.y,z:axes.z})[rd.axis].clone();
    g.setRotationFromMatrix(makeBasis(rd.basisY,rd.basisX));
    var START=-ARC_DEG-15,END=-15,SEGS=20;
    var pts=makeArcPoints(START,ARC_DEG,SEGS).map(function(p){return p.multiplyScalar(ARC_R);});
    for(var i=0;i<pts.length-1;i++){
      var seg=new THREE.Mesh(new THREE.CylinderGeometry(SHAFT_R,SHAFT_R,pts[i].distanceTo(pts[i+1]),4),new THREE.MeshLambertMaterial({color:rd.col}));
      seg.position.copy(pts[i].clone().add(pts[i+1]).multiplyScalar(0.5));
      seg.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),pts[i+1].clone().sub(pts[i]).normalize());
      g.add(seg);
    }
    var endPt=pts[pts.length-1],endAng=END*DEG;
    var cone=new THREE.Mesh(new THREE.ConeGeometry(0.10,0.22,8),new THREE.MeshLambertMaterial({color:rd.col}));
    cone.position.copy(endPt);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(-Math.sin(endAng),0,Math.cos(endAng)));
    cone.userData={triadType:'rotate',axis:rd.axis}; g.add(cone);
    var HIT_SEGS=24,HIT_R=0.16;
    for(var j=0;j<HIT_SEGS;j++){
      var a0=(START+(j/HIT_SEGS)*ARC_DEG)*DEG,a1=(START+((j+1)/HIT_SEGS)*ARC_DEG)*DEG;
      var p0=new THREE.Vector3(Math.cos(a0)*ARC_R,0,Math.sin(a0)*ARC_R);
      var p1=new THREE.Vector3(Math.cos(a1)*ARC_R,0,Math.sin(a1)*ARC_R);
      var hm=new THREE.Mesh(new THREE.CylinderGeometry(HIT_R,HIT_R,p0.distanceTo(p1)*1.1,5),new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
      hm.position.copy(p0.clone().add(p1).multiplyScalar(0.5));
      hm.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),p1.clone().sub(p0).normalize());
      hm.userData={triadType:'rotate',axis:rd.axis}; g.add(hm);
    }
    master.add(g);
  });
  return master;
}
var TRANS_HIDE_DOT=Math.cos(5*DEG),ROT_HIDE_DOT=Math.sin(5*DEG);
function updateTriadVisibility(camera){
  var fwd=new THREE.Vector3(); camera.getWorldDirection(fwd);
  avArrows.forEach(function(master){
    master.children.forEach(function(g){
      var show=true;
      if(g.userData.triadType==='translate'&&g.userData.transWorldAxis)
        show=Math.abs(g.userData.transWorldAxis.dot(fwd))<TRANS_HIDE_DOT;
      else if(g.userData.triadType==='rotate'&&g.userData.rotWorldAxis)
        show=Math.abs(g.userData.rotWorldAxis.dot(fwd))>=ROT_HIDE_DOT;
      g.visible=show;
      g.traverse(function(c){if(c.isMesh) c.raycast=show?THREE.Mesh.prototype.raycast:function(){};});
    });
  });
}

// ══════════════════════════════════════════════════════════════════════════════
//  MESH FACTORIES
// ══════════════════════════════════════════════════════════════════════════════
function makeSegLine(seg,color,opts){
  opts=opts||{};
  var aVec=new THREE.Vector3(seg.location_at_end_a[0],seg.location_at_end_a[1],seg.location_at_end_a[2]);
  var bVec=new THREE.Vector3(seg.location_at_end_b[0],seg.location_at_end_b[1],seg.location_at_end_b[2]);
  var mid=aVec.clone().add(bVec).multiplyScalar(0.5);
  var len=aVec.distanceTo(bVec)||0.001;
  var dir=bVec.clone().sub(aVec).normalize();
  var group=new THREE.Group();
  group.position.copy(mid);
  group.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
  group.userData.type='segment'; group.userData.id=seg.segment_id;

  var glowColor=opts.glowColor!==undefined?opts.glowColor:color;
  var glowMat=new THREE.MeshBasicMaterial({color:glowColor,transparent:true,opacity:opts.glowOpacity!==undefined?opts.glowOpacity:0.13,depthWrite:false});
  var glowMesh=new THREE.Mesh(new THREE.CylinderGeometry(1,1,1,12),glowMat);
  glowMesh.userData.fixedSegWidth=true; glowMesh.userData.isGlow=true;
  glowMesh.userData.segLen=len; glowMesh.userData.type='segment'; glowMesh.userData.id=seg.segment_id;
  group.add(glowMesh);

  var ribbonMat=new THREE.MeshStandardMaterial({color:color,metalness:0.25,roughness:0.55});
  var ribbon=new THREE.Mesh(new THREE.CylinderGeometry(1,1,1,12),ribbonMat);
  ribbon.userData.fixedSegWidth=true; ribbon.userData.isGlow=false;
  ribbon.userData.segLen=len; ribbon.userData.type='segment'; ribbon.userData.id=seg.segment_id;
  group.add(ribbon);
  return group;
}

function makeNodeSphere(loc,color){
  var mesh=new THREE.Mesh(new THREE.SphereGeometry(1,12,12),new THREE.MeshLambertMaterial({color:color}));
  mesh.position.set(loc[0],loc[1],loc[2]);
  mesh.userData.fixedPxRadius=PX_PER_MM*0.75;
  return mesh;
}

// ── Raycast helpers ───────────────────────────────────────────────────────────
function collectRayMeshes(objMap){
  var out=[];
  Object.values(objMap).forEach(function(o){
    if(o.isMesh) out.push(o);
    else if(o.isGroup) o.traverse(function(c){if(c.isMesh&&!(c.material&&c.material.transparent))out.push(c);});
  });
  return out;
}
function resolveHit(hitObj){
  var o=hitObj;
  while(o&&!o.userData.type&&o.parent) o=o.parent;
  return o&&o.userData.type?o.userData:null;
}

//  MOUSE

function onCanvasMouseDown(e,orbit,ray,nodeObjects,getTriadObjects){
  if(e.button!==0&&e.button!==2) return;
  e.preventDefault();
  var rect=e.currentTarget.getBoundingClientRect();
  var ndcX=((e.clientX-rect.left)/rect.width)*2-1;
  var ndcY=-((e.clientY-rect.top)/rect.height)*2+1;
  var m=new THREE.Vector2(ndcX,ndcY);
  if(e.button===0&&avTool==='select'&&avSelected&&avSelected.type==='node'&&orbit===avOrbit){
    var triadObjs=getTriadObjects(),hitMeshes=[];
    triadObjs.forEach(function(t){t.traverse(function(c){if(c.isMesh)hitMeshes.push(c);});});
    if(hitMeshes.length){
      ray.setFromCamera(m,orbit.camera);
      var hits=ray.intersectObjects(hitMeshes,true);
      if(hits.length){
        var h=hits[0].object;
        while(h&&!h.userData.triadType&&h.parent) h=h.parent;
        if(h&&h.userData.triadType){
          var node=avData.nodes.find(function(n){return n.node_id===avSelected.id;});
          if(node){
            var ttype=h.userData.triadType,taxis=h.userData.axis;
            if(ttype==='translate'){
              var axDir=localAxes(node.alpha||0,node.beta||0,node.gamma||0)[taxis];
              var origin=new THREE.Vector3(node.location[0],node.location[1],node.location[2]);
              var sz=avViewSize();
              var oriNDC=origin.clone().project(orbit.camera);
              var tipNDC=origin.clone().add(axDir).project(orbit.camera);
              var sdx=(tipNDC.x-oriNDC.x)*sz.w/2,sdy=-(tipNDC.y-oriNDC.y)*sz.h/2;
              var slen=Math.sqrt(sdx*sdx+sdy*sdy)||1;
              drag.mode='triad-translate'; drag.wasTriad=true; drag.moved=false; drag.orbit=orbit;
              drag.axis=taxis; drag.nodeId=avSelected.id; drag.startLoc=node.location.slice();
              drag.startX=e.clientX; drag.startY=e.clientY;
              drag.screenDir=new THREE.Vector2(sdx/slen,sdy/slen);
            } else {
              var a0=node.alpha||0,b0=node.beta||0,g0=node.gamma||0;
              var rotAx=localAxes(a0,b0,g0)[taxis].clone();
              var fwd=new THREE.Vector3(); orbit.camera.getWorldDirection(fwd);
              if(rotAx.dot(fwd)>0) rotAx.negate();
              var sp=getNodeScreenPos(node,orbit.camera);
              drag.mode='triad-rotate'; drag.wasTriad=true; drag.moved=false; drag.orbit=orbit;
              drag.axis=taxis; drag.nodeId=avSelected.id; drag.rotAxis=rotAx;
              drag.startQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(a0*DEG,b0*DEG,g0*DEG,'ZYX'));
              drag.v0x=e.clientX-sp.x; drag.v0y=e.clientY-sp.y;
            }
            return;
          }
        }
      }
    }
  }
  drag.mode=e.button===0?'orbit-rotate':'orbit-pan';
  drag.moved=false; drag.wasTriad=false; drag.lastX=e.clientX; drag.lastY=e.clientY; drag.orbit=orbit;
}

window.addEventListener('mousemove',function(e){
  if(!drag.mode) return;
  drag.moved=true;
  var orbit=drag.orbit;
  if(drag.mode==='triad-translate'){
    var node=avData.nodes.find(function(n){return n.node_id===drag.nodeId;});
    if(!node||!drag.startLoc) return;
    var axDir=localAxes(node.alpha||0,node.beta||0,node.gamma||0)[drag.axis];
    var sz=avViewSize(),worldPerPx=(2*avCamera.userData.halfSize)/(sz.h||600);
    var dm=new THREE.Vector2(e.clientX-drag.startX,e.clientY-drag.startY);
    var delta=dm.dot(drag.screenDir)*worldPerPx;
    node.location=[
      Math.round((drag.startLoc[0]+axDir.x*delta)*1000)/1000,
      Math.round((drag.startLoc[1]+axDir.y*delta)*1000)/1000,
      Math.round((drag.startLoc[2]+axDir.z*delta)*1000)/1000
    ];
    syncFollowers(node.node_id); avBuildScene(); avShowProps(); markDirty('available'); return;
  }
  if(drag.mode==='triad-rotate'){
    var node=avData.nodes.find(function(n){return n.node_id===drag.nodeId;});
    if(!node) return;
    var sp=getNodeScreenPos(node,avCamera);
    var v1x=e.clientX-sp.x,v1y=e.clientY-sp.y;
    var cross=v1x*drag.v0y-v1y*drag.v0x,dot=drag.v0x*v1x+drag.v0y*v1y;
    var angle=Math.atan2(cross,dot);
    var newQ=new THREE.Quaternion().setFromAxisAngle(drag.rotAxis,angle).multiply(drag.startQ);
    var eu=new THREE.Euler().setFromQuaternion(newQ,'ZYX');
    node.alpha=Math.round(eu.x/DEG*1000)/1000;
    node.beta =Math.round(eu.y/DEG*1000)/1000;
    node.gamma=Math.round(eu.z/DEG*1000)/1000;
    avBuildScene(); avShowProps(); markDirty('available'); return;
  }
  var dx=e.clientX-drag.lastX,dy=e.clientY-drag.lastY;
  drag.lastX=e.clientX; drag.lastY=e.clientY;
  if(drag.mode==='orbit-rotate'){
    if(!is2D(drag.orbit===avOrbit?'available':'chosen')){
      orbit.theta+=dx*0.008;
      orbit.phi=Math.max(0.01,Math.min(Math.PI-0.01,orbit.phi-dy*0.008));
      orbit.apply();
    }
  } else if(drag.mode==='orbit-pan'){
    var sz=orbit.getViewportSize(),wpp=2*orbit.camera.userData.halfSize/(sz.h||600);
    var fwd=new THREE.Vector3(); orbit.camera.getWorldDirection(fwd);
    var right=new THREE.Vector3().crossVectors(fwd,orbit.camera.up).normalize();
    var up2=right.clone().cross(fwd).normalize();
    orbit.target.addScaledVector(right,-dx*wpp);
    orbit.target.addScaledVector(up2,dy*wpp);
    orbit.apply();
  }
});
window.addEventListener('mouseup',function(){
  drag.mode=null; drag.moved=false; drag.wasTriad=false;
  drag.axis=null; drag.nodeId=null; drag.startLoc=null; drag.screenDir=null;
  drag.rotAxis=null; drag.startQ=null; drag.v0x=0; drag.v0y=0;
  drag.nodeScrPx=null; drag.prevAngle=0; drag.orbit=null;
});

function attachZoom(canvasEl,orbit,getViewportSize){
  canvasEl.addEventListener('wheel',function(e){
    e.preventDefault();
    var factor=e.deltaY>0?1.12:1/1.12,cam=orbit.camera;
    var oldHs=cam.userData.halfSize,newHs=Math.max(0.01,Math.min(5000,oldHs*factor));
    var rect=canvasEl.getBoundingClientRect();
    var ndcX=((e.clientX-rect.left)/rect.width)*2-1;
    var ndcY=-((e.clientY-rect.top)/rect.height)*2+1;
    var sz=getViewportSize(),asp=sz.w/(sz.h||1);
    var worldX=orbit.target.x+ndcX*oldHs*asp,worldY=orbit.target.y+ndcY*oldHs;
    cam.userData.halfSize=newHs;
    updateOrthoFrustum(cam,sz.w,sz.h);
    orbit.target.x=worldX-ndcX*newHs*asp;
    orbit.target.y=worldY-ndcY*newHs;
    orbit.apply();
  },{passive:false});
  canvasEl.addEventListener('contextmenu',function(e){e.preventDefault();});
}

function initAv(){
  avRenderer=makeRenderer(document.getElementById('av-canvas'));
  avScene=new THREE.Scene();
  var sz=avViewSize(); avCamera=makeOrthoCamera(sz.w,sz.h);
  avScene.add(new THREE.AmbientLight(0x1a2233,1.4));
  var key=new THREE.DirectionalLight(0xffffff,1.1); key.position.set(6,10,14); avScene.add(key);
  var fill=new THREE.DirectionalLight(0x3355aa,0.35); fill.position.set(-8,-4,-6); avScene.add(fill);
  var rim=new THREE.DirectionalLight(0x4488cc,0.2); rim.position.set(0,0,-20); avScene.add(rim);
  avScene.add(makeWorldAxes(1.5));
  avRay=new THREE.Raycaster(); avRay.params.Line.threshold=0.12;
  avCube=makeViewCube(document.getElementById('av-cube-canvas'),function(){return avCamera;},avSnapTo);
  avOrbit=makeOrbit(avCamera,avRender,avViewSize);
  document.getElementById('av-canvas').addEventListener('mousedown',function(e){
    onCanvasMouseDown(e,avOrbit,avRay,avNodeMeshes,function(){return avArrows;});
  });
  attachZoom(document.getElementById('av-canvas'),avOrbit,avViewSize);
}
function avOnResize(){var sz=avViewSize();avRenderer.setSize(sz.w,sz.h);updateOrthoFrustum(avCamera,sz.w,sz.h);}
function avFitView(){
  var box=new THREE.Box3();
  Object.values(avNodeMeshes).concat(Object.values(avSegLines)).forEach(function(o){box.expandByObject(o);});
  if(!box.isEmpty()) avOrbit.fitToBox(box); else avRender();
}
function avBuildScene(){
  Object.values(avNodeMeshes).forEach(function(m){avScene.remove(m);});
  Object.values(avSegLines).forEach(function(l){avScene.remove(l);});
  avArrows.forEach(function(a){avScene.remove(a);}); avArrows=[];
  avNodeMeshes={}; avSegLines={};
  (avData.segments||[]).forEach(function(seg){
    var isSel=avSelected&&avSelected.type==='segment'&&avSelected.id===seg.segment_id;
    var col=isSel?0xffffff:C_SEG_DEFAULT;
    var gopa=isSel?0.28:0.13;
    var grp=makeSegLine(seg,col,{glowColor:col,glowOpacity:gopa});
    avSegLines[seg.segment_id]=grp; avScene.add(grp);
  });
  (avData.nodes||[]).forEach(function(n){
    var isSel=avSelected&&avSelected.type==='node'&&avSelected.id===n.node_id;
    var isPending=!!avPendingLink;
    var col=isSel?C_NODE_SEL_RING:isPending?0xffaa00:C_RED;
    var mesh=makeNodeSphere(n.location,col);
    mesh.userData.type='node'; mesh.userData.id=n.node_id;
    avNodeMeshes[n.node_id]=mesh; avScene.add(mesh);
  });
  if(avSelected&&avSelected.type==='node'){
    var n=avData.nodes.find(function(n){return n.node_id===avSelected.id;});
    if(n){var triad=buildTriad(n);avScene.add(triad);avArrows=[triad];}
  }
  avRender();
  updateViewCubeVisibility('available',avOrbit,avCamera,avViewSize);
}

document.getElementById('av-canvas').addEventListener('click',function(e){
  if(drag.wasTriad){drag.wasTriad=false;return;}
  drag.wasTriad=false;
  var rect=document.getElementById('av-canvas').getBoundingClientRect();
  var m=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  avRay.setFromCamera(m,avCamera);
  if(avTool==='add-node'){avAddNode();return;}

  var nMeshes=collectRayMeshes(avNodeMeshes);
  var sMeshes=collectRayMeshes(avSegLines);
  var nHits=avRay.intersectObjects(nMeshes,true);
  var sHits=avRay.intersectObjects(sMeshes,true);
  var nData=nHits.length?resolveHit(nHits[0].object):null;
  var sData=sHits.length?resolveHit(sHits[0].object):null;
  var hit=nData||sData;

  // Pending-link mode: node click completes the link
  if(avPendingLink){
    if(nData&&nData.type==='node'){
      followSet(avPendingLink.segId,avPendingLink.end,nData.id);
      syncFollowers(nData.id);
      avPendingLink=null; avSetStatusMsg(null);
      avBuildScene(); avShowProps(); markDirty('available');
    }
    return;
  }

  if(avTool==='delete'&&hit){
    hit.type==='node'?avDeleteNode(hit.id):avDeleteSegment(hit.id); return;
  }
  if(avTool==='add-seg'&&hit&&hit.type==='node'){
    if(!avConnectStart){
      avConnectStart=hit.id;
      var mesh=avNodeMeshes[hit.id];
      if(mesh) mesh.material.color.set(0xffa030);
      avRender();
    } else if(avConnectStart!==hit.id){
      avAddSegment(avConnectStart,hit.id); avConnectStart=null; avBuildScene();
    }
    return;
  }
  avSelected=hit||null; avBuildScene(); avShowProps();
});

// ── Properties panel ──────────────────────────────────────────────────────────
function avShowProps(){
  var panel=document.getElementById('props-av');
  var content=document.getElementById('props-av-content');
  var title=document.getElementById('props-av-title');
  if(!avSelected){
    panel.classList.remove('props-visible');
    avArrows.forEach(function(a){avScene.remove(a);}); avArrows=[];
    avRender(); return;
  }
  panel.classList.add('props-visible');

  if(avSelected.type==='node'){
    var n=avData.nodes.find(function(n){return n.node_id===avSelected.id;}); if(!n) return;
    title.textContent='Node';
    function iz(id,lbl){return '<label>'+lbl+'</label><div class="input-zero"><input id="'+id+'" type="number" step="0.001"><button class="zero-btn" data-zero="'+id+'">0</button></div>';}
    function iza(id,lbl){return '<label>'+lbl+'</label><div class="input-zero"><input id="'+id+'" type="number" step="0.1"><button class="zero-btn" data-zero="'+id+'">0</button></div>';}
    content.innerHTML='<label>ID</label><input id="pnid" value="'+n.node_id+'">'
      +iz('pnx','X')+iz('pny','Y')+iz('pnz','Z')
      +'<hr class="sep"><label style="color:#555;font-size:10px">ZYX Intrinsic Euler (degrees)</label>'
      +iza('pna','α (rot X)')+iza('pnb','β (rot Y)')+iza('png','γ (rot Z)');
    document.getElementById('pnx').value=n.location[0];
    document.getElementById('pny').value=n.location[1];
    document.getElementById('pnz').value=n.location[2];
    document.getElementById('pna').value=n.alpha||0;
    document.getElementById('pnb').value=n.beta||0;
    document.getElementById('png').value=n.gamma||0;
    function upd(){
      var oldId=n.node_id;
      n.node_id=document.getElementById('pnid').value;
      n.location=[
        parseFloat(document.getElementById('pnx').value)||0,
        parseFloat(document.getElementById('pny').value)||0,
        parseFloat(document.getElementById('pnz').value)||0
      ];
      n.alpha=parseFloat(document.getElementById('pna').value)||0;
      n.beta =parseFloat(document.getElementById('pnb').value)||0;
      n.gamma=parseFloat(document.getElementById('png').value)||0;
      if(oldId!==n.node_id){
        Object.keys(followLinks).forEach(function(sid){
          var lk=followLinks[sid];
          if(lk.a===oldId) lk.a=n.node_id;
          if(lk.b===oldId) lk.b=n.node_id;
        });
      }
      avSelected.id=n.node_id;
      syncFollowers(n.node_id); avBuildScene(); markDirty('available');
    }
    ['pnid','pnx','pny','pnz','pna','pnb','png'].forEach(function(id){
      document.getElementById(id).addEventListener('input',upd);
    });
    content.querySelectorAll('.zero-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var el=document.getElementById(btn.dataset.zero); el.value=0; el.dispatchEvent(new Event('input'));
      });
    });

  } else {
    var s=avData.segments.find(function(s){return s.segment_id===avSelected.id;}); if(!s) return;
    title.textContent='Segment';
    var lk=followGet(s.segment_id);
    var candA=lk.a||nodeAtLoc(s.location_at_end_a);
    var candB=lk.b||nodeAtLoc(s.location_at_end_b);

    function pillHtml(end,linked,candId){
      if(linked){
        return '<button class="follow-pill linked" id="follow-pill-'+end+'" data-end="'+end+'" data-action="unlink">'
          +'<span class="pill-dot"></span>Following '+candId+'</button>';
      }
      return '<button class="follow-pill orphan" id="follow-pill-'+end+'" data-end="'+end+'" data-action="expand">'
          +'<span class="pill-dot"></span>'+(candId?'Assign node…':'No node at this end')+'</button>'
        +'<div class="pill-menu" id="pill-menu-'+end+'" style="display:none">'
          +(candId?'<button class="pill-opt" data-end="'+end+'" data-action="link" data-nodeid="'+candId+'">Link to existing: '+candId+'</button>':'')
          +'<button class="pill-opt" data-end="'+end+'" data-action="pick">Click a node to attach…</button>'
          +'<button class="pill-opt" data-end="'+end+'" data-action="create">＋ Create new node here</button>'
        +'</div>';
    }
    function xyzRow(pre,vals){
      return '<div class="row">'
        +'<input id="'+pre+'x" type="number" step="0.001" value="'+vals[0]+'">'
        +'<input id="'+pre+'y" type="number" step="0.001" value="'+vals[1]+'">'
        +'<input id="'+pre+'z" type="number" step="0.001" value="'+vals[2]+'">'
        +'</div>';
    }
    content.innerHTML=
      '<label>ID</label><input id="psid" value="'+s.segment_id+'">'
      +'<div class="end-block"><div class="end-label">End A</div>'+xyzRow('psa',s.location_at_end_a)+pillHtml('a',!!lk.a,candA)+'</div>'
      +'<div class="end-block" style="margin-top:8px"><div class="end-label">End B</div>'+xyzRow('psb',s.location_at_end_b)+pillHtml('b',!!lk.b,candB)+'</div>';

    function updSeg(){
      s.segment_id=document.getElementById('psid').value;
      s.location_at_end_a=[
        parseFloat(document.getElementById('psax').value)||0,
        parseFloat(document.getElementById('psay').value)||0,
        parseFloat(document.getElementById('psaz').value)||0
      ];
      s.location_at_end_b=[
        parseFloat(document.getElementById('psbx').value)||0,
        parseFloat(document.getElementById('psby').value)||0,
        parseFloat(document.getElementById('psbz').value)||0
      ];
      syncNodeFromSeg(s,'a'); syncNodeFromSeg(s,'b');
      avSelected.id=s.segment_id;
      avBuildScene(); avShowProps(); markDirty('available');
    }
    ['psid','psax','psay','psaz','psbx','psby','psbz'].forEach(function(id){
      var el=document.getElementById(id); if(el) el.addEventListener('input',updSeg);
    });

    content.querySelectorAll('.follow-pill').forEach(function(btn){
      btn.addEventListener('click',function(){
        var end=btn.dataset.end,action=btn.dataset.action;
        if(action==='unlink'){
          followSet(s.segment_id,end,null);
          avBuildScene(); avShowProps(); markDirty('available');
        } else if(action==='expand'){
          var menu=document.getElementById('pill-menu-'+end);
          if(menu) menu.style.display=menu.style.display==='none'?'block':'none';
        }
      });
    });

    content.querySelectorAll('.pill-opt').forEach(function(btn){
      btn.addEventListener('click',function(){
        var end=btn.dataset.end,action=btn.dataset.action;
        if(action==='link'){
          var nid=btn.dataset.nodeid;
          followSet(s.segment_id,end,nid);
          syncFollowers(nid);
          avBuildScene(); avShowProps(); markDirty('available');
        } else if(action==='pick'){
          avPendingLink={segId:s.segment_id,end:end};
          avSetStatusMsg('Click a node to attach End '+(end==='a'?'A':'B')+'  —  Esc to cancel');
          avBuildScene();
        } else if(action==='create'){
          var loc=(end==='a'?s.location_at_end_a:s.location_at_end_b).slice();
          var nid=avNextNodeId();
          avData.nodes.push({node_id:nid,location:loc,alpha:0,beta:0,gamma:0});
          followSet(s.segment_id,end,nid);
          avBuildScene(); avShowProps(); markDirty('available');
        }
      });
    });
  }
}

function avNextNodeId(){var ids=new Set(avData.nodes.map(function(n){return n.node_id;}));var i=1;while(ids.has('N'+i))i++;return 'N'+i;}
function avNextSegId(){var ids=new Set(avData.segments.map(function(s){return s.segment_id;}));var i=1;while(ids.has('S'+i))i++;return 'S'+i;}
function avAddNode(){
  var t=avOrbit.target,id=avNextNodeId();
  avData.nodes.push({node_id:id,location:[Math.round(t.x*100)/100,Math.round(t.y*100)/100,Math.round(t.z*100)/100],alpha:0,beta:0,gamma:0});
  avSelected={type:'node',id:id}; avBuildScene(); avShowProps(); markDirty('available');
}
function avAddSegment(idA,idB){
  var na=avData.nodes.find(function(n){return n.node_id===idA;}),nb=avData.nodes.find(function(n){return n.node_id===idB;});
  if(!na||!nb) return;
  var sid=avNextSegId();
  avData.segments.push({segment_id:sid,type:'line',location_at_end_a:na.location.slice(),location_at_end_b:nb.location.slice(),spline_control_points:[]});
  followLinks[sid]={a:idA,b:idB}; markDirty('available');
}
function avDeleteNode(id){
  Object.keys(followLinks).forEach(function(sid){
    var lk=followLinks[sid];
    if(lk.a===id) lk.a=null;
    if(lk.b===id) lk.b=null;
    if(!lk.a&&!lk.b) delete followLinks[sid];
  });
  avData.nodes=avData.nodes.filter(function(n){return n.node_id!==id;});
  if(avSelected&&avSelected.id===id) avSelected=null;
  avBuildScene(); avShowProps(); markDirty('available');
}
function avDeleteSegment(id){
  followClear(id);
  avData.segments=avData.segments.filter(function(s){return s.segment_id!==id;});
  if(avSelected&&avSelected.id===id) avSelected=null;
  avBuildScene(); avShowProps(); markDirty('available');
}
function avDeleteSelected(){if(!avSelected)return;avSelected.type==='node'?avDeleteNode(avSelected.id):avDeleteSegment(avSelected.id);}
function avSetTool(t){
  avTool=t; avConnectStart=null;
  document.querySelectorAll('[id^=btn-av]').forEach(function(b){b.classList.remove('active-tool');});
  var btn=document.getElementById('btn-av-'+t.replace('-',''));
  if(btn) btn.classList.add('active-tool');
}

function chBuildScene(){

  var rect=document.getElementById('ch-canvas').getBoundingClientRect();
  var m=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  chRay.setFromCamera(m,chCamera);
  var sMeshes=collectRayMeshes(chSegLines);
  var hits=chRay.intersectObjects(sMeshes,true);
  if(!hits.length) return;
  var id=resolveHit(hits[0].object);
  if(!id||!id.id) return;
  var sid=id.id;
  if(chosenList.indexOf(sid)>=0) chosenList=chosenList.filter(function(x){return x!==sid;});
  else chosenList.push(sid);
  chBuildScene(); chShowProps(sid); markDirty('chosen');
});
function chShowProps(id){
  document.getElementById('props-ch').classList.add('props-visible');
  document.getElementById('props-ch-title').textContent='Segment: '+id;
  var chosen=chosenList.indexOf(id)>=0;
  document.getElementById('props-ch-content').innerHTML='<p style="font-size:12px;color:'+(chosen?'#d4a017':'#444')+';margin-top:4px">'+(chosen?'✓ Chosen':'○ Not chosen')+'</p>';
}

// ══════════════════════════════════════════════════════════════════════════════
//  FLATTENED
// ══════════════════════════════════════════════════════════════════════════════
function flatNorm(deg){if(deg===''||deg==null)return null;var n=parseFloat(deg);return isFinite(n)?((n%360)+360)%360:null;}
function flatAutoAngle(i,tot){return Math.round((i/tot)*360);}
function flatRender(){
  var rows=flatData.rows||[];
  rows.forEach(function(row,i){if(row.angle===''||row.angle==null)row.angle=String(flatAutoAngle(i,rows.length));});
  var NS='http://www.w3.org/2000/svg'; flatSvg.innerHTML='';
  var g=document.createElementNS(NS,'g');
  g.setAttribute('transform','translate('+flatPan.x+','+flatPan.y+') scale('+flatScale+')');
  flatSvg.appendChild(g);
  var pts={};
  rows.forEach(function(row){
    var ang=flatNorm(row.angle)||0,len=parseFloat(row.length)||50,sc=20,rad=ang*Math.PI/180;
    var pA=row.pos_a_x&&row.pos_a_y?{x:parseFloat(row.pos_a_x),y:parseFloat(row.pos_a_y)}:{x:0,y:0};
    var pB=row.pos_b_x&&row.pos_b_y?{x:parseFloat(row.pos_b_x),y:parseFloat(row.pos_b_y)}:{x:pA.x+len*sc*Math.cos(rad),y:pA.y-len*sc*Math.sin(rad)};
    pts[row.node_at_end_a]=pA; pts[row.node_at_end_b]=pB;
  });
  rows.forEach(function(row,idx){
    var pA=pts[row.node_at_end_a]||{x:0,y:0},pB=pts[row.node_at_end_b]||{x:50,y:0};
    var isSel=flatSelected===idx;
    function mk(tag,attrs){var el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(function(kv){el.setAttribute(kv[0],kv[1]);});return el;}
    g.appendChild(mk('line',{x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,stroke:isSel?'#ffffff':'#3a6ea5',opacity:isSel?0.25:0.12,'stroke-width':(isSel?10:7)/flatScale,'stroke-linecap':'round'}));
    g.appendChild(mk('line',{x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,stroke:isSel?'#fff':'#3a6ea5','stroke-width':(isSel?2.5:1.8)/flatScale,'stroke-linecap':'round'}));
    var hit=mk('line',{x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,stroke:'transparent','stroke-width':14/flatScale,cursor:'pointer'});
    hit.addEventListener('click',function(){flatSelected=idx;flatRender();flatShowProps(idx);});
    g.appendChild(hit);
    var mx=(pA.x+pB.x)/2,my=(pA.y+pB.y)/2;
    var lbl=mk('text',{x:mx,y:my-9/flatScale,'text-anchor':'middle','font-size':11/flatScale,fill:isSel?'#ccc':'#7a8fa8','pointer-events':'none'});
    lbl.textContent=row.segment_id||''; g.appendChild(lbl);
    var ll=mk('text',{x:mx,y:my+14/flatScale,'text-anchor':'middle','font-size':9/flatScale,fill:'#445060','pointer-events':'none'});
    ll.textContent=row.length?'L:'+row.length:''; g.appendChild(ll);
    [pA,pB].forEach(function(p,ni){
      var nid=ni===0?row.node_at_end_a:row.node_at_end_b;
      g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:5.5/flatScale,fill:'none',stroke:'#c73652','stroke-width':1.5/flatScale,'pointer-events':'none'}));
      g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:2.2/flatScale,fill:'#c73652',opacity:'0.4','pointer-events':'none'}));
      var t=mk('text',{x:p.x,y:p.y-11/flatScale,'text-anchor':'middle','font-size':10/flatScale,fill:'#ccc','pointer-events':'none'});
      t.textContent=nid||''; g.appendChild(t);
    });
  });
}
var flatSvg=document.getElementById('flat-svg');
function flatShowProps(idx){
  var row=(flatData.rows||[])[idx]; if(!row) return;
  document.getElementById('flat-no-sel').style.display='none';
  document.getElementById('flat-prop-id').textContent=row.segment_id||'—';
  document.getElementById('flat-prop-na').textContent=row.node_at_end_a||'—';
  document.getElementById('flat-prop-nb').textContent=row.node_at_end_b||'—';
  document.getElementById('flat-prop-len').textContent=row.length||'—';
  document.getElementById('flat-prop-angle').value=flatNorm(row.angle)||'';
}
function flatAngleChanged(val){
  if(flatSelected==null) return;
  (flatData.rows||[])[flatSelected].angle=val;
  markDirty('flattened'); flatRender();
}
function flatFitView(){flatPan={x:flatSvg.clientWidth/2,y:flatSvg.clientHeight/2};flatScale=1;flatRender();}
flatSvg.addEventListener('mousedown',function(e){if(e.button===1||e.button===2){flatIsPanning=true;flatPanStart={x:e.clientX-flatPan.x,y:e.clientY-flatPan.y};e.preventDefault();}});
window.addEventListener('mousemove',function(e){if(!flatIsPanning)return;flatPan={x:e.clientX-flatPanStart.x,y:e.clientY-flatPanStart.y};flatRender();});
window.addEventListener('mouseup',function(){flatIsPanning=false;});
flatSvg.addEventListener('wheel',function(e){e.preventDefault();flatScale=Math.max(0.05,Math.min(20,flatScale*(e.deltaY>0?0.9:1.1)));flatRender();},{passive:false});
flatSvg.addEventListener('contextmenu',function(e){e.preventDefault();});

// ══════════════════════════════════════════════════════════════════════════════
//  RESIZE & INIT
// ══════════════════════════════════════════════════════════════════════════════
new ResizeObserver(function(){
  if(avRenderer){avOnResize();avRender();}
  if(chRenderer){chOnResize();chRender();}
}).observe(document.getElementById('main'));

requestAnimationFrame(function(){
  initAv(); initCh();
  avOnResize(); chOnResize();
  flatPan={x:(document.getElementById('flat-wrap').clientWidth||800)/2,y:300};
  loadAll().then(function(){
    requestAnimationFrame(function(){avFitView();chFitView();flatFitView();});
  });
});
</script>
</body>
