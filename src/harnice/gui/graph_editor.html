<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harnice Network Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a1a;color:#eee;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:12px;padding:6px 14px;background:#252525;border-bottom:1px solid #404040;flex-shrink:0}
#topbar h1{font-size:13px;color:#bbb;font-weight:normal;margin-right:8px}
#part-rev{font-size:11px;color:#777}
.tabs{display:flex;gap:4px;margin-left:auto}
.tab{padding:5px 16px;border-radius:5px 5px 0 0;cursor:pointer;font-size:12px;background:#333;border:1px solid #404040;border-bottom:none;color:#aaa;transition:background .15s}
.tab.active{background:#1a1a1a;color:#eee;border-color:#666}
.tab:hover:not(.active){background:#3a3a3a}
#main{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;overflow:hidden}
.panel.active{display:flex}
.sidebar{width:260px;min-width:260px;background:#252525;border-right:1px solid #404040;display:flex;flex-direction:column;gap:8px;padding:10px;overflow-y:auto}
.section{background:#2e2e2e;border-radius:6px;padding:9px}
.section h2{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px}
button{background:#444;color:#eee;border:none;border-radius:4px;padding:5px 9px;cursor:pointer;font-size:12px;width:100%;margin-top:4px}
button:hover{background:#555}
button.active-tool{background:#b8860b;color:#fff}
button.danger{background:#5a2020}
button.danger:hover{background:#6e2828}
label{font-size:11px;color:#888;display:block;margin-top:6px}
input{width:100%;padding:4px 7px;border-radius:4px;background:#1a1a1a;border:1px solid #404040;color:#eee;font-size:12px;margin-top:2px}
input:focus{outline:none;border-color:#888}
.row{display:flex;gap:5px}
.row>*{flex:1}
#autosave-indicator{font-size:10px;color:#555;text-align:right;padding:2px 4px}
.viewport{flex:1;position:relative;overflow:hidden}
.viewcube-wrap{position:absolute;top:12px;right:12px;width:84px;z-index:10;}
.viewcube-wrap canvas{display:block;cursor:pointer;}
#flat-wrap{flex:1;position:relative;overflow:hidden}
#flat-svg{width:100%;height:100%;display:block;cursor:default}
.read-only-val{font-size:12px;color:#ccc;padding:3px 0 0 2px;display:block}
#props-av,#props-ch{display:none}
.props-visible{display:block !important}
</style>
</head>
<body>
<div id="topbar">
  <h1>Harnice Network Editor</h1>
  <span id="part-rev"></span>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('available')">Available</div>
    <div class="tab" onclick="switchTab('chosen')">Chosen</div>
    <div class="tab" onclick="switchTab('flattened')">Flattened</div>
  </div>
  <span id="autosave-indicator">●</span>
</div>
<div id="main">
  <!-- AVAILABLE -->
  <div class="panel active" id="panel-available">
    <div class="sidebar">
      <div class="section">
        <h2>Tools</h2>
        <button id="btn-av-select" onclick="avSetTool('select')" class="active-tool">▶ Select</button>
        <button id="btn-av-addnode" onclick="avSetTool('add-node')">＋ Add Node</button>
        <button id="btn-av-addseg" onclick="avSetTool('add-seg')">⟶ Add Segment</button>
        <button id="btn-av-delete" onclick="avSetTool('delete')">✕ Delete</button>
      </div>
      <div class="section" id="props-av">
        <h2 id="props-av-title">Properties</h2>
        <div id="props-av-content"></div>
        <button class="danger" style="margin-top:8px" onclick="avDeleteSelected()">Delete</button>
      </div>
      <div class="section"><h2>View</h2><button onclick="avFitView()">Fit View</button></div>
    </div>
    <div class="viewport" id="av-viewport">
      <canvas id="av-canvas" tabindex="0" style="width:100%;height:100%;display:block"></canvas>
      <div class="viewcube-wrap">
        <canvas id="av-cube-canvas" width="84" height="84"></canvas>

      </div>
    </div>
  </div>
  <!-- CHOSEN -->
  <div class="panel" id="panel-chosen">
    <div class="sidebar">
      <div class="section">
        <h2>Instructions</h2>
        <p style="font-size:11px;color:#888;line-height:1.6">Click a segment to toggle.<br>
        <span style="color:#d4a017">■</span> Chosen &nbsp;<span style="color:#555">■</span> Not chosen<br>
        <span style="color:#c73652">●</span> Resolved nodes</p>
      </div>
      <div class="section" id="props-ch">
        <h2 id="props-ch-title">Selection</h2>
        <div id="props-ch-content"></div>
      </div>
      <div class="section"><h2>View</h2><button onclick="chFitView()">Fit View</button></div>
    </div>
    <div class="viewport" id="ch-viewport">
      <canvas id="ch-canvas" tabindex="0" style="width:100%;height:100%;display:block"></canvas>
      <div class="viewcube-wrap">
        <canvas id="ch-cube-canvas" width="84" height="84"></canvas>

      </div>
    </div>
  </div>
  <!-- FLATTENED -->
  <div class="panel" id="panel-flattened">
    <div class="sidebar">
      <div class="section">
        <h2>Segment</h2>
        <label>ID</label><span class="read-only-val" id="flat-prop-id">—</span>
        <label>Node A</label><span class="read-only-val" id="flat-prop-na">—</span>
        <label>Node B</label><span class="read-only-val" id="flat-prop-nb">—</span>
        <label>Length</label><span class="read-only-val" id="flat-prop-len">—</span>
        <label>Angle (°)</label>
        <input id="flat-prop-angle" type="number" min="0" max="360" step="1" oninput="flatAngleChanged(this.value)">
        <p id="flat-no-sel" style="font-size:11px;color:#666;margin-top:6px">Click a segment to edit its angle.</p>
      </div>
      <div class="section"><h2>View</h2><button onclick="flatFitView()">Fit View</button></div>
    </div>
    <div id="flat-wrap"><svg id="flat-svg"></svg></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

// ── Constants ─────────────────────────────────────────────────────────────────
var C_YELLOW=0xd4a017, C_RED=0xc73652, C_GRAY=0x4a4a4a, C_WHITE=0xffffff;
var AUTOSAVE_MS=3000;

// ── State ─────────────────────────────────────────────────────────────────────
var dirty={available:false,chosen:false,flattened:false};
var saveTimers={};
var currentTab='available';
var avData={segments:[],nodes:[]};
var chosenList=[], chosenNetData=null;
var flatData={fieldnames:[],rows:[]};
var avSelected=null, avTool='select', avConnectStart=null;
var avArrows=[], avDragNode=null, avDragAxis=null, avDragStartMouse=null, avDragStartLoc=null;
var flatPan={x:400,y:300}, flatScale=1, flatIsPanning=false, flatPanStart={x:0,y:0}, flatSelected=null;

var avRenderer, avScene, avCamera, avOrbit, avCube, avNodeMeshes={}, avSegLines={}, avRay;
var chRenderer, chScene, chCamera, chOrbit, chCube, chSegLines={}, chNodeMeshes={}, chRay;

// ── Autosave ──────────────────────────────────────────────────────────────────
function markDirty(tab){
  dirty[tab]=true;
  document.getElementById('autosave-indicator').style.color='#b8860b';
  clearTimeout(saveTimers[tab]);
  saveTimers[tab]=setTimeout(function(){saveTab(tab);},AUTOSAVE_MS);
}
async function saveTab(tab){
  try{
    if(tab==='available') await fetch('/api/available',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(avData)});
    if(tab==='chosen')    await fetch('/api/chosen_list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(chosenList)});
    if(tab==='flattened') await fetch('/api/flattened',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(flatData)});
    dirty[tab]=false;
    if(!Object.values(dirty).some(Boolean)) document.getElementById('autosave-indicator').style.color='#555';
  }catch(e){ document.getElementById('autosave-indicator').style.color='#c73652'; }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['available','chosen','flattened'][i]===t);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('panel-'+t).classList.add('active');
  setTimeout(function(){
    if(t==='available'){avOnResize();avRender();}
    if(t==='chosen'){chOnResize();chRender();}
    if(t==='flattened') flatRender();
  },30);
}

// ── Data load ─────────────────────────────────────────────────────────────────
async function loadAll(){
  var res=await Promise.all([
    fetch('/api/info').then(function(r){return r.json();}).catch(function(){return {};}),
    fetch('/api/available').then(function(r){return r.json();}).catch(function(){return {segments:[],nodes:[]};}),
    fetch('/api/chosen_list').then(function(r){return r.json();}).catch(function(){return [];}),
    fetch('/api/chosen_net').then(function(r){return r.json();}).catch(function(){return null;}),
    fetch('/api/flattened').then(function(r){return r.json();}).catch(function(){return {fieldnames:[],rows:[]};})
  ]);
  var info=res[0];
  if(info.part_number||info.rev)
    document.getElementById('part-rev').textContent=((info.part_number||'')+' '+(info.rev||'')).trim();
  avData=res[1]; chosenList=res[2]||[]; chosenNetData=res[3]; flatData=res[4];
  avBuildScene(); chBuildScene(); flatRender();
}

// ── Three.js helpers ──────────────────────────────────────────────────────────
function makeRenderer(canvas){
  var r=new THREE.WebGLRenderer({canvas:canvas,antialias:true});
  r.setPixelRatio(window.devicePixelRatio);
  r.setClearColor(0x1a1a1a);
  return r;
}
function makeCamera(){
  var c=new THREE.PerspectiveCamera(45,1,0.001,10000);
  c.position.set(0,0,30); c.up.set(0,1,0); c.lookAt(0,0,0);
  return c;
}
function makeWorldAxes(size){
  var g=new THREE.Group();
  function addAxis(dir,col){
    var geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0),dir.clone().multiplyScalar(size)]);
    g.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:col,linewidth:2})));
    var cone=new THREE.Mesh(new THREE.ConeGeometry(size*0.04,size*0.15,8),new THREE.MeshBasicMaterial({color:col}));
    cone.position.copy(dir.clone().multiplyScalar(size));
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
    g.add(cone);
  }
  addAxis(new THREE.Vector3(1,0,0),0xff3333);
  addAxis(new THREE.Vector3(0,1,0),0x44cc44);
  addAxis(new THREE.Vector3(0,0,1),0x4499ff);
  return g;
}

// ══════════════════════════════════════════════════════════════════════════════
//  STANDALONE-STYLE VIEW CUBE  (ported from the standalone viewer)
//  Each instance has its own cam state {fwd, up} that tracks the Three.js
//  orbit camera, plus drag-to-rotate on the cube canvas itself.
// ══════════════════════════════════════════════════════════════════════════════
function cv3(x,y,z){return{x:x,y:y,z:z};}
function cvadd(a,b){return cv3(a.x+b.x,a.y+b.y,a.z+b.z);}
function cvscale(v,s){return cv3(v.x*s,v.y*s,v.z*s);}
function cvdot(a,b){return a.x*b.x+a.y*b.y+a.z*b.z;}
function cvnorm(v){var l=Math.sqrt(cvdot(v,v))||1;return cvscale(v,1/l);}
function cvcross(a,b){return cv3(a.y*b.z-a.z*b.y,a.z*b.x-a.x*b.z,a.x*b.y-a.y*b.x);}
function cvlerp(a,b,t){return cvadd(cvscale(a,1-t),cvscale(b,t));}
function cvrotAxis(v,ax,c,s){return cvadd(cvadd(cvscale(v,c),cvscale(cvcross(ax,v),s)),cvscale(ax,cvdot(ax,v)*(1-c)));}
function cvOrthogonalize(cam){cam.fwd=cvnorm(cam.fwd);var r=cvnorm(cvcross(cam.fwd,cam.up));cam.up=cvnorm(cvcross(r,cam.fwd));}

// Face definitions: name, outward normal, snapFwd (camera looks FROM this dir),
// snapUp (camera up when snapped to this face)
var CV_FACE_DEFS=[
  {name:'Right',  normal:cv3( 1, 0, 0), snapFwd:cv3(-1, 0, 0), snapUp:cv3(0,0,1)},
  {name:'Left',   normal:cv3(-1, 0, 0), snapFwd:cv3( 1, 0, 0), snapUp:cv3(0,0,1)},
  {name:'Back',   normal:cv3( 0, 1, 0), snapFwd:cv3( 0,-1, 0), snapUp:cv3(0,0,1)},
  {name:'Front',  normal:cv3( 0,-1, 0), snapFwd:cv3( 0, 1, 0), snapUp:cv3(0,0,1)},
  {name:'Top',    normal:cv3( 0, 0, 1), snapFwd:cv3( 0, 0,-1), snapUp:cv3(0,1,0)},
  {name:'Bottom', normal:cv3( 0, 0,-1), snapFwd:cv3( 0, 0, 1), snapUp:cv3(0,1,0)},
];

var CV_GAP=0.15, CV_T=0.02, CV_AX_LEN=1.18;
var CV_AXES=[
  {dir:cv3(1,0,0),color:'#ff4444',label:'X'},
  {dir:cv3(0,1,0),color:'#44cc44',label:'Y'},
  {dir:cv3(0,0,1),color:'#4499ff',label:'Z'},
];

function cvBuildSlab(fd){
  // Derive axis and side from the normal vector directly, not from the name
  var n=fd.normal;
  var ax= n.x!==0 ? 0 : n.y!==0 ? 1 : 2;
  var hi= (ax===0?n.x:ax===1?n.y:n.z) > 0 ? 1 : 0;
  var outer=hi?1.0:0.0, inner=hi?1.0-CV_T:CV_T;
  var ta=ax===0?1:0, tb=ax===0?2:ax===1?2:1;
  var lo=CV_GAP, hi2=1-CV_GAP;
  function pt(a0,a1,a2){var r=[0,0,0];r[ax]=a0;r[ta]=a1;r[tb]=a2;return cv3(r[0],r[1],r[2]);}
  var inNorm=cvscale(fd.normal,-1);
  var quads=[];
  quads.push({pts:[pt(outer,lo,lo),pt(outer,hi2,lo),pt(outer,hi2,hi2),pt(outer,lo,hi2)],normal:fd.normal,shade:1.0,isOuter:true});
  quads.push({pts:[pt(inner,lo,lo),pt(inner,lo,hi2),pt(inner,hi2,hi2),pt(inner,hi2,lo)],normal:inNorm,shade:0.6});
  [{pts:[pt(outer,lo,lo),pt(inner,lo,lo),pt(inner,lo,hi2),pt(outer,lo,hi2)],ni:ta,ns:-1},
   {pts:[pt(outer,hi2,lo),pt(outer,hi2,hi2),pt(inner,hi2,hi2),pt(inner,hi2,lo)],ni:ta,ns:1},
   {pts:[pt(outer,lo,lo),pt(outer,hi2,lo),pt(inner,hi2,lo),pt(inner,lo,lo)],ni:tb,ns:-1},
   {pts:[pt(outer,lo,hi2),pt(inner,lo,hi2),pt(inner,hi2,hi2),pt(outer,hi2,hi2)],ni:tb,ns:1},
  ].forEach(function(s){var n=[0,0,0];n[s.ni]=s.ns;quads.push({pts:s.pts,normal:cv3(n[0],n[1],n[2]),shade:0.75});});
  return quads;
}

function makeViewCube(canvasEl, getThreeCam, onSnapRequest){
  var S=canvasEl.width;
  var DS=0.55; // display scale (matches standalone)
  var ctx=canvasEl.getContext('2d');

  // Internal cam state — mirrors the Three.js camera orientation
  var cam={fwd:cv3(0,0,-1), up:cv3(0,1,0)};

  function syncFromThree(){
    var tc=getThreeCam();
    var fwd=new THREE.Vector3(); tc.getWorldDirection(fwd);
    // Convert THREE.Vector3 → plain cv3
    cam.fwd=cv3(fwd.x,fwd.y,fwd.z);
    cam.up=cv3(tc.up.x,tc.up.y,tc.up.z);
    cvOrthogonalize(cam);
  }

  function project(v){
    var cv=cv3(v.x-0.5,v.y-0.5,v.z-0.5);
    var right=cvnorm(cvcross(cam.fwd,cam.up));
    return{
      x: S/2+cvdot(cv,right)*S*DS,
      y: S/2-cvdot(cv,cam.up)*S*DS,
      depth: cvdot(cv,cam.fwd)
    };
  }

  function draw(){
    syncFromThree();
    ctx.clearRect(0,0,S,S);

    // Collect all visible quads from all 6 face slabs
    var allQuads=[];
    CV_FACE_DEFS.forEach(function(fd){
      cvBuildSlab(fd).forEach(function(q){
        if(cvdot(q.normal,cam.fwd)<0.02){
          var pts2d=q.pts.map(project);
          var avgDepth=pts2d.reduce(function(s,p){return s+p.depth;},0)/pts2d.length;
          allQuads.push({pts2d:pts2d,shade:q.shade,avgDepth:avgDepth,labelName:q.isOuter?fd.name:null});
        }
      });
    });
    allQuads.sort(function(a,b){return b.avgDepth-a.avgDepth;});

    // Axes (drawn before faces so faces paint over back-facing axis stubs)
    var orig2d=project(cv3(0,0,0));
    CV_AXES.map(function(ax){return{ax:ax,tip2d:project(cvscale(ax.dir,CV_AX_LEN))};})
      .sort(function(a,b){return b.tip2d.depth-a.tip2d.depth;})
      .forEach(function(item){
        var tip=item.tip2d,ax=item.ax;
        ctx.globalAlpha=tip.depth<0.02?1.0:0.22;
        ctx.strokeStyle=ax.color;ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(orig2d.x,orig2d.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
        var dx=tip.x-orig2d.x,dy=tip.y-orig2d.y,l=Math.hypot(dx,dy)||1,ux=dx/l,uy=dy/l;
        ctx.fillStyle=ax.color;
        ctx.beginPath();ctx.moveTo(tip.x,tip.y);
        ctx.lineTo(tip.x-ux*7-uy*3.5,tip.y-uy*7+ux*3.5);
        ctx.lineTo(tip.x-ux*7+uy*3.5,tip.y-uy*7-ux*3.5);
        ctx.closePath();ctx.fill();
        ctx.globalAlpha=tip.depth<0.02?1.0:0.35;
        ctx.fillStyle=ax.color;ctx.font='bold 10px sans-serif';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(ax.label,tip.x+ux*12,tip.y+uy*12);
      });
    ctx.globalAlpha=1.0;

    // Face quads (depth sorted)
    allQuads.forEach(function(q){
      var pts=q.pts2d,b=Math.round(80+q.shade*120);
      ctx.fillStyle=q.labelName?'rgb('+b+','+b+','+b+')':'#2255cc';
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
      ctx.closePath();ctx.fill();
    });

    // Face labels (second pass so they're on top)
    allQuads.forEach(function(q){
      if(!q.labelName)return;
      var pts=q.pts2d,cx=0,cy=0;
      pts.forEach(function(p){cx+=p.x;cy+=p.y;});cx/=4;cy/=4;
      ctx.fillStyle='#1a1a1a';ctx.font='bold 9px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(q.labelName,cx,cy);
    });
  }

  // Click on cube face → snap
  var lastMoved=false;
  canvasEl.addEventListener('mousedown',function(){lastMoved=false;});
  canvasEl.addEventListener('click',function(e){
    if(lastMoved)return;
    syncFromThree();
    var rect=canvasEl.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
    var best=null,bestDist=Infinity;
    CV_FACE_DEFS.forEach(function(fd){
      if(cvdot(fd.normal,cam.fwd)>=0.02)return;
      var cp=project(cvadd(cv3(0.5,0.5,0.5),cvscale(fd.normal,0.5)));
      var d=Math.hypot(cp.x-mx,cp.y-my);
      if(d<bestDist){bestDist=d;best=fd;}
    });
    if(best&&bestDist<S*0.45)onSnapRequest(best.name);
  });

  return {draw:draw};
}

// ── CUBE_FACES used by animateCameraToFace ────────────────────────────────────
// Maps face name → Three.js normal + up vectors for the orbit snap
var CUBE_FACES=[
  {name:'Front',  normal:new THREE.Vector3( 0,-1, 0), up:new THREE.Vector3(0,0,1)},
  {name:'Back',   normal:new THREE.Vector3( 0, 1, 0), up:new THREE.Vector3(0,0,1)},
  {name:'Right',  normal:new THREE.Vector3( 1, 0, 0), up:new THREE.Vector3(0,0,1)},
  {name:'Left',   normal:new THREE.Vector3(-1, 0, 0), up:new THREE.Vector3(0,0,1)},
  {name:'Top',    normal:new THREE.Vector3( 0, 0, 1), up:new THREE.Vector3(0,1,0)},
  {name:'Bottom', normal:new THREE.Vector3( 0, 0,-1), up:new THREE.Vector3(0,1,0)},
];

// ── Smooth camera snap ────────────────────────────────────────────────────────
function animateCameraToFace(orbit,face){
  var dist=orbit.state.dist;
  var endPos=face.normal.clone().multiplyScalar(dist).add(orbit.state.target);
  var startPos=orbit.camera.position.clone();
  var startUp=orbit.camera.up.clone();
  var t0=performance.now(), dur=400;
  function step(now){
    var t=Math.min((now-t0)/dur,1);
    var ease=t<0.5?2*t*t:-1+(4-2*t)*t;
    orbit.camera.position.lerpVectors(startPos,endPos,ease);
    orbit.camera.up.lerpVectors(startUp,face.up,ease).normalize();
    orbit.camera.lookAt(orbit.state.target);
    var rel=orbit.camera.position.clone().sub(orbit.state.target);
    orbit.state.phi=Math.acos(Math.max(-1,Math.min(1,rel.y/rel.length())));
    orbit.state.theta=Math.atan2(rel.z,rel.x);
    orbit.renderFn();
    if(t<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Snap by name (buttons) ────────────────────────────────────────────────────
function avSnapTo(name){var f=CUBE_FACES.find(function(f){return f.name===name;});if(f)animateCameraToFace(avOrbit,f);}
function chSnapTo(name){var f=CUBE_FACES.find(function(f){return f.name===name;});if(f)animateCameraToFace(chOrbit,f);}

// ── Orbit controller ──────────────────────────────────────────────────────────
function makeOrbit(camera,domEl,renderFn){
  var state={btn:-1,last:{x:0,y:0},target:new THREE.Vector3(),dist:30};
  var rel=camera.position.clone().sub(state.target);
  state.phi=Math.acos(Math.max(-1,Math.min(1,rel.y/rel.length())));
  state.theta=Math.atan2(rel.z,rel.x);

  function apply(){
    var r=state.dist;
    camera.position.set(
      state.target.x+r*Math.sin(state.phi)*Math.cos(state.theta),
      state.target.y+r*Math.cos(state.phi),
      state.target.z+r*Math.sin(state.phi)*Math.sin(state.theta)
    );
    camera.lookAt(state.target);
    renderFn();
  }

  domEl.addEventListener('mousedown',function(e){
    if(e.button===0||e.button===2){state.btn=e.button;state.last={x:e.clientX,y:e.clientY};e.preventDefault();}
  });
  window.addEventListener('mousemove',function(e){
    if(state.btn<0) return;
    var dx=e.clientX-state.last.x, dy=e.clientY-state.last.y;
    state.last={x:e.clientX,y:e.clientY};
    if(state.btn===0){
      state.theta+=dx*0.008;
      state.phi=Math.max(0.01,Math.min(Math.PI-0.01,state.phi-dy*0.008));
    } else {
      var fwd=new THREE.Vector3(); camera.getWorldDirection(fwd);
      var right=new THREE.Vector3().crossVectors(fwd,camera.up).normalize();
      var up2=right.clone().cross(fwd).normalize();
      var spd=state.dist*0.0008;
      state.target.addScaledVector(right,-dx*spd);
      state.target.addScaledVector(up2,dy*spd);
    }
    apply();
  });
  window.addEventListener('mouseup',function(){state.btn=-1;});
  domEl.addEventListener('wheel',function(e){
    state.dist=Math.max(0.05,state.dist*(1+e.deltaY*0.001));
    apply(); e.preventDefault();
  },{passive:false});
  domEl.addEventListener('contextmenu',function(e){e.preventDefault();});

  var self={state:state,camera:camera,renderFn:renderFn,update:apply};
  self.fitToBox=function(box){
    var sz=box.getSize(new THREE.Vector3()).length()||10;
    box.getCenter(state.target); state.dist=sz*1.4; apply();
  };
  apply();
  return self;
}

function makeSegLine(seg,color,width){
  var geo=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...seg.location_at_end_a),new THREE.Vector3(...seg.location_at_end_b)]);
  var line=new THREE.Line(geo,new THREE.LineBasicMaterial({color:color,linewidth:width||2}));
  line.userData={type:'segment',id:seg.segment_id}; return line;
}
function makeNodeSphere(loc,color,r){
  r=r||0.15;
  var mesh=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),new THREE.MeshLambertMaterial({color:color}));
  mesh.position.set(loc[0],loc[1],loc[2]); return mesh;
}

function avBuildScene(){

document.getElementById('av-canvas').addEventListener('click',function(e){
  if(avDragAxis) return;
  var rect=document.getElementById('av-canvas').getBoundingClientRect();
  var m=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  avRay.setFromCamera(m,avCamera);
  if(avTool==='add-node'){avAddNode();return;}
  var nHits=avRay.intersectObjects(Object.values(avNodeMeshes));
  var sHits=avRay.intersectObjects(Object.values(avSegLines));
  var hit=nHits.length?nHits[0].object.userData:sHits.length?sHits[0].object.userData:null;
  if(avTool==='delete'&&hit){hit.type==='node'?avDeleteNode(hit.id):avDeleteSegment(hit.id);return;}
  if(avTool==='add-seg'&&hit&&hit.type==='node'){
    if(!avConnectStart){
      avConnectStart=hit.id;
      if(avNodeMeshes[hit.id]) avNodeMeshes[hit.id].material.color.set(0xffa500);
      avRender();
    } else if(avConnectStart!==hit.id){
      avAddSegment(avConnectStart,hit.id); avConnectStart=null; avBuildScene();
    }
    return;
  }
  avSelected=hit||null; avBuildScene(); avShowProps();
});

document.getElementById('av-canvas').addEventListener('mousedown',function(e){
  if(avTool!=='select'||!avSelected||avSelected.type!=='node') return;
  var rect=document.getElementById('av-canvas').getBoundingClientRect();
  var m=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
  avRay.setFromCamera(m,avCamera);
  var cones=avArrows.filter(function(a){return a.geometry&&a.geometry.type==='ConeGeometry';});
  var hits=avRay.intersectObjects(cones);
  if(!hits.length) return;
  avDragAxis=hits[0].object.userData.axis;
  avDragNode=avSelected.id;
  avDragStartMouse={x:e.clientX,y:e.clientY};
  var node=avData.nodes.find(function(n){return n.node_id===avDragNode;});
  avDragStartLoc=node?node.location.slice():null;
  e.stopPropagation();
});

window.addEventListener('mousemove',function(e){
  if(!avDragNode||!avDragAxis||!avDragStartLoc) return;
  var node=avData.nodes.find(function(n){return n.node_id===avDragNode;});
  if(!node) return;
  var axDirs={x:new THREE.Vector3(1,0,0),y:new THREE.Vector3(0,1,0),z:new THREE.Vector3(0,0,1)};
  var axDir=axDirs[avDragAxis];
  var nodePos=new THREE.Vector3(avDragStartLoc[0],avDragStartLoc[1],avDragStartLoc[2]);
  function toScreen(v){var c=v.clone().project(avCamera);return new THREE.Vector2(c.x,c.y);}
  var screenDir=toScreen(nodePos.clone().add(axDir)).sub(toScreen(nodePos)).normalize();
  var rect=document.getElementById('av-canvas').getBoundingClientRect();
  var dm=new THREE.Vector2((e.clientX-avDragStartMouse.x)/rect.width*2,-(e.clientY-avDragStartMouse.y)/rect.height*2);
  var delta=dm.dot(screenDir)*avOrbit.state.dist*0.7;
  var idx={x:0,y:1,z:2}[avDragAxis];
  node.location=avDragStartLoc.slice();
  node.location[idx]=Math.round((avDragStartLoc[idx]+delta)*1000)/1000;
  avBuildScene(); avShowProps(); markDirty('available');
});

window.addEventListener('mouseup',function(){avDragNode=null;avDragAxis=null;avDragStartLoc=null;avDragStartMouse=null;});

function avShowArrows(node){
  avArrows.forEach(function(a){avScene.remove(a);}); avArrows=[];
  var pos=new THREE.Vector3(node.location[0],node.location[1],node.location[2]);
  var len=avOrbit.state.dist*0.10;
  [{axis:'x',dir:[1,0,0],col:0xff3333},{axis:'y',dir:[0,1,0],col:0x44cc44},{axis:'z',dir:[0,0,1],col:0x4499ff}].forEach(function(ax){
    var end=pos.clone().add(new THREE.Vector3(ax.dir[0],ax.dir[1],ax.dir[2]).multiplyScalar(len));
    var line=new THREE.Line(new THREE.BufferGeometry().setFromPoints([pos,end]),new THREE.LineBasicMaterial({color:ax.col,linewidth:3}));
    line.userData={axis:ax.axis};
    var cone=new THREE.Mesh(new THREE.ConeGeometry(len*0.07,len*0.18,8),new THREE.MeshLambertMaterial({color:ax.col}));
    cone.position.copy(end);
    cone.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(ax.dir[0],ax.dir[1],ax.dir[2]));
    cone.userData={axis:ax.axis};
    avArrows.push(line,cone); avScene.add(line,cone);
  });
  avRender();
}

function avNextNodeId(){var ids=new Set(avData.nodes.map(function(n){return n.node_id;}));var i=1;while(ids.has('N'+i))i++;return 'N'+i;}
function avNextSegId(){var ids=new Set(avData.segments.map(function(s){return s.segment_id;}));var i=1;while(ids.has('S'+i))i++;return 'S'+i;}
function avAddNode(){
  var t=avOrbit.state.target;
  var id=avNextNodeId();
  avData.nodes.push({node_id:id,location:[Math.round(t.x*100)/100,Math.round(t.y*100)/100,Math.round(t.z*100)/100],alpha:null,beta:null,gamma:null});
  avSelected={type:'node',id:id}; avBuildScene(); avShowProps(); markDirty('available');
}
function avAddSegment(idA,idB){
  var na=avData.nodes.find(function(n){return n.node_id===idA;}), nb=avData.nodes.find(function(n){return n.node_id===idB;});
  if(!na||!nb) return;
  avData.segments.push({segment_id:avNextSegId(),type:'line',location_at_end_a:na.location.slice(),location_at_end_b:nb.location.slice(),spline_control_points:[]});
  markDirty('available');
}
function avDeleteNode(id){
  avData.nodes=avData.nodes.filter(function(n){return n.node_id!==id;});

  avBuildScene(); avShowProps(); markDirty('available');
}
function avDeleteSegment(id){
  avData.segments=avData.segments.filter(function(s){return s.segment_id!==id;});
  if(avSelected&&avSelected.id===id) avSelected=null;

    function upd(){
      s.segment_id=document.getElementById('psid').value;
      s.location_at_end_a=[parseFloat(document.getElementById('psax').value)||0,parseFloat(document.getElementById('psay').value)||0,parseFloat(document.getElementById('psaz').value)||0];

function flatNorm(deg){if(deg===''||deg==null)return null;var n=parseFloat(deg);return isFinite(n)?((n%360)+360)%360:null;}
function flatAutoAngle(i,tot){return Math.round((i/tot)*360);}
function flatRender(){
  var rows=flatData.rows||[];
  rows.forEach(function(row,i){if(row.angle===''||row.angle==null)row.angle=String(flatAutoAngle(i,rows.length));});
  var NS='http://www.w3.org/2000/svg'; flatSvg.innerHTML='';
  var g=document.createElementNS(NS,'g');
  g.setAttribute('transform','translate('+flatPan.x+','+flatPan.y+') scale('+flatScale+')');
  flatSvg.appendChild(g);
  var pts={};
  rows.forEach(function(row){
    var ang=flatNorm(row.angle)||0, len=parseFloat(row.length)||50, sc=20, rad=ang*Math.PI/180;
    var pA=row.pos_a_x&&row.pos_a_y?{x:parseFloat(row.pos_a_x),y:parseFloat(row.pos_a_y)}:{x:0,y:0};
    var pB=row.pos_b_x&&row.pos_b_y?{x:parseFloat(row.pos_b_x),y:parseFloat(row.pos_b_y)}:{x:pA.x+len*sc*Math.cos(rad),y:pA.y-len*sc*Math.sin(rad)};
    pts[row.node_at_end_a]=pA; pts[row.node_at_end_b]=pB;
  });
  rows.forEach(function(row,idx){
    var pA=pts[row.node_at_end_a]||{x:0,y:0}, pB=pts[row.node_at_end_b]||{x:50,y:0};
    var isSel=flatSelected===idx;
    function mk(tag,attrs){var el=document.createElementNS(NS,tag);Object.entries(attrs).forEach(function(kv){el.setAttribute(kv[0],kv[1]);});return el;}
    g.appendChild(mk('line',{x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,stroke:isSel?'#fff':'#888','stroke-width':(isSel?3.5:2.5)/flatScale}));
    var hit=mk('line',{x1:pA.x,y1:pA.y,x2:pB.x,y2:pB.y,stroke:'transparent','stroke-width':14/flatScale,cursor:'pointer'});
    hit.addEventListener('click',function(){flatSelected=idx;flatRender();flatShowProps(idx);});
    g.appendChild(hit);
    var mx=(pA.x+pB.x)/2, my=(pA.y+pB.y)/2;
    var lbl=mk('text',{x:mx,y:my-9/flatScale,'text-anchor':'middle','font-size':11/flatScale,fill:'#aaa','pointer-events':'none'});
    lbl.textContent=row.segment_id||''; g.appendChild(lbl);
    var ll=mk('text',{x:mx,y:my+14/flatScale,'text-anchor':'middle','font-size':9/flatScale,fill:'#666','pointer-events':'none'});
    ll.textContent=row.length?'L:'+row.length:''; g.appendChild(ll);
    [pA,pB].forEach(function(p,ni){
      var nid=ni===0?row.node_at_end_a:row.node_at_end_b;
      g.appendChild(mk('circle',{cx:p.x,cy:p.y,r:4.5/flatScale,fill:'#c73652','pointer-events':'none'}));
      var t=mk('text',{x:p.x,y:p.y-9/flatScale,'text-anchor':'middle','font-size':10/flatScale,fill:'#eee','pointer-events':'none'});
      t.textContent=nid||''; g.appendChild(t);
    });
  });
}

window.addEventListener('mousemove',function(e){if(!flatIsPanning)return;flatPan={x:e.clientX-flatPanStart.x,y:e.clientY-flatPanStart.y};flatRender();});
window.addEventListener('mouseup',function(){flatIsPanning=false;});
flatSvg.addEventListener('wheel',function(e){e.preventDefault();flatScale=Math.max(0.05,Math.min(20,flatScale*(e.deltaY>0?0.9:1.1)));flatRender();},{passive:false});
flatSvg.addEventListener('contextmenu',function(e){e.preventDefault();});

// ═══════════════════════════════════════════════════════
//  RESIZE & INIT
// ═══════════════════════════════════════════════════════
new ResizeObserver(function(){
  if(avRenderer){avOnResize();avRender();}
  if(chRenderer){chOnResize();chRender();}
}).observe(document.getElementById('main'));

requestAnimationFrame(function(){
  initAv();
  initCh();
  avOnResize();
  chOnResize();
  flatPan={x:(document.getElementById('flat-wrap').clientWidth||800)/2,y:300};
  loadAll().then(function(){
    requestAnimationFrame(function(){
      avFitView(); chFitView(); flatFitView();
    });
  });
});
</script>
</body>
</html>
