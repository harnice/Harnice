  </div>

  <script>
    // ============================================================
    // Per-file state: { rows, headers, sortCol, sortDir, colFilters, search }
    // key = file key (e.g. "instances list"); keyToLabel[key] = tab display text
    // ============================================================
    const fileStates = {};
    const keyToLabel = {};
    let activeLabel = null;   // current file key
    const CHANNEL_MAP_KEY = 'channel map';
    const DISCONNECT_MAP_KEY = 'disconnect map';
    const CIRCUITS_LIST_KEY = 'circuits list';
    const BOM_KEY = 'bom';
    const INSTANCES_LIST_KEY = 'instances list';
    const POST_HARNESS_INSTANCES_LIST_KEY = 'post harness instances list';
    let instancesListSourceKey = INSTANCES_LIST_KEY;
    let channelTypeCompatibleCache = {};
    const CHANNEL_TYPE_HEADERS = ['from_channel_type', 'to_channel_type', 'A-side_device_channel_type', 'B-side_device_channel_type'];
    let channelTypeDisplayCache = {};
    let useHumanReadableChannelTypes = false;

    function getDataKey() {
      return (activeLabel === INSTANCES_LIST_KEY) ? instancesListSourceKey : activeLabel;
    }

    function fetchChannelTypeDisplays(typeStrings) {
      if (!typeStrings || !typeStrings.length) return Promise.resolve({});
      const url = '/api/channel-type-display?' + typeStrings.map(t => 'type=' + encodeURIComponent(t)).join('&');
      return fetch(url)
        .then(r => r.json())
        .then(map => {
          Object.assign(channelTypeDisplayCache, map);
          return map;
        })
        .catch(() => ({}));
    }

    function getChannelTypeDisplay(raw) {
      if (!raw || !useHumanReadableChannelTypes) return raw ?? '';
      const key = (typeof raw === 'string') ? raw.trim() : String(raw);
      return (channelTypeDisplayCache[key] ?? key) || '';
    }

    function isChannelTypeColumn(headerName) {
      return CHANNEL_TYPE_HEADERS.includes(headerName);
    }

    function getState(label) {
      if (!fileStates[label]) {
        fileStates[label] = { rows: [], headers: [], sortCol: -1, sortDir: 1, colFilters: [], search: '' };
      }
      return fileStates[label];
    }

    // ---- Parse TSV/CSV text into { headers, rows } ----
    function parseText(text) {
      if (!text || !text.trim()) return { headers: [], rows: [] };
      const sep = text.includes('\t') ? '\t' : ',';
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(sep).map(h => h.trim());
      const rows = lines.slice(1).filter(l => l.trim()).map(l => l.split(sep).map(c => c.trim()));
      return { headers, rows };
    }

    // ---- Load a file into state, preserving filters/sort where columns still match ----
    function applyFileContent(label, text) {
      const st = getState(label);
      const { headers, rows } = parseText(text);

      // Preserve col filters if headers are identical
      const sameHeaders = headers.length === st.headers.length && headers.every((h, i) => h === st.headers[i]);
      if (!sameHeaders) {
        st.colFilters = headers.map(() => null);
        st.sortCol = -1;
      } else {
        // Extend if new columns added (shouldn't happen but safe)
        while (st.colFilters.length < headers.length) st.colFilters.push(null);
      }
      st.headers = headers;
      st.rows = rows;
    }

    function channelColIdx(st, name) {
      const i = st.headers.indexOf(name);
      return i >= 0 ? i : -1;
    }

    function applyChannelFilters(st, rows) {
      const netCol = channelColIdx(st, 'merged_net');
      const fromDevCol = channelColIdx(st, 'from_device_refdes');
      const fromChanCol = channelColIdx(st, 'from_device_channel_id');
      const toDevCol = channelColIdx(st, 'to_device_refdes');
      const toChanCol = channelColIdx(st, 'to_device_channel_id');
      const fromTypeCol = channelColIdx(st, 'from_channel_type');

      if (!document.getElementById('ch-unmapped').checked) {
        const filled = (v) => v !== undefined && v !== null && String(v).trim() !== '';
        rows = rows.filter(r => filled(r[toDevCol]) && filled(r[toChanCol]));
      }

      const netVal = document.getElementById('ch-net').value;
      const devAVal = document.getElementById('ch-dev-a').value;
      const chanAVal = document.getElementById('ch-chan-a').value;
      const devBVal = document.getElementById('ch-dev-b').value;
      const chanBVal = document.getElementById('ch-chan-b').value;

      if (netVal && netCol >= 0) {
        rows = rows.filter(r => (r[netCol] ?? '').trim() === netVal);
      }

      const fromDev = (r) => (r[fromDevCol] ?? '').trim();
      const toDev = (r) => (r[toDevCol] ?? '').trim();
      const fromChan = (r) => (r[fromChanCol] ?? '').trim();
      const toChan = (r) => (r[toChanCol] ?? '').trim();
      const pairOnFrom = (r, dev, chan) =>
        (dev === '' || fromDev(r) === dev) && (chan === '' || fromChan(r) === chan);
      const pairOnTo = (r, dev, chan) =>
        (dev === '' || toDev(r) === dev) && (chan === '' || toChan(r) === chan);
      const oneEndMatches = (r, dev, chan) => pairOnFrom(r, dev, chan) || pairOnTo(r, dev, chan);
      const pair1Set = devAVal !== '' || chanAVal !== '';
      const pair2Set = devBVal !== '' || chanBVal !== '';

      if (pair1Set && pair2Set) {
        rows = rows.filter(r =>
          (pairOnFrom(r, devAVal, chanAVal) && pairOnTo(r, devBVal, chanBVal)) ||
          (pairOnFrom(r, devBVal, chanBVal) && pairOnTo(r, devAVal, chanAVal))
        );
      } else if (pair1Set) {
        rows = rows.filter(r => oneEndMatches(r, devAVal, chanAVal));
      } else if (pair2Set) {
        rows = rows.filter(r => oneEndMatches(r, devBVal, chanBVal));
      }

      const typeRel = document.getElementById('ch-type-rel').value;
      const typeVal = document.getElementById('ch-type-val').value;
      if (typeRel === 'is_or_compatible' && typeVal && fromTypeCol >= 0) {
        const rowType = (r) => (r[fromTypeCol] ?? '').trim();
        const allowed = channelTypeCompatibleCache[typeVal];
        if (allowed && allowed.size) {
          rows = rows.filter(r => allowed.has(rowType(r)));
        } else {
          rows = rows.filter(r => rowType(r) === typeVal);
        }
      }

      return rows;
    }

    function buildChannelDropdowns() {
      const st = getState(CHANNEL_MAP_KEY);
      if (!st.headers.length) return;
      const netCol = channelColIdx(st, 'merged_net');
      const fromDevCol = channelColIdx(st, 'from_device_refdes');
      const fromChanCol = channelColIdx(st, 'from_device_channel_id');
      const toDevCol = channelColIdx(st, 'to_device_refdes');
      const toChanCol = channelColIdx(st, 'to_device_channel_id');
      const fromTypeCol = channelColIdx(st, 'from_channel_type');

      function uniques(colIdx) {
        if (colIdx < 0) return [];
        const set = new Set(st.rows.map(r => (r[colIdx] ?? '').trim()).filter(Boolean));
        return [...set].sort((a, b) => a.localeCompare(b));
      }
      function uniquesEither(colA, colB) {
        const set = new Set();
        if (colA >= 0) st.rows.forEach(r => { const v = (r[colA] ?? '').trim(); if (v) set.add(v); });
        if (colB >= 0) st.rows.forEach(r => { const v = (r[colB] ?? '').trim(); if (v) set.add(v); });
        return [...set].sort((a, b) => a.localeCompare(b));
      }

      function fillSelect(id, options, anyLabel, preserve, displayMap) {
        const el = document.getElementById(id);
        const cur = preserve ? el.value : null;
        el.innerHTML = '';
        const anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = anyLabel;
        el.appendChild(anyOpt);
        options.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = (displayMap && displayMap[v] !== undefined ? displayMap[v] : v);
          el.appendChild(opt);
        });
        if (preserve && cur !== null && (cur === '' || options.includes(cur))) el.value = cur;
      }

      fillSelect('ch-net', netCol >= 0 ? uniques(netCol) : [], 'any merged net', true);
      fillSelect('ch-dev-a', uniquesEither(fromDevCol, toDevCol), 'any device', true);
      fillSelect('ch-chan-a', uniquesEither(fromChanCol, toChanCol), 'any channel', true);
      fillSelect('ch-dev-b', uniquesEither(fromDevCol, toDevCol), 'any device', true);
      fillSelect('ch-chan-b', uniquesEither(fromChanCol, toChanCol), 'any channel', true);
      const chTypeOpts = fromTypeCol >= 0 ? uniques(fromTypeCol) : [];
      if (useHumanReadableChannelTypes && chTypeOpts.length) {
        fetchChannelTypeDisplays(chTypeOpts).then(() => fillSelect('ch-type-val', chTypeOpts, '—', true, channelTypeDisplayCache));
      } else {
        fillSelect('ch-type-val', chTypeOpts, '—', true);
      }
    }

    function applyDisconnectFilters(st, rows) {
      const aDevCol = channelColIdx(st, 'A-side_device_refdes');
      const aChanCol = channelColIdx(st, 'A-side_device_channel_id');
      const bDevCol = channelColIdx(st, 'B-side_device_refdes');
      const bChanCol = channelColIdx(st, 'B-side_device_channel_id');
      const discCol = channelColIdx(st, 'disconnect_refdes');
      const discChanCol = channelColIdx(st, 'disconnect_channel_id');
      const aTypeCol = channelColIdx(st, 'A-side_device_channel_type');
      const bTypeCol = channelColIdx(st, 'B-side_device_channel_type');

      if (!document.getElementById('dc-available').checked) {
        const filled = (v) => v !== undefined && v !== null && String(v).trim() !== '';
        rows = rows.filter(r => filled(r[aDevCol]) && filled(r[bDevCol]));
      }

      const discVal = document.getElementById('dc-disc').value;
      const discChanVal = document.getElementById('dc-disc-chan').value;
      if (discCol >= 0 && discVal) {
        rows = rows.filter(r => (r[discCol] ?? '').trim() === discVal);
      }
      if (discChanCol >= 0 && discChanVal) {
        rows = rows.filter(r => (r[discChanCol] ?? '').trim() === discChanVal);
      }

      const aDev = (r) => (r[aDevCol] ?? '').trim();
      const bDev = (r) => (r[bDevCol] ?? '').trim();
      const aChan = (r) => (r[aChanCol] ?? '').trim();
      const bChan = (r) => (r[bChanCol] ?? '').trim();
      const pairOnA = (r, dev, chan) =>
        (dev === '' || aDev(r) === dev) && (chan === '' || aChan(r) === chan);
      const pairOnB = (r, dev, chan) =>
        (dev === '' || bDev(r) === dev) && (chan === '' || bChan(r) === chan);
      const oneEndMatches = (r, dev, chan) => pairOnA(r, dev, chan) || pairOnB(r, dev, chan);
      const devAVal = document.getElementById('dc-dev-a').value;
      const chanAVal = document.getElementById('dc-chan-a').value;
      const devBVal = document.getElementById('dc-dev-b').value;
      const chanBVal = document.getElementById('dc-chan-b').value;
      const pair1Set = devAVal !== '' || chanAVal !== '';
      const pair2Set = devBVal !== '' || chanBVal !== '';

      if (pair1Set && pair2Set) {
        rows = rows.filter(r =>
          (pairOnA(r, devAVal, chanAVal) && pairOnB(r, devBVal, chanBVal)) ||
          (pairOnA(r, devBVal, chanBVal) && pairOnB(r, devAVal, chanAVal))
        );
      } else if (pair1Set) {
        rows = rows.filter(r => oneEndMatches(r, devAVal, chanAVal));
      } else if (pair2Set) {
        rows = rows.filter(r => oneEndMatches(r, devBVal, chanBVal));
      }

      const typeRel = document.getElementById('dc-type-rel').value;
      const typeVal = document.getElementById('dc-type-val').value;
      if (typeRel === 'is_or_compatible' && typeVal && (aTypeCol >= 0 || bTypeCol >= 0)) {
        const rowTypeA = (r) => (r[aTypeCol] ?? '').trim();
        const rowTypeB = (r) => (r[bTypeCol] ?? '').trim();
        const allowed = channelTypeCompatibleCache[typeVal];
        if (allowed && allowed.size) {
          rows = rows.filter(r => allowed.has(rowTypeA(r)) || allowed.has(rowTypeB(r)));
        } else {
          rows = rows.filter(r => rowTypeA(r) === typeVal || rowTypeB(r) === typeVal);
        }
      }

      return rows;
    }

    function buildDisconnectDropdowns() {
      const st = getState(DISCONNECT_MAP_KEY);
      if (!st.headers.length) return;
      const aDevCol = channelColIdx(st, 'A-side_device_refdes');
      const aChanCol = channelColIdx(st, 'A-side_device_channel_id');
      const bDevCol = channelColIdx(st, 'B-side_device_refdes');
      const bChanCol = channelColIdx(st, 'B-side_device_channel_id');
      const discCol = channelColIdx(st, 'disconnect_refdes');
      const discChanCol = channelColIdx(st, 'disconnect_channel_id');
      const aTypeCol = channelColIdx(st, 'A-side_device_channel_type');
      const bTypeCol = channelColIdx(st, 'B-side_device_channel_type');

      function uniques(colIdx) {
        if (colIdx < 0) return [];
        const set = new Set(st.rows.map(r => (r[colIdx] ?? '').trim()).filter(Boolean));
        return [...set].sort((a, b) => a.localeCompare(b));
      }
      function uniquesEither(colA, colB) {
        const set = new Set();
        if (colA >= 0) st.rows.forEach(r => { const v = (r[colA] ?? '').trim(); if (v) set.add(v); });
        if (colB >= 0) st.rows.forEach(r => { const v = (r[colB] ?? '').trim(); if (v) set.add(v); });
        return [...set].sort((a, b) => a.localeCompare(b));
      }

      function fillSelect(id, options, anyLabel, preserve, displayMap) {
        const el = document.getElementById(id);
        const cur = preserve ? el.value : null;
        el.innerHTML = '';
        const anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = anyLabel;
        el.appendChild(anyOpt);
        options.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = (displayMap && displayMap[v] !== undefined ? displayMap[v] : v);
          el.appendChild(opt);
        });
        if (preserve && cur !== null && (cur === '' || options.includes(cur))) el.value = cur;
      }

      fillSelect('dc-disc', discCol >= 0 ? uniques(discCol) : [], 'any disconnect', true);
      fillSelect('dc-disc-chan', discChanCol >= 0 ? uniques(discChanCol) : [], 'any channel', true);
      fillSelect('dc-dev-a', uniquesEither(aDevCol, bDevCol), 'any device', true);
      fillSelect('dc-chan-a', uniquesEither(aChanCol, bChanCol), 'any channel', true);
      fillSelect('dc-dev-b', uniquesEither(aDevCol, bDevCol), 'any device', true);
      fillSelect('dc-chan-b', uniquesEither(aChanCol, bChanCol), 'any channel', true);
      const dcTypeOpts = uniquesEither(aTypeCol, bTypeCol);
      if (useHumanReadableChannelTypes && dcTypeOpts.length) {
        fetchChannelTypeDisplays(dcTypeOpts).then(() => fillSelect('dc-type-val', dcTypeOpts, '—', true, channelTypeDisplayCache));
      } else {
        fillSelect('dc-type-val', dcTypeOpts, '—', true);
      }
    }

    function applyCircuitsFilters(st, rows) {
      const fromDevCol = channelColIdx(st, 'from_side_device_refdes');
      const fromChanCol = channelColIdx(st, 'from_side_device_chname');
      const fromConnCol = channelColIdx(st, 'net_from_connector_name');
      const toDevCol = channelColIdx(st, 'to_side_device_refdes');
      const toChanCol = channelColIdx(st, 'to_side_device_chname');
      const toConnCol = channelColIdx(st, 'net_to_connector_name');
      const fromTypeCol = channelColIdx(st, 'from_channel_type');
      const toTypeCol = channelColIdx(st, 'to_channel_type');
      const signalCol = channelColIdx(st, 'signal');

      const fromDev = (r) => (r[fromDevCol] ?? '').trim();
      const toDev = (r) => (r[toDevCol] ?? '').trim();
      const fromChan = (r) => (r[fromChanCol] ?? '').trim();
      const toChan = (r) => (r[toChanCol] ?? '').trim();
      const fromConn = (r) => (r[fromConnCol] ?? '').trim();
      const toConn = (r) => (r[toConnCol] ?? '').trim();
      const pairOnFrom = (r, dev, chan, conn) =>
        (dev === '' || fromDev(r) === dev) && (chan === '' || fromChan(r) === chan) && (conn === '' || fromConn(r) === conn);
      const pairOnTo = (r, dev, chan, conn) =>
        (dev === '' || toDev(r) === dev) && (chan === '' || toChan(r) === chan) && (conn === '' || toConn(r) === conn);
      const oneEndMatches = (r, dev, chan, conn) => pairOnFrom(r, dev, chan, conn) || pairOnTo(r, dev, chan, conn);
      const devAVal = document.getElementById('ci-dev-a').value;
      const chanAVal = document.getElementById('ci-chan-a').value;
      const connAVal = document.getElementById('ci-conn-a').value;
      const devBVal = document.getElementById('ci-dev-b').value;
      const chanBVal = document.getElementById('ci-chan-b').value;
      const connBVal = document.getElementById('ci-conn-b').value;
      const pair1Set = devAVal !== '' || chanAVal !== '' || connAVal !== '';
      const pair2Set = devBVal !== '' || chanBVal !== '' || connBVal !== '';

      if (pair1Set && pair2Set) {
        rows = rows.filter(r =>
          (pairOnFrom(r, devAVal, chanAVal, connAVal) && pairOnTo(r, devBVal, chanBVal, connBVal)) ||
          (pairOnFrom(r, devBVal, chanBVal, connBVal) && pairOnTo(r, devAVal, chanAVal, connAVal))
        );
      } else if (pair1Set) {
        rows = rows.filter(r => oneEndMatches(r, devAVal, chanAVal, connAVal));
      } else if (pair2Set) {
        rows = rows.filter(r => oneEndMatches(r, devBVal, chanBVal, connBVal));
      }

      const typeRel = document.getElementById('ci-type-rel').value;
      const typeVal = document.getElementById('ci-type-val').value;
      if (typeRel === 'is_or_compatible' && typeVal && (fromTypeCol >= 0 || toTypeCol >= 0)) {
        const rowTypeFrom = (r) => (r[fromTypeCol] ?? '').trim();
        const rowTypeTo = (r) => (r[toTypeCol] ?? '').trim();
        const allowed = channelTypeCompatibleCache[typeVal];
        if (allowed && allowed.size) {
          rows = rows.filter(r => allowed.has(rowTypeFrom(r)) || allowed.has(rowTypeTo(r)));
        } else {
          rows = rows.filter(r => rowTypeFrom(r) === typeVal || rowTypeTo(r) === typeVal);
        }
      }

      const signalVal = document.getElementById('ci-signal').value;
      if (signalVal && signalCol >= 0) {
        rows = rows.filter(r => (r[signalCol] ?? '').trim() === signalVal);
      }

      return rows;
    }

    function buildCircuitsDropdowns() {
      const st = getState(CIRCUITS_LIST_KEY);
      if (!st.headers.length) return;
      const fromDevCol = channelColIdx(st, 'from_side_device_refdes');
      const fromChanCol = channelColIdx(st, 'from_side_device_chname');
      const fromConnCol = channelColIdx(st, 'net_from_connector_name');
      const toDevCol = channelColIdx(st, 'to_side_device_refdes');
      const toChanCol = channelColIdx(st, 'to_side_device_chname');
      const toConnCol = channelColIdx(st, 'net_to_connector_name');
      const fromTypeCol = channelColIdx(st, 'from_channel_type');
      const toTypeCol = channelColIdx(st, 'to_channel_type');
      const signalCol = channelColIdx(st, 'signal');

      function uniques(colIdx) {
        if (colIdx < 0) return [];
        const set = new Set(st.rows.map(r => (r[colIdx] ?? '').trim()).filter(Boolean));
        return [...set].sort((a, b) => a.localeCompare(b));
      }
      function uniquesEither(colA, colB) {
        const set = new Set();
        if (colA >= 0) st.rows.forEach(r => { const v = (r[colA] ?? '').trim(); if (v) set.add(v); });
        if (colB >= 0) st.rows.forEach(r => { const v = (r[colB] ?? '').trim(); if (v) set.add(v); });
        return [...set].sort((a, b) => a.localeCompare(b));
      }

      function fillSelect(id, options, anyLabel, preserve, displayMap) {
        const el = document.getElementById(id);
        const cur = preserve ? el.value : null;
        el.innerHTML = '';
        const anyOpt = document.createElement('option');
        anyOpt.value = '';
        anyOpt.textContent = anyLabel;
        el.appendChild(anyOpt);
        options.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = (displayMap && displayMap[v] !== undefined ? displayMap[v] : v);
          el.appendChild(opt);
        });
        if (preserve && cur !== null && (cur === '' || options.includes(cur))) el.value = cur;
      }

      fillSelect('ci-chan-a', uniquesEither(fromChanCol, toChanCol), 'any channel', true);
      fillSelect('ci-conn-a', uniquesEither(fromConnCol, toConnCol), 'any connector', true);
      fillSelect('ci-dev-a', uniquesEither(fromDevCol, toDevCol), 'any device', true);
      fillSelect('ci-chan-b', uniquesEither(fromChanCol, toChanCol), 'any channel', true);
      fillSelect('ci-conn-b', uniquesEither(fromConnCol, toConnCol), 'any connector', true);
      fillSelect('ci-dev-b', uniquesEither(fromDevCol, toDevCol), 'any device', true);
      const ciTypeOpts = uniquesEither(fromTypeCol, toTypeCol);
      if (useHumanReadableChannelTypes && ciTypeOpts.length) {
        fetchChannelTypeDisplays(ciTypeOpts).then(() => fillSelect('ci-type-val', ciTypeOpts, '—', true, channelTypeDisplayCache));
      } else {
        fillSelect('ci-type-val', ciTypeOpts, '—', true);
      }
      fillSelect('ci-signal', signalCol >= 0 ? uniques(signalCol) : [], 'any', true);
    }

    // ---- Tabs ----
    function buildTabs(keys, labelsMap) {
      const list = document.getElementById('tab-list');
      keys.forEach(key => {
        if (list.querySelector(`[data-label="${CSS.escape(key)}"]`)) return;
        const display = (labelsMap && labelsMap[key]) || key;
        const el = document.createElement('div');
        el.className = 'tab';
        el.dataset.label = key;
        el.innerHTML = `<span class="tab-dot"></span><span class="tab-name" title="${display}">${display}</span>`;
        el.addEventListener('click', () => switchTab(key));
        list.appendChild(el);
      });
    }

    function switchTab(key) {
      activeLabel = key;
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.label === key);
        if (t.dataset.label === key) t.classList.remove('updated');
      });
      const dataKey = getDataKey();
      const st = getState(dataKey);
      document.getElementById('search-input').value = st.search;
      buildHeader(key);
      const instHeader = document.getElementById('instances-viewer-header');
      const chHeader = document.getElementById('channel-viewer-header');
      const dcHeader = document.getElementById('disconnect-viewer-header');
      const ciHeader = document.getElementById('circuits-viewer-header');
      if (key === INSTANCES_LIST_KEY) {
        instHeader.classList.add('visible');
        chHeader.classList.remove('visible');
        dcHeader.classList.remove('visible');
        ciHeader.classList.remove('visible');
        updateInstancesSourceUI();
      } else {
        instHeader.classList.remove('visible');
      }
      if (key === CHANNEL_MAP_KEY) {
        chHeader.classList.add('visible');
        dcHeader.classList.remove('visible');
        ciHeader.classList.remove('visible');
        buildChannelDropdowns();
        document.getElementById('ch-type-val').style.display =
          document.getElementById('ch-type-rel').value === 'is_or_compatible' ? 'inline-block' : 'none';
        if (document.getElementById('ch-type-rel').value === 'is_or_compatible') {
          const v = document.getElementById('ch-type-val').value;
          if (v) fetchChannelTypeCompatible(v);
        }
      } else if (key === DISCONNECT_MAP_KEY) {
        chHeader.classList.remove('visible');
        dcHeader.classList.add('visible');
        ciHeader.classList.remove('visible');
        buildDisconnectDropdowns();
        document.getElementById('dc-type-val').style.display =
          document.getElementById('dc-type-rel').value === 'is_or_compatible' ? 'inline-block' : 'none';
        if (document.getElementById('dc-type-rel').value === 'is_or_compatible') {
          const v = document.getElementById('dc-type-val').value;
          if (v) fetchChannelTypeCompatible(v);
        }
      } else if (key === CIRCUITS_LIST_KEY) {
        chHeader.classList.remove('visible');
        dcHeader.classList.remove('visible');
        ciHeader.classList.add('visible');
        buildCircuitsDropdowns();
        document.getElementById('ci-type-val').style.display =
          document.getElementById('ci-type-rel').value === 'is_or_compatible' ? 'inline-block' : 'none';
        if (document.getElementById('ci-type-rel').value === 'is_or_compatible') {
          const v = document.getElementById('ci-type-val').value;
          if (v) fetchChannelTypeCompatible(v);
        }
      } else {
        chHeader.classList.remove('visible');
        dcHeader.classList.remove('visible');
        ciHeader.classList.remove('visible');
      }
      if (key !== INSTANCES_LIST_KEY) instHeader.classList.remove('visible');
      renderTable(key);
    }

    function markUpdated(key) {
      const tab = document.querySelector(`.tab[data-label="${CSS.escape(key)}"]`);
      if (tab && key !== activeLabel) tab.classList.add('updated');
    }

    function setTabDisplayName(key, display) {
      keyToLabel[key] = display;
      const tab = document.querySelector(`.tab[data-label="${CSS.escape(key)}"]`);
      if (tab) {
        const nameEl = tab.querySelector('.tab-name');
        if (nameEl) { nameEl.textContent = display; nameEl.title = display; }
      }
    }

    // ---- Header ----
    function buildHeader(label) {
      const dataKey = (label === INSTANCES_LIST_KEY) ? instancesListSourceKey : label;
      const st = getState(dataKey);
      const tr = document.createElement('tr');
      st.headers.forEach((h, i) => {
        const th = document.createElement('th');
        th.dataset.i = i;
        th.innerHTML = `<div class="th-inner" data-i="${i}">
      <span>${h}</span>
      <i class="sort-btn">⇅</i>
      <span class="filter-dot"></span>
    </div>`;
        th.querySelector('.th-inner').addEventListener('click', e => openDropdown(dataKey, i, th, e));
        tr.appendChild(th);
      });
      const thead = document.getElementById('thead');
      thead.innerHTML = '';
      thead.appendChild(tr);
      updateHeaderUI(dataKey);
    }

    function updateHeaderUI(label) {
      const st = getState(label);
      document.querySelectorAll('#thead th').forEach((th, i) => {
        const inner = th.querySelector('.th-inner');
        const si = th.querySelector('.sort-btn');
        th.className = '';
        si.textContent = '⇅';
        if (i === st.sortCol) {
          th.className = st.sortDir === 1 ? 'asc' : 'desc';
          si.textContent = st.sortDir === 1 ? '↑' : '↓';
        }
        inner.className = 'th-inner' + (st.colFilters[i] ? ' filtered' : '');
      });
    }

    // ---- Render ----
    function renderTable(label) {
      const dataKey = (label === INSTANCES_LIST_KEY) ? instancesListSourceKey : label;
      const st = getState(dataKey);
      const empty = document.getElementById('empty-state');
      const table = document.getElementById('data-table');

      if (!st.headers.length) {
        empty.style.display = 'flex';
        table.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      table.style.display = '';

      let rows = [...st.rows];
      const q = st.search.toLowerCase();
      if (q) rows = rows.filter(r => r.some(c => c.toLowerCase().includes(q)));
      st.colFilters.forEach((f, i) => { if (f) rows = rows.filter(r => f.has(r[i] ?? '')); });
      if (label === CHANNEL_MAP_KEY) rows = applyChannelFilters(st, rows);
      if (label === DISCONNECT_MAP_KEY) rows = applyDisconnectFilters(st, rows);
      if (label === CIRCUITS_LIST_KEY) rows = applyCircuitsFilters(st, rows);

      if (st.sortCol >= 0) {
        rows.sort((a, b) => {
          const av = a[st.sortCol] ?? '', bv = b[st.sortCol] ?? '';
          const an = parseFloat(av), bn = parseFloat(bv);
          if (!isNaN(an) && !isNaN(bn)) return (an - bn) * st.sortDir;
          return av.localeCompare(bv) * st.sortDir;
        });
      }

      document.getElementById('row-badge').textContent = rows.length + ' / ' + st.rows.length + ' rows';
      if (document.body.classList.contains('embedded') && window.parent && window.parent !== window) {
        try {
          window.parent.postMessage({
            type: 'harnice-system-viewer-state',
            rows: rows.length,
            total: st.rows.length,
            headers: st.headers,
            sortCol: st.sortCol,
            sortDir: st.sortDir,
            search: st.search || ''
          }, '*');
        } catch (e) { }
      }

      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      if (!rows.length) {
        tbody.innerHTML = `<tr class="no-rows"><td colspan="${st.headers.length}">No matching rows</td></tr>`;
        return;
      }
      const channelTypeColIdxs = st.headers.map((h, i) => isChannelTypeColumn(h) ? i : -1).filter(i => i >= 0);
      const uniqueTypes = new Set();
      if (useHumanReadableChannelTypes && channelTypeColIdxs.length) {
        rows.forEach(r => { channelTypeColIdxs.forEach(i => { const v = (r[i] ?? '').trim(); if (v) uniqueTypes.add(v); }); });
      }
      function renderTbody() {
        const frag = document.createDocumentFragment();
        const isBom = (label === BOM_KEY);
        const refdesIdx = isBom ? st.headers.indexOf('device_refdes') : -1;
        rows.forEach(row => {
          const tr = document.createElement('tr');
          if (isBom && refdesIdx >= 0) {
            tr.classList.add('device-row');
            tr.dataset.deviceRefdes = (row[refdesIdx] ?? '').trim();
          }
          st.headers.forEach((h, i) => {
            const td = document.createElement('td');
            const raw = row[i] ?? '';
            if (useHumanReadableChannelTypes && isChannelTypeColumn(h)) {
              td.textContent = getChannelTypeDisplay(raw);
              td.title = raw;
            } else {
              td.textContent = raw;
              td.title = raw;
            }
            tr.appendChild(td);
          });
          frag.appendChild(tr);

          if (isBom && refdesIdx >= 0 && tr.dataset.deviceRefdes) {
            const detailTr = document.createElement('tr');
            detailTr.classList.add('signals-detail-row');
            const detailTd = document.createElement('td');
            detailTd.colSpan = st.headers.length;
            detailTd.innerHTML = '<div class="signals-viewer-wrap"><span class="loading">Click row to load signals list</span></div>';
            detailTr.appendChild(detailTd);
            frag.appendChild(detailTr);
          }
        });
        tbody.appendChild(frag);
      }
      if (uniqueTypes.size) {
        fetchChannelTypeDisplays([...uniqueTypes]).then(renderTbody);
      } else {
        renderTbody();
      }
    }

    function parseTsv(tsvText) {
      const lines = tsvText.trim().split(/\r?\n/);
      if (!lines.length) return { headers: [], rows: [] };
      const headers = lines[0].split(/\t/);
      const rows = lines.slice(1).map(line => line.split(/\t/));
      return { headers, rows };
    }

    let ddSignalsWrap = null; // when column dropdown is open for a signals list

    function renderSignalsTableBody(wrap) {
      const st = wrap._signalsState;
      if (!st || !st.headers.length) return;
      let rows = [...st.fullRows];
      const q = (st.search || '').toLowerCase();
      if (q) rows = rows.filter(r => r.some(c => (c ?? '').toLowerCase().includes(q)));
      st.colFilters.forEach((f, i) => { if (f) rows = rows.filter(r => f.has(r[i] ?? '')); });
      if (st.sortCol >= 0) {
        rows.sort((a, b) => {
          const av = a[st.sortCol] ?? '', bv = b[st.sortCol] ?? '';
          const an = parseFloat(av), bn = parseFloat(bv);
          if (!isNaN(an) && !isNaN(bn)) return (an - bn) * st.sortDir;
          return ('' + av).localeCompare('' + bv) * st.sortDir;
        });
      }
      const tbody = wrap.querySelector('table tbody');
      if (!tbody) return;
      tbody.innerHTML = '';
      rows.forEach(row => {
        const tr = document.createElement('tr');
        st.headers.forEach((h, i) => {
          const td = document.createElement('td');
          const raw = row[i] ?? '';
          if (useHumanReadableChannelTypes && isChannelTypeColumn(h)) {
            td.textContent = getChannelTypeDisplay(raw);
            td.title = raw;
          } else {
            td.textContent = raw;
            td.title = raw;
          }
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      const badge = wrap.querySelector('.signals-row-badge');
      if (badge) badge.textContent = rows.length + ' / ' + st.fullRows.length + ' rows';
    }

    function openDropdownForSignals(wrap, colIdx, thEl, evt) {
      evt.stopPropagation();
      ddLabel = '__signals__';
      ddSignalsWrap = wrap;
      ddColIdx = colIdx;
      const st = wrap._signalsState;
      const valSet = new Set(st.fullRows.map(r => r[colIdx] ?? ''));
      ddAllValues = [...valSet].sort((a, b) => {
        const an = parseFloat(a), bn = parseFloat(b);
        return (!isNaN(an) && !isNaN(bn)) ? an - bn : ('' + a).localeCompare('' + b);
      });
      ddPending.checked = st.colFilters[colIdx] ? new Set(st.colFilters[colIdx]) : new Set(ddAllValues);
      ddPending.sortDir = (st.sortCol === colIdx) ? st.sortDir : 0;
      ddSearchEl.value = '';
      renderDDList('');
      updateDDSortBtns();
      const rect = thEl.getBoundingClientRect();
      dropdown.style.top = (rect.bottom + 2) + 'px';
      dropdown.style.left = Math.min(rect.left, window.innerWidth - 228) + 'px';
      dropdown.classList.add('open');
      ddSearchEl.focus();
    }

    function updateSignalsHeaderUI(wrap) {
      const st = wrap._signalsState;
      if (!st) return;
      wrap.querySelectorAll('table thead th').forEach((th, i) => {
        const inner = th.querySelector('.th-inner');
        if (!inner) return;
        inner.className = 'th-inner' + (st.colFilters[i] ? ' filtered' : '');
      });
    }

    function renderSignalsTable(container, tsvText) {
      const wrap = container.querySelector('.signals-viewer-wrap') || container;
      wrap.innerHTML = '';
      try {
        const { headers, rows } = parseTsv(tsvText);
        if (!headers.length) {
          wrap.innerHTML = '<span class="loading">No columns</span>';
          return;
        }
        wrap._signalsState = {
          search: '',
          colFilters: headers.map(() => null),
          fullRows: rows,
          headers,
          sortCol: -1,
          sortDir: 1
        };
        const toolbar = document.createElement('div');
        toolbar.className = 'signals-toolbar';
        const searchInput = document.createElement('input');
        searchInput.type = 'text';
        searchInput.className = 'signals-search';
        searchInput.placeholder = 'Search all columns…';
        searchInput.addEventListener('input', () => {
          wrap._signalsState.search = searchInput.value;
          renderSignalsTableBody(wrap);
        });
        const badge = document.createElement('span');
        badge.className = 'signals-row-badge';
        badge.textContent = rows.length + ' / ' + rows.length + ' rows';
        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'signals-clear-btn';
        clearBtn.textContent = 'Clear filters';
        clearBtn.addEventListener('click', () => {
          const st = wrap._signalsState;
          if (!st) return;
          st.search = '';
          st.colFilters = st.headers.map(() => null);
          st.sortCol = -1;
          searchInput.value = '';
          updateSignalsHeaderUI(wrap);
          renderSignalsTableBody(wrap);
        });
        toolbar.appendChild(searchInput);
        toolbar.appendChild(badge);
        toolbar.appendChild(clearBtn);
        wrap.appendChild(toolbar);
        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const thr = document.createElement('tr');
        headers.forEach((h, i) => {
          const th = document.createElement('th');
          th.dataset.i = i;
          th.innerHTML = `<div class="th-inner" data-i="${i}">
      <span>${h.replace(/</g, '&lt;')}</span>
      <span class="filter-dot"></span>
    </div>`;
          th.querySelector('.th-inner').addEventListener('click', e => openDropdownForSignals(wrap, i, th, e));
          thr.appendChild(th);
        });
        thead.appendChild(thr);
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        table.appendChild(tbody);
        wrap.appendChild(table);
        renderSignalsTableBody(wrap);
        if (useHumanReadableChannelTypes && headers.length) {
          const typeColIdxs = headers.map((h, i) => isChannelTypeColumn(h) ? i : -1).filter(i => i >= 0);
          const uniqueTypes = new Set();
          typeColIdxs.forEach(i => { rows.forEach(r => { const v = (r[i] ?? '').trim(); if (v) uniqueTypes.add(v); }); });
          if (uniqueTypes.size) fetchChannelTypeDisplays([...uniqueTypes]).then(() => renderSignalsTableBody(wrap));
        }
      } catch (e) {
        wrap.innerHTML = '<span class="error">' + (e.message || 'Failed to parse') + '</span>';
      }
    }

    document.getElementById('tbody').addEventListener('click', e => {
      const tr = e.target.closest('tr');
      if (!tr || !tr.classList.contains('device-row')) return;
      const refdes = tr.dataset.deviceRefdes;
      if (!refdes) return;
      const detailTr = tr.nextElementSibling;
      if (!detailTr || !detailTr.classList.contains('signals-detail-row')) return;
      // Only one signals list visible: collapse any other expanded one
      document.querySelectorAll('tr.signals-detail-row.expanded').forEach(row => {
        if (row !== detailTr) row.classList.remove('expanded');
        row.previousElementSibling?.classList?.remove('signals-expanded');
      });
      detailTr.classList.toggle('expanded');
      if (detailTr.classList.contains('expanded')) {
        tr.classList.add('signals-expanded');
      } else {
        tr.classList.remove('signals-expanded');
      }
      if (!detailTr.classList.contains('expanded')) return;
      const wrap = detailTr.querySelector('.signals-viewer-wrap');
      const placeholder = wrap && wrap.querySelector('.loading');
      if (!placeholder || placeholder.textContent !== 'Click row to load signals list') return;
      wrap.innerHTML = '<span class="loading">Loading…</span>';
      fetch('/api/signals-list?device_refdes=' + encodeURIComponent(refdes))
        .then(r => {
          if (!r.ok) throw new Error(r.status === 404 ? 'Signals list not found for this device' : r.statusText);
          return r.text();
        })
        .then(tsv => {
          renderSignalsTable(detailTr, tsv);
        })
        .catch(err => {
          const w = detailTr.querySelector('.signals-viewer-wrap');
          if (w) w.innerHTML = '<span class="error">' + (err.message || 'Load failed') + '</span>';
        });
    });

    // ---- Search ----
    document.getElementById('search-input').addEventListener('input', e => {
      if (!activeLabel) return;
      getState(getDataKey()).search = e.target.value;
      renderTable(activeLabel);
    });

    // ---- Channel viewer header: re-render when controls change ----
    function fetchChannelTypeCompatible(typeVal) {
      if (!typeVal) return;
      fetch('/api/channel-type-compatible?type=' + encodeURIComponent(typeVal))
        .then(r => r.json())
        .then(data => {
          channelTypeCompatibleCache[typeVal] = new Set(Array.isArray(data) ? data : []);
          if (activeLabel) renderTable(activeLabel);
        })
        .catch(() => { channelTypeCompatibleCache[typeVal] = new Set([typeVal]); });
    }

    function onChannelFilterChange() {
      if (activeLabel === CHANNEL_MAP_KEY) renderTable(activeLabel);
      if (document.getElementById('ch-type-rel').value === 'is_or_compatible') {
        const v = document.getElementById('ch-type-val').value;
        if (v) fetchChannelTypeCompatible(v);
      }
    }

    function clearChannelFilters() {
      document.getElementById('ch-unmapped').checked = true;
      document.getElementById('ch-net').value = '';
      document.getElementById('ch-chan-a').value = '';
      document.getElementById('ch-dev-a').value = '';
      document.getElementById('ch-chan-b').value = '';
      document.getElementById('ch-dev-b').value = '';
      document.getElementById('ch-type-rel').value = 'any';
      document.getElementById('ch-type-val').style.display = 'none';
      if (activeLabel === CHANNEL_MAP_KEY) {
        buildChannelDropdowns();
        renderTable(activeLabel);
      }
    }

    document.getElementById('channel-type-human-readable').addEventListener('change', () => {
      useHumanReadableChannelTypes = document.getElementById('channel-type-human-readable').checked;
      if (activeLabel === CHANNEL_MAP_KEY) buildChannelDropdowns();
      if (activeLabel === DISCONNECT_MAP_KEY) buildDisconnectDropdowns();
      if (activeLabel === CIRCUITS_LIST_KEY) buildCircuitsDropdowns();
      if (activeLabel) renderTable(activeLabel);
      document.querySelectorAll('.signals-viewer-wrap').forEach(wrap => {
        if (wrap._signalsState) renderSignalsTableBody(wrap);
      });
    });
    document.getElementById('ch-clear').addEventListener('click', clearChannelFilters);
    document.getElementById('ch-unmapped').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-net').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-dev-a').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-chan-a').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-dev-b').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-chan-b').addEventListener('change', onChannelFilterChange);
    document.getElementById('ch-type-rel').addEventListener('change', () => {
      const rel = document.getElementById('ch-type-rel').value;
      document.getElementById('ch-type-val').style.display = (rel === 'is_or_compatible') ? 'inline-block' : 'none';
      onChannelFilterChange();
    });
    document.getElementById('ch-type-val').addEventListener('change', () => {
      onChannelFilterChange();
    });

    function updateInstancesSourceUI() {
      document.querySelectorAll('.instances-source-option').forEach(el => {
        const val = el.getAttribute('data-value');
        const radio = el.querySelector('input[type="radio"]');
        const selected = val === instancesListSourceKey;
        if (radio) radio.checked = selected;
        el.classList.toggle('selected', selected);
      });
    }

    function copyInstancesFilterState(fromKey, toKey) {
      const from = getState(fromKey);
      const to = getState(toKey);
      to.search = from.search;
      if (to.headers.length === from.headers.length) {
        to.sortCol = from.sortCol;
        to.sortDir = from.sortDir;
        if (from.colFilters) {
          to.colFilters = from.colFilters.map(s => s ? new Set(s) : null);
        }
      } else {
        to.sortCol = -1;
        to.sortDir = 1;
      }
    }

    document.querySelectorAll('input[name="instances-source"]').forEach(radio => {
      radio.addEventListener('change', e => {
        if (activeLabel !== INSTANCES_LIST_KEY) return;
        const prevKey = instancesListSourceKey;
        instancesListSourceKey = e.target.value;
        if (prevKey !== instancesListSourceKey) {
          copyInstancesFilterState(prevKey, instancesListSourceKey);
        }
        updateInstancesSourceUI();
        document.getElementById('search-input').value = getState(instancesListSourceKey).search;
        buildHeader(INSTANCES_LIST_KEY);
        renderTable(INSTANCES_LIST_KEY);
      });
    });

    // ---- Disconnect viewer header: re-render when controls change ----
    function onDisconnectFilterChange() {
      if (activeLabel === DISCONNECT_MAP_KEY) renderTable(activeLabel);
      if (document.getElementById('dc-type-rel').value === 'is_or_compatible') {
        const v = document.getElementById('dc-type-val').value;
        if (v) fetchChannelTypeCompatible(v);
      }
    }

    function clearDisconnectFilters() {
      document.getElementById('dc-available').checked = true;
      document.getElementById('dc-disc').value = '';
      document.getElementById('dc-disc-chan').value = '';
      document.getElementById('dc-dev-a').value = '';
      document.getElementById('dc-chan-a').value = '';
      document.getElementById('dc-dev-b').value = '';
      document.getElementById('dc-chan-b').value = '';
      document.getElementById('dc-type-rel').value = 'any';
      document.getElementById('dc-type-val').style.display = 'none';
      if (activeLabel === DISCONNECT_MAP_KEY) {
        buildDisconnectDropdowns();
        renderTable(activeLabel);
      }
    }

    document.getElementById('dc-clear').addEventListener('click', clearDisconnectFilters);
    document.getElementById('dc-available').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-disc').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-disc-chan').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-dev-a').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-chan-a').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-dev-b').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-chan-b').addEventListener('change', onDisconnectFilterChange);
    document.getElementById('dc-type-rel').addEventListener('change', () => {
      const rel = document.getElementById('dc-type-rel').value;
      document.getElementById('dc-type-val').style.display = (rel === 'is_or_compatible') ? 'inline-block' : 'none';
      onDisconnectFilterChange();
    });
    document.getElementById('dc-type-val').addEventListener('change', onDisconnectFilterChange);

    // ---- Circuits viewer header: re-render when controls change ----
    function onCircuitsFilterChange() {
      if (activeLabel === CIRCUITS_LIST_KEY) renderTable(activeLabel);
      if (document.getElementById('ci-type-rel').value === 'is_or_compatible') {
        const v = document.getElementById('ci-type-val').value;
        if (v) fetchChannelTypeCompatible(v);
      }
    }

    function clearCircuitsFilters() {
      document.getElementById('ci-chan-a').value = '';
      document.getElementById('ci-conn-a').value = '';
      document.getElementById('ci-dev-a').value = '';
      document.getElementById('ci-chan-b').value = '';
      document.getElementById('ci-conn-b').value = '';
      document.getElementById('ci-dev-b').value = '';
      document.getElementById('ci-type-rel').value = 'any';
      document.getElementById('ci-type-val').style.display = 'none';
      document.getElementById('ci-signal').value = '';
      if (activeLabel === CIRCUITS_LIST_KEY) {
        buildCircuitsDropdowns();
        renderTable(activeLabel);
      }
    }

    document.getElementById('ci-clear').addEventListener('click', clearCircuitsFilters);
    document.getElementById('ci-chan-a').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-conn-a').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-dev-a').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-chan-b').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-conn-b').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-dev-b').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-type-rel').addEventListener('change', () => {
      const rel = document.getElementById('ci-type-rel').value;
      document.getElementById('ci-type-val').style.display = (rel === 'is_or_compatible') ? 'inline-block' : 'none';
      onCircuitsFilterChange();
    });
    document.getElementById('ci-type-val').addEventListener('change', onCircuitsFilterChange);
    document.getElementById('ci-signal').addEventListener('change', onCircuitsFilterChange);

    function clearAllFilters() {
      if (!activeLabel) return;
      const dataKey = getDataKey();
      const st = getState(dataKey);
      st.colFilters = st.headers.map(() => null);
      st.sortCol = -1; st.sortDir = 1;
      st.search = '';
      document.getElementById('search-input').value = '';
      updateHeaderUI(dataKey);
      renderTable(activeLabel);
    }

    // ---- Embedded: accept toolbar actions from parent ----
    window.addEventListener('message', function (e) {
      if (!e.data || e.data.type !== 'harnice-system-viewer') return;
      const dataKey = getDataKey();
      const st = getState(dataKey);
      if (e.data.action === 'setSearch') {
        const val = (e.data.value != null) ? String(e.data.value) : '';
        st.search = val;
        const searchEl = document.getElementById('search-input');
        if (searchEl) searchEl.value = val;
        renderTable(activeLabel);
      } else if (e.data.action === 'clearFilters') {
        clearAllFilters();
      } else if (e.data.action === 'setSort') {
        st.sortCol = e.data.sortCol >= 0 ? e.data.sortCol : -1;
        st.sortDir = (e.data.sortDir === -1 || e.data.sortDir === 1) ? e.data.sortDir : 1;
        updateHeaderUI(dataKey);
        renderTable(activeLabel);
      }
    });

    // ============================================================
    // Column dropdown
    // ============================================================
    const dropdown = document.getElementById('col-dropdown');
    const ddList = document.getElementById('dd-list');
    const ddSearchEl = document.getElementById('dd-search');
    let ddLabel = null, ddColIdx = -1;
    let ddPending = { sortDir: 0, checked: null };
    let ddAllValues = [];

    function openDropdown(label, colIdx, thEl, evt) {
      evt.stopPropagation();
      ddLabel = label; ddColIdx = colIdx;
      const st = getState(label);
      const valSet = new Set(st.rows.map(r => r[colIdx] ?? ''));
      ddAllValues = [...valSet].sort((a, b) => {
        const an = parseFloat(a), bn = parseFloat(b);
        return (!isNaN(an) && !isNaN(bn)) ? an - bn : a.localeCompare(b);
      });
      ddPending.checked = st.colFilters[colIdx] ? new Set(st.colFilters[colIdx]) : new Set(ddAllValues);
      ddPending.sortDir = (st.sortCol === colIdx) ? st.sortDir : 0;
      ddSearchEl.value = '';
      renderDDList('');
      updateDDSortBtns();
      const rect = thEl.getBoundingClientRect();
      dropdown.style.top = (rect.bottom + 2) + 'px';
      dropdown.style.left = Math.min(rect.left, window.innerWidth - 228) + 'px';
      dropdown.classList.add('open');
      ddSearchEl.focus();
    }

    function renderDDList(q) {
      const vals = q ? ddAllValues.filter(v => v.toLowerCase().includes(q.toLowerCase())) : ddAllValues;
      const colHeader = (ddLabel === '__signals__' && ddSignalsWrap && ddSignalsWrap._signalsState) ? (ddSignalsWrap._signalsState.headers[ddColIdx] || '') : (ddLabel ? (getState(ddLabel).headers[ddColIdx] || '') : '');
      const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      let html = '';
      if (!q) {
        const allC = vals.every(v => ddPending.checked.has(v));
        const someC = vals.some(v => ddPending.checked.has(v));
        html += `<div class="dd-item select-all" data-val="__all__">
      <input type="checkbox" id="dd-all" ${allC ? 'checked' : ''}>
      <label for="dd-all">(Select All)</label>
    </div>`;
      }
      vals.forEach((v, i) => {
        const chk = ddPending.checked.has(v) ? 'checked' : '';
        const rawDisp = v === '' ? '(blank)' : (useHumanReadableChannelTypes && isChannelTypeColumn(colHeader) ? getChannelTypeDisplay(v) : v);
        const disp = v === '' ? '<em style="color:#555">(blank)</em>' : esc(rawDisp);
        html += `<div class="dd-item" data-val="${v.replace(/"/g, '&quot;').replace(/'/g, "&#39;")}">
      <input type="checkbox" id="dd-v${i}" ${chk}>
      <label for="dd-v${i}">${disp}</label>
    </div>`;
      });
      ddList.innerHTML = html;
      const allCb = ddList.querySelector('#dd-all');
      if (allCb) {
        const allC = vals.every(v => ddPending.checked.has(v));
        const someC = vals.some(v => ddPending.checked.has(v));
        allCb.indeterminate = !allC && someC;
      }
      ddList.querySelectorAll('.dd-item').forEach(item => {
        item.addEventListener('click', e => {
          if (e.target.tagName === 'INPUT') return;
          const cb = item.querySelector('input[type=checkbox]');
          cb.checked = !cb.checked;
          cb.dispatchEvent(new Event('change'));
        });
        item.querySelector('input').addEventListener('change', () => {
          const val = item.dataset.val;
          const q2 = ddSearchEl.value;
          const vis = q2 ? ddAllValues.filter(v => v.toLowerCase().includes(q2.toLowerCase())) : ddAllValues;
          if (val === '__all__') {
            const cb = item.querySelector('input');
            if (cb.checked) vis.forEach(v => ddPending.checked.add(v));
            else vis.forEach(v => ddPending.checked.delete(v));
            renderDDList(q2);
          } else {
            const cb = item.querySelector('input');
            if (cb.checked) ddPending.checked.add(val);
            else ddPending.checked.delete(val);
            const allCb2 = ddList.querySelector('#dd-all');
            if (allCb2) {
              const allC = vis.every(v => ddPending.checked.has(v));
              const someC = vis.some(v => ddPending.checked.has(v));
              allCb2.checked = allC;
              allCb2.indeterminate = !allC && someC;
            }
          }
        });
      });
    }

    ddSearchEl.addEventListener('input', () => renderDDList(ddSearchEl.value));

    function updateDDSortBtns() {
      document.getElementById('dd-asc').className = ddPending.sortDir === 1 ? 'active' : '';
      document.getElementById('dd-desc').className = ddPending.sortDir === -1 ? 'active' : '';
      document.getElementById('dd-nosort').className = ddPending.sortDir === 0 ? 'active' : '';
    }
    function ddSort(dir) { ddPending.sortDir = dir; updateDDSortBtns(); }

    function ddApply() {
      if (ddLabel === '__signals__' && ddSignalsWrap) {
        const st = ddSignalsWrap._signalsState;
        if (st) {
          if (ddPending.sortDir !== 0) { st.sortCol = ddColIdx; st.sortDir = ddPending.sortDir; }
          else if (st.sortCol === ddColIdx) { st.sortCol = -1; }
          const allSel = ddAllValues.every(v => ddPending.checked.has(v));
          st.colFilters[ddColIdx] = allSel ? null : new Set(ddPending.checked);
          updateSignalsHeaderUI(ddSignalsWrap);
          renderSignalsTableBody(ddSignalsWrap);
        }
        dropdown.classList.remove('open');
        ddSignalsWrap = null;
        return;
      }
      const st = getState(ddLabel);
      if (ddPending.sortDir !== 0) { st.sortCol = ddColIdx; st.sortDir = ddPending.sortDir; }
      else if (st.sortCol === ddColIdx) { st.sortCol = -1; }
      const allSel = ddAllValues.every(v => ddPending.checked.has(v));
      st.colFilters[ddColIdx] = allSel ? null : new Set(ddPending.checked);
      dropdown.classList.remove('open');
      if (ddLabel === activeLabel) { updateHeaderUI(ddLabel); renderTable(ddLabel); }
    }
    function ddCancel() { dropdown.classList.remove('open'); }

    document.addEventListener('click', e => {
      if (!dropdown.contains(e.target) && !e.target.closest('.th-inner')) dropdown.classList.remove('open');
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') dropdown.classList.remove('open'); });

    // ============================================================
    // SSE — receive file updates from server
    // ============================================================
    function connectSSE() {
      const status = document.getElementById('sse-status');
      const es = new EventSource('/api/sse');

      es.onopen = () => {
        status.className = 'ok';
        status.textContent = '● live';
      };
      es.onerror = () => {
        status.className = 'err';
        status.textContent = '○ reconnecting…';
      };
      es.onmessage = e => {
        try {
          const data = JSON.parse(e.data);
          const key = data.key ?? data.label;
          const label = data.label ?? key;
          const content = data.content;
          if (key == null || content === undefined) return;
          if (label) keyToLabel[key] = label;
          applyFileContent(key, content);
          if (key !== POST_HARNESS_INSTANCES_LIST_KEY) {
            if (!document.querySelector(`.tab[data-label="${CSS.escape(key)}"]`)) {
              buildTabs([key], keyToLabel);
            } else {
              setTabDisplayName(key, keyToLabel[key] || key);
            }
            markUpdated(key);
          }
          if (key === activeLabel || (key === POST_HARNESS_INSTANCES_LIST_KEY && activeLabel === INSTANCES_LIST_KEY && instancesListSourceKey === POST_HARNESS_INSTANCES_LIST_KEY)) {
            buildHeader(activeLabel);
            if (key === CHANNEL_MAP_KEY) buildChannelDropdowns();
            if (key === DISCONNECT_MAP_KEY) buildDisconnectDropdowns();
            if (key === CIRCUITS_LIST_KEY) buildCircuitsDropdowns();
            renderTable(activeLabel);
          }
        } catch (_) { }
      };
    }

    // ============================================================
    // Boot — fetch all files; embedded = single pane from hash, else full tab bar
    // ============================================================
    (async function init() {
      const embedded = document.body.classList.contains('embedded');
      try {
        const r = await fetch('/api/files');
        const files = await r.json(); // { fileKey: { content, label }, ... }
        const keys = Object.keys(files);
        if (!keys.length) {
          document.getElementById('empty-msg').textContent = 'No files loaded.';
          return;
        }
        if (embedded) {
          const hashKey = window.location.hash ? decodeURIComponent(window.location.hash.replace(/^#/, '').trim()) : '';
          if (!hashKey || !keys.includes(hashKey)) {
            document.getElementById('empty-msg').textContent = hashKey ? 'Unknown pane.' : 'No pane selected.';
            return;
          }
          const key = hashKey;
          const item = files[key];
          const content = typeof item === 'string' ? item : (item && item.content);
          const label = (item && item.label) || key;
          keyToLabel[key] = label;
          applyFileContent(key, content);
          activeLabel = key;
          switchTab(key);
          connectSSE();
          return;
        }
        keys.forEach(key => {
          const item = files[key];
          const content = typeof item === 'string' ? item : (item && item.content);
          const label = (item && item.label) || key;
          keyToLabel[key] = label;
          applyFileContent(key, content);
        });
        const tabKeys = keys.filter(k => k !== POST_HARNESS_INSTANCES_LIST_KEY);
        buildTabs(tabKeys, keyToLabel);
        const hashKey = window.location.hash ? decodeURIComponent(window.location.hash.replace(/^#/, '').trim()) : '';
        if (hashKey && tabKeys.includes(hashKey)) {
          switchTab(hashKey);
        } else {
          switchTab(tabKeys[0] || keys[0]);
        }
        connectSSE();
      } catch (e) {
        document.getElementById('empty-msg').textContent = 'Could not connect to server.';
      }
    })();
  </script>
</body>
