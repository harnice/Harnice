<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>System Viewer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #1a1a1a;
      color: #eee;
    }

    /* Embedded in feature tree: no tab bar, no top bar (toolbar is in shell) */
    body.embedded #tab-bar {
      display: none !important;
    }

    body.embedded #top-bar {
      display: none !important;
    }

    body.embedded #main {
      flex: 1;
      width: 100%;
      min-width: 0;
    }

    /* ---- Left tab bar ---- */
    #tab-bar {
      width: 200px;
      min-width: 200px;
      background: #252525;
      border-right: 1px solid #404040;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #tab-bar-title {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 12px 8px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    .tab {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      border-left: 3px solid transparent;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .1s;
      user-select: none;
    }

    .tab:hover {
      background: #2e2e2e;
      color: #ccc;
    }

    .tab.active {
      background: #2a2a2a;
      color: #eee;
      border-left-color: #b8860b;
    }

    .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8860b;
      flex-shrink: 0;
      display: none;
    }

    .tab.updated .tab-dot {
      display: block;
    }

    .tab-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    /* ---- Main pane ---- */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #top-bar {
      background: #252525;
      border-bottom: 1px solid #404040;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    #search-input {
      flex: 1;
      min-width: 140px;
      padding: 5px 8px;
      background: #1a1a1a;
      border: 1px solid #404040;
      border-radius: 4px;
      color: #eee;
      font-size: 12px;
    }

    #search-input:focus {
      outline: none;
      border-color: #888;
    }

    .badge {
      background: #2a2a2a;
      border: 1px solid #404040;
      color: #888;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      white-space: nowrap;
    }

    .icon-btn {
      background: #333;
      border: 1px solid #505050;
      color: #999;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
      width: auto;
    }

    .icon-btn:hover {
      background: #404040;
      color: #eee;
    }

    #table-wrap {
      flex: 1;
      overflow: auto;
    }

    /* Devices tab: clickable row + embedded signals list viewer (subset styling) */
    tr.device-row {
      cursor: pointer;
    }

    tr.device-row:hover {
      background: #2a2a2a;
    }

    tr.device-row.signals-expanded td {
      background: #3d3500 !important;
      color: #f0e68c;
    }

    tr.device-row.signals-expanded:hover td {
      background: #4a4000 !important;
    }

    tr.signals-detail-row {
      display: none;
      background: #1a1a1a;
    }

    tr.signals-detail-row.expanded {
      display: table-row;
    }

    tr.signals-detail-row td {
      padding: 0;
      border-bottom: 1px solid #333;
      vertical-align: top;
    }

    /* Same font, padding, and borders as main table; thick border + tint to show subset */
    .signals-viewer-wrap {
      padding: 0;
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
      border: 3px solid #404040;
      border-radius: 4px;
      background: #1e1e1e;
      margin: 6px 10px 10px;
    }

    .signals-viewer-wrap table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }

    .signals-viewer-wrap thead th {
      background: #252525;
      padding: 8px 10px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 2px solid #404040;
      white-space: nowrap;
    }

    .signals-viewer-wrap tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid #282828;
      color: #ccc;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .signals-viewer-wrap tbody tr:nth-child(even) td {
      background: #1e1e1e;
    }

    .signals-viewer-wrap tbody tr:nth-child(odd) td {
      background: #1a1a1a;
    }

    .signals-viewer-wrap tbody tr:hover td {
      background: #252525;
    }

    .signals-viewer-wrap .signals-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid #333;
      background: #252525;
    }

    .signals-viewer-wrap .signals-search {
      flex: 1;
      min-width: 120px;
      padding: 5px 8px;
      background: #1a1a1a;
      border: 1px solid #404040;
      border-radius: 4px;
      color: #eee;
      font-size: 12px;
    }

    .signals-viewer-wrap .signals-search:focus {
      outline: none;
      border-color: #888;
    }

    .signals-viewer-wrap .signals-row-badge {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
    }

    .signals-viewer-wrap .signals-clear-btn {
      flex-shrink: 0;
      background: #333;
      border: 1px solid #505050;
      color: #999;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
    }

    .signals-viewer-wrap .signals-clear-btn:hover {
      background: #404040;
      color: #eee;
    }

    .signals-viewer-wrap .th-inner {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .signals-viewer-wrap .th-inner:hover {
      color: #b8860b;
    }

    .signals-viewer-wrap .th-inner.filtered .filter-dot {
      display: block;
    }

    .signals-viewer-wrap .loading,
    .signals-viewer-wrap .error {
      padding: 8px 10px;
      color: #888;
      font-size: 12px;
      font-style: italic;
    }

    .signals-viewer-wrap .error {
      color: #c66;
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead {
      position: sticky;
      top: 0;
      z-index: 5;
    }

    th {
      background: #252525;
      padding: 0;
      border-bottom: 2px solid #404040;
      white-space: nowrap;
    }

    .th-inner {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .th-inner:hover {
      color: #b8860b;
    }

    .sort-btn {
      opacity: .35;
      font-style: normal;
      font-size: 10px;
      margin-left: 2px;
      flex-shrink: 0;
    }

    th.asc .sort-btn,
    th.desc .sort-btn {
      opacity: 1;
      color: #b8860b;
    }

    .filter-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #b8860b;
      flex-shrink: 0;
      display: none;
    }

    .th-inner.filtered .filter-dot {
      display: block;
    }

    td {
      padding: 7px 10px;
      border-bottom: 1px solid #282828;
      color: #ccc;
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tr:hover td {
      background: #252525;
    }

    tr:nth-child(even) td {
      background: #1e1e1e;
    }

    tr:nth-child(even):hover td {
      background: #252525;
    }

    .no-rows td {
      text-align: center;
      color: #555;
      padding: 24px;
    }

    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444;
      gap: 8px;
    }

    #empty-state svg {
      opacity: .25;
    }

    #empty-state p {
      font-size: 13px;
    }

    /* ---- Column dropdown ---- */
    .col-dropdown {
      position: fixed;
      z-index: 1000;
      background: #2a2a2a;
      border: 1px solid #505050;
      border-radius: 6px;
      width: 220px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .6);
      display: none;
      flex-direction: column;
      font-size: 12px;
      overflow: hidden;
    }

    .col-dropdown.open {
      display: flex;
    }

    .dd-search-wrap {
      padding: 8px;
      border-bottom: 1px solid #404040;
    }

    .dd-search-wrap input {
      width: 100%;
      padding: 5px 7px;
      border-radius: 4px;
      background: #1a1a1a;
      border: 1px solid #404040;
      color: #eee;
      font-size: 12px;
    }

    .dd-search-wrap input:focus {
      outline: none;
      border-color: #888;
    }

    .dd-sort {
      display: flex;
      border-bottom: 1px solid #404040;
    }

    .dd-sort button {
      flex: 1;
      background: #222;
      border: none;
      border-radius: 0;
      color: #999;
      font-size: 11px;
      padding: 7px 4px;
      cursor: pointer;
    }

    .dd-sort button:hover {
      background: #333;
      color: #eee;
    }

    .dd-sort button.active {
      color: #b8860b;
      background: #2a2400;
    }

    .dd-list {
      overflow-y: auto;
      max-height: 220px;
    }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .dd-item:hover {
      background: #333;
    }

    .dd-item input[type=checkbox] {
      width: auto;
      margin: 0;
      cursor: pointer;
      accent-color: #b8860b;
    }

    .dd-item label {
      margin: 0;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .dd-item.select-all label {
      color: #aaa;
      font-style: italic;
    }

    .dd-footer {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #404040;
    }

    .dd-footer button {
      flex: 1;
      padding: 5px;
      font-size: 11px;
      background: #555;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .dd-footer button:hover {
      background: #666;
    }

    .dd-footer button.secondary {
      background: #333;
      border: 1px solid #666;
    }

    .dd-footer button.secondary:hover {
      background: #404040;
    }

    #sse-status {
      font-size: 10px;
      padding: 4px 8px;
      margin: 8px 12px 4px;
      border-radius: 4px;
      text-align: center;
      flex-shrink: 0;
    }

    #sse-status.ok {
      background: #1a2e1a;
      color: #5a9;
      border: 1px solid #2a4a2a;
    }

    #sse-status.err {
      background: #2e1a1a;
      color: #a55;
      border: 1px solid #4a2a2a;
    }

    /* Global channel type display toggle (bottom left) */
    #channel-type-display-wrap {
      margin: 8px 12px 12px;
      padding: 8px 10px;
      background: #222;
      border: 1px solid #404040;
      border-radius: 6px;
      flex-shrink: 0;
    }

    #channel-type-display-wrap label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 11px;
      color: #999;
      margin: 0;
    }

    #channel-type-display-wrap input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
      accent-color: #b8860b;
    }

    #channel-type-display-wrap .channel-type-display-label {
      color: #888;
    }

    /* ---- Channel / Disconnect / Circuits viewer headers (above table when tab active) ---- */
    #channel-viewer-header,
    #disconnect-viewer-header,
    #circuits-viewer-header {
      background: #222;
      border-bottom: 1px solid #404040;
      padding: 12px 14px;
      flex-shrink: 0;
      display: none;
    }

    #channel-viewer-header.visible,
    #disconnect-viewer-header.visible,
    #circuits-viewer-header.visible,
    #instances-viewer-header.visible {
      display: block;
    }

    #instances-viewer-header {
      background: #222;
      border-bottom: 1px solid #404040;
      padding: 12px 14px;
      flex-shrink: 0;
      display: none;
    }

    .instances-source-options {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: stretch;
    }

    .instances-source-option {
      flex: 1;
      min-width: 140px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #2a2a2a;
      border: 2px solid #404040;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .instances-source-option:hover {
      background: #333;
      border-color: #555;
    }

    .instances-source-option input[type="radio"] {
      width: 14px;
      height: 14px;
      margin: 0;
      flex-shrink: 0;
      accent-color: #b8860b;
      cursor: pointer;
    }

    .instances-source-option.selected {
      border-color: #b8860b;
      background: #2a2600;
    }

    .instances-source-option span {
      margin: 0;
      font-size: 12px;
      font-weight: 500;
      color: #ccc;
      cursor: pointer;
      flex: 1;
    }

    .instances-source-option.selected span {
      color: #e8d088;
    }

    .channel-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .channel-toggle-wrap input[type="checkbox"] {
      width: auto;
      margin: 0;
      cursor: pointer;
      accent-color: #666;
    }

    .channel-toggle-wrap label {
      margin: 0;
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }

    .channel-sentence {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px 6px;
    }

    .channel-sentence select {
      background: #1a1a1a;
      border: 1px solid #404040;
      border-radius: 4px;
      color: #999;
      padding: 4px 8px;
      font-size: 12px;
      min-width: 80px;
      max-width: 160px;
    }

    .channel-sentence select:focus {
      outline: none;
      border-color: #555;
    }

    .channel-type-row {
      font-size: 12px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .channel-type-row select {
      background: #1a1a1a;
      border: 1px solid #404040;
      border-radius: 4px;
      color: #999;
      padding: 4px 8px;
      font-size: 12px;
    }

    .channel-clear-btn {
      background: #333;
      border: 1px solid #505050;
      color: #999;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 11px;
      margin-left: 8px;
    }

    .channel-clear-btn:hover {
      background: #404040;
      color: #ccc;
    }
  </style>
</head>

<body>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var inIframe = false;
      try { inIframe = window.self !== window.top; } catch (e) { }
      if (params.get('embedded') === '1' || inIframe) {
        document.body.classList.add('embedded');
      }
    })();
  </script>

  <!-- Left tab bar -->
  <div id="tab-bar">
    <div id="tab-bar-title">Files</div>
    <div id="tab-list"></div>
    <div id="sse-status" class="err">⏳ connecting…</div>
    <div id="channel-type-display-wrap">
      <label>
        <input type="checkbox" id="channel-type-human-readable"
          title="Show channel types as description (direction) instead of raw tuple">
        <span class="channel-type-display-label">Channel types: human-readable</span>
      </label>
    </div>
  </div>

  <!-- Main content -->
  <div id="main">
    <div id="top-bar">
      <input type="text" id="search-input" placeholder="Search all columns…">
      <button class="icon-btn" onclick="clearAllFilters()">✕ Clear filters</button>
      <span class="badge" id="row-badge">—</span>
    </div>
    <!-- Instances viewer header: shown only when Instances List tab is active -->
    <div id="instances-viewer-header">
      <p class="channel-sentence" style="margin-bottom: 10px;">Show:</p>
      <div class="instances-source-options">
        <label class="instances-source-option" id="instances-option-instances" data-value="instances list">
          <input type="radio" name="instances-source" value="instances list">
          <span>Instances list</span>
        </label>
        <label class="instances-source-option" id="instances-option-postharness"
          data-value="post harness instances list">
          <input type="radio" name="instances-source" value="post harness instances list">
          <span>Post harness instances list</span>
        </label>
      </div>
    </div>
    <!-- Channel viewer header: shown only when Channel Map tab is active -->
    <div id="channel-viewer-header">
      <div class="channel-toggle-wrap">
        <input type="checkbox" id="ch-unmapped">
        <label for="ch-unmapped">Show unmapped channels</label>
      </div>
      <p class="channel-sentence">
        Show me channels in
        <select id="ch-net">
          <option value="">any merged net</option>
        </select>
        that connect
        <select id="ch-chan-a">
          <option value="">any channel</option>
        </select>
        of
        <select id="ch-dev-a">
          <option value="">any device</option>
        </select>
        to
        <select id="ch-chan-b">
          <option value="">any channel</option>
        </select>
        of
        <select id="ch-dev-b">
          <option value="">any device</option>
        </select>.
      </p>
      <p class="channel-type-row">
        Channel type
        <select id="ch-type-rel">
          <option value="any">is any</option>
          <option value="is_or_compatible">is or is compatible with</option>
        </select>
        <select id="ch-type-val" style="display:none;">
          <option value="">—</option>
        </select>
        <button type="button" class="channel-clear-btn" id="ch-clear">Clear</button>
      </p>
    </div>
    <!-- Disconnect viewer header: shown only when Disconnect Map tab is active -->
    <div id="disconnect-viewer-header">
      <div class="channel-toggle-wrap">
        <input type="checkbox" id="dc-available">
        <label for="dc-available">Show available disconnect channels</label>
      </div>
      <p class="channel-sentence">
        Show me channels that pass through
        <select id="dc-disc-chan">
          <option value="">any channel</option>
        </select>
        of
        <select id="dc-disc">
          <option value="">any disconnect</option>
        </select>
        that connect
        <select id="dc-chan-a">
          <option value="">any channel</option>
        </select>
        of
        <select id="dc-dev-a">
          <option value="">any device</option>
        </select>
        to
        <select id="dc-chan-b">
          <option value="">any channel</option>
        </select>
        of
        <select id="dc-dev-b">
          <option value="">any device</option>
        </select>.
      </p>
      <p class="channel-type-row">
        Channel type
        <select id="dc-type-rel">
          <option value="any">is any</option>
          <option value="is_or_compatible">is or is compatible with</option>
        </select>
        <select id="dc-type-val" style="display:none;">
          <option value="">—</option>
        </select>
        <button type="button" class="channel-clear-btn" id="dc-clear">Clear</button>
      </p>
    </div>
    <!-- Circuits viewer header: shown only when Circuits tab is active -->
    <div id="circuits-viewer-header">
      <p class="channel-sentence">
        Show me circuits that connect
        <select id="ci-chan-a">
          <option value="">any channel</option>
        </select>
        on
        <select id="ci-conn-a">
          <option value="">any connector</option>
        </select>
        of
        <select id="ci-dev-a">
          <option value="">any device</option>
        </select>
        to
        <select id="ci-chan-b">
          <option value="">any channel</option>
        </select>
        on
        <select id="ci-conn-b">
          <option value="">any connector</option>
        </select>
        of
        <select id="ci-dev-b">
          <option value="">any device</option>
        </select>.
      </p>
      <p class="channel-type-row">
        Channel type
        <select id="ci-type-rel">
          <option value="any">is any</option>
          <option value="is_or_compatible">is or is compatible with</option>
        </select>
        <select id="ci-type-val" style="display:none;">
          <option value="">—</option>
        </select>
        and signal is
        <select id="ci-signal">
          <option value="">any</option>
        </select>
        <button type="button" class="channel-clear-btn" id="ci-clear">Clear</button>
      </p>
    </div>
    <div id="table-wrap">
      <div id="empty-state">

          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        <p id="empty-msg">Waiting for files…</p>

        <tbody id="tbody"></tbody>

  <!-- Column dropdown -->
  <div class="col-dropdown" id="col-dropdown">
    <div class="dd-search-wrap"><input type="text" id="dd-search" placeholder="Search values…"></div>
    <div class="dd-sort">
      <button id="dd-asc" onclick="ddSort(1)">↑ A→Z</button>
      <button id="dd-desc" onclick="ddSort(-1)">↓ Z→A</button>
      <button id="dd-nosort" onclick="ddSort(0)">✕ None</button>

    <div class="dd-footer">
      <button class="secondary" onclick="ddCancel()">Cancel</button>
      <button onclick="ddApply()">Apply</button>
