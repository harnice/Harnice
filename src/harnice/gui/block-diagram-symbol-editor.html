<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Block Diagram Symbol Editor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #1e1e1e;
      --bg2: #252526;
      --bg3: #2d2d2d;
      --border: #3c3c3c;
      --text: #d4d4d4;
      --text-dim: #888;
      --accent: #4ec9b0;
      --grid: #333;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #properties-panel {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 100;
      min-width: 200px;
      max-width: 320px;
      max-height: calc(100% - 24px);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35), 0 0 1px rgba(0, 0, 0, 0.2);
      padding: 12px 14px;
      font-size: 12px;
      overflow-y: auto;
    }

    #properties-panel.popup-visible {
      display: block;
    }

    #properties-panel .prop-title {
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-size: 11px;
      text-transform: uppercase;
    }

    #properties-panel .prop-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    #properties-panel .prop-row label {
      min-width: 72px;
      color: var(--text-dim);
    }

    #properties-panel .prop-section {
      font-weight: 600;
      color: var(--text-dim);
      margin: 10px 0 6px;
      font-size: 11px;
      text-transform: uppercase;
    }

    #properties-panel .prop-row input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 2px;
      font-size: 12px;
    }

    #properties-panel .prop-row input:focus {
      outline: none;
      border-color: var(--accent);
    }

    #properties-panel .empty-msg {
      color: var(--text-dim);
      font-style: italic;
    }

    #svg-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: default;
    }

    #svg-container.panning {
      cursor: grabbing;
    }

    .pin {
      fill: var(--accent);
    }

    .selected {
      outline: 1px solid var(--accent);
      outline-offset: 1px;
    }

    #rubber-band,
    #preview-line,
    #preview-circle {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1;
      pointer-events: none;
    }

    #rubber-band {
      stroke-dasharray: 4 2;
    }

    #preview-circle {
      fill: none;
    }

    #grid-pattern {
      width: 10px;
      height: 10px;
    }

    #grid-pattern line {
      stroke: var(--grid);
      stroke-width: 0.5;
    }

    .resize-handle {
      fill: var(--accent);
      stroke: var(--bg);
      stroke-width: 1;
      cursor: nwse-resize;
      pointer-events: all;
    }

    .resize-handle.n {
      cursor: ns-resize;
    }

    .resize-handle.s {
      cursor: ns-resize;
    }

    .resize-handle.e {
      cursor: ew-resize;
    }

    .resize-handle.w {
      cursor: ew-resize;
    }

    .resize-handle.ne {
      cursor: nesw-resize;
    }

    .resize-handle.sw {
      cursor: nesw-resize;
    }

    #properties-panel .prop-row input[type="range"] {
      padding: 0;
      height: 6px;
    }

    #properties-panel .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    #properties-panel .color-swatch {
      width: 28px;
      height: 24px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #properties-panel .color-swatch:hover {
      border-color: var(--accent);
    }

    #properties-panel .color-picker-hex {
      flex: 1;
      min-width: 0;
    }

    #properties-panel .color-picker-popover {
      position: absolute;
      z-index: 200;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      display: none;
    }

    #properties-panel .color-picker-popover.visible {
      display: block;
    }

    #properties-panel .color-picker-sv {
      width: 150px;
      height: 120px;
      cursor: crosshair;
      border-radius: 4px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }

    #properties-panel .color-picker-hue {
      width: 150px;
      height: 10px;
      cursor: crosshair;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>
  <div id="canvas-wrap">
    <div id="svg-container">
      <svg id="svg-root" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 400 400"
        preserveAspectRatio="xMidYMid meet">
        <defs>
          <pattern id="grid-pattern" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="0" y2="10" stroke="var(--grid)" stroke-width="0.5" />
            <line x1="0" y1="0" x2="10" y2="0" stroke="var(--grid)" stroke-width="0.5" />
          </pattern>
        </defs>
        <g id="svg-viewport">
          <rect id="grid-bg" fill="url(#grid-pattern)" x="-5000" y="-5000" width="10000" height="10000" />
          <g id="svg-content" />
          <rect id="rubber-band" visibility="hidden" />
          <line id="preview-line" visibility="hidden" stroke="var(--accent)" stroke-width="1" />
          <circle id="preview-circle" visibility="hidden" fill="none" stroke="var(--accent)" stroke-width="1" />
          <g id="resize-handles" pointer-events="none" />
        </g>
      </svg>
    </div>
    <div id="properties-panel">
      <div id="properties-content"></div>
      <div id="color-picker-popover" class="color-picker-popover">
        <div class="color-picker-sv" id="color-picker-sv"></div>
        <div class="color-picker-hue" id="color-picker-hue"></div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const embedded = window !== window.top;
      let appState = {
        activeTool: 'select',
        snapEnabled: true,
        dirty: false,
        grid: 10,
        panX: 0,
        panY: 0,
        scale: 1,
        svgDoc: null,
        selection: new Set(),
      };

      const commandHistory = { undoStack: [], redoStack: [] };
      const AUTOSAVE_MS = 500;
      let saveTimer = null;

      function notifyParent(type, payload) {
        if (embedded && window.parent) {
          window.parent.postMessage({ type: type, ...payload }, '*');
        }
      }

      function sendStatus(dirty) {
        appState.dirty = dirty;
        notifyParent('sde-status', { dirty: dirty, filename: 'block diagram symbol' });
        if (dirty) scheduleAutosave();
      }

      function scheduleAutosave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(doSave, AUTOSAVE_MS);
      }

      function doSave() {
        if (!appState.dirty) return;
        clearTimeout(saveTimer);
        saveTimer = null;
        try {
          const content = document.getElementById('svg-content');
          if (!content) return;
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
          const vb = content.firstElementChild ? getViewBox() : { x: 0, y: 0, w: 400, h: 400 };
          svg.setAttribute('viewBox', vb.x + ' ' + vb.y + ' ' + vb.w + ' ' + vb.h);
          Array.from(content.children).forEach(function (child) {
            svg.appendChild(child.cloneNode(true));
          });
          const body = new XMLSerializer().serializeToString(svg);
          fetch('/api/block_diagram_symbol', {
            method: 'POST',
            headers: { 'Content-Type': 'image/svg+xml; charset=utf-8' },
            body: body,
          })
            .then(function (r) {
              if (r.ok) {
                appState.dirty = false;
                sendStatus(false);
              } else {
                scheduleAutosave();
              }
            })
            .catch(function () {
              setTimeout(scheduleAutosave, 2000);
            });
        } catch (err) {
          console.warn('Block diagram symbol save error:', err);
          setTimeout(scheduleAutosave, 2000);
        }
      }

      function sendTool(tool) {
        appState.activeTool = tool;
        notifyParent('sde-tool', { tool: tool });
      }

      function sendSnap(enabled) {
        appState.snapEnabled = enabled;
        notifyParent('sde-snap', { enabled: enabled });
      }

      function sendCanUndoRedo() {
        const canUndo = commandHistory.undoStack.length > 0;
        const canRedo = commandHistory.redoStack.length > 0;
        notifyParent('sde-can-undo-redo', { canUndo: canUndo, canRedo: canRedo });
      }

      function executeCommand(cmd) {
        if (cmd.type === 'BATCH') {
          cmd.commands.forEach(function (c) { c.execute(); });
        } else {
          cmd.execute();
        }
        commandHistory.undoStack.push(cmd);
        commandHistory.redoStack.length = 0;
        appState.dirty = true;
        sendStatus(true);
        sendCanUndoRedo();
      }

      function undo() {
        const cmd = commandHistory.undoStack.pop();
        if (!cmd) return;
        if (cmd.type === 'BATCH') {
          for (let i = cmd.commands.length - 1; i >= 0; i--) cmd.commands[i].undo();
        } else {
          cmd.undo();
        }
        commandHistory.redoStack.push(cmd);
        appState.dirty = commandHistory.undoStack.length > 0;
        sendStatus(appState.dirty);
        sendCanUndoRedo();
        updatePropertiesPanel();
      }

      function redo() {
        const cmd = commandHistory.redoStack.pop();
        if (!cmd) return;
        if (cmd.type === 'BATCH') {
          cmd.commands.forEach(function (c) { c.execute(); });
        } else {
          cmd.execute();
        }
        commandHistory.undoStack.push(cmd);
        appState.dirty = true;
        sendStatus(true);
        sendCanUndoRedo();
        updatePropertiesPanel();
      }

      function batch(commands) {
        return { type: 'BATCH', commands: commands };
      }

      function createMoveElementsCommand(elementIds, dx, dy) {
        const content = document.getElementById('svg-content');
        const deltas = [];
        elementIds.forEach(function (id) {
          const el = content.querySelector('#' + CSS.escape(id));
          if (el) deltas.push({ el: el, dx: dx, dy: dy });
        });
        return {
          execute: function () {
            deltas.forEach(function (d) {
              translateElement(d.el, d.dx, d.dy);
            });
          },
          undo: function () {
            deltas.forEach(function (d) {
              translateElement(d.el, -d.dx, -d.dy);
            });
          },
        };
      }

      function createDeleteElementCommand(element) {
        const parent = element.parentNode;
        const nextSibling = element.nextSibling;
        return {
          execute: function () {
            element.remove();
            appState.selection.delete(ensureElementId(element));
            updateSelectionVisuals();
          },
          undo: function () {
            if (nextSibling) {
              parent.insertBefore(element, nextSibling);
            } else {
              parent.appendChild(element);
            }
            appState.selection.add(ensureElementId(element));
            updateSelectionVisuals();
          },
        };
      }

      function translateElement(el, dx, dy) {
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'line') {
          el.setAttribute('x1', parseFloat(el.getAttribute('x1') || 0) + dx);
          el.setAttribute('y1', parseFloat(el.getAttribute('y1') || 0) + dy);
          el.setAttribute('x2', parseFloat(el.getAttribute('x2') || 0) + dx);
          el.setAttribute('y2', parseFloat(el.getAttribute('y2') || 0) + dy);
        } else if (tag === 'rect') {
          el.setAttribute('x', parseFloat(el.getAttribute('x') || 0) + dx);
          el.setAttribute('y', parseFloat(el.getAttribute('y') || 0) + dy);
        } else if (tag === 'circle' || tag === 'ellipse') {
          el.setAttribute('cx', parseFloat(el.getAttribute('cx') || 0) + dx);
          el.setAttribute('cy', parseFloat(el.getAttribute('cy') || 0) + dy);
        } else if (tag === 'text') {
          el.setAttribute('x', parseFloat(el.getAttribute('x') || 0) + dx);
          el.setAttribute('y', parseFloat(el.getAttribute('y') || 0) + dy);
        } else {
          const x = el.getAttribute('transform') || '';
          const m = x.match(/translate\(([^,]+),([^)]+)\)/);
          const tx = m ? parseFloat(m[1]) + dx : dx;
          const ty = m ? parseFloat(m[2]) + dy : dy;
          const rest = (x.replace(/translate\([^)]*\)\s*/g, '') || '').trim();
          el.setAttribute('transform', 'translate(' + tx + ',' + ty + ')' + (rest ? ' ' + rest : ''));
        }
      }

      function snapToGrid(x, y, force) {
        if (!force && !appState.snapEnabled) return { x: x, y: y };
        const g = appState.grid;
        return { x: Math.round(x / g) * g, y: Math.round(y / g) * g };
      }

      function getElementAnchor(el) {
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'line') {
          return {
            x: (parseFloat(el.getAttribute('x1') || 0) + parseFloat(el.getAttribute('x2') || 0)) / 2,
            y: (parseFloat(el.getAttribute('y1') || 0) + parseFloat(el.getAttribute('y2') || 0)) / 2,
          };
        }
        if (tag === 'rect') {
          return { x: parseFloat(el.getAttribute('x') || 0), y: parseFloat(el.getAttribute('y') || 0) };
        }
        if (tag === 'circle' || tag === 'ellipse') {
          return { x: parseFloat(el.getAttribute('cx') || 0), y: parseFloat(el.getAttribute('cy') || 0) };
        }
        if (tag === 'text') {
          return { x: parseFloat(el.getAttribute('x') || 0), y: parseFloat(el.getAttribute('y') || 0) };
        }
        const m = (el.getAttribute('transform') || '').match(/translate\(([^,]+),([^)]+)\)/);
        return { x: m ? parseFloat(m[1]) : 0, y: m ? parseFloat(m[2]) : 0 };
      }

      function ensureElementId(el) {
        if (el.id) return el.id;
        el.id = 'sde-' + Date.now() + '-' + Math.random().toString(36).slice(2, 9);
        return el.id;
      }

      function createAddElementCommand(element) {
        const content = document.getElementById('svg-content');
        return {
          execute: function () {
            content.appendChild(element);
            ensureElementId(element);
          },
          undo: function () {
            element.remove();
          },
        };
      }

      function createSetAttributeCommand(el, attr, oldVal, newVal) {
        return {
          execute: function () {
            if (newVal != null && newVal !== '') el.setAttribute(attr, String(newVal));
            else el.removeAttribute(attr);
          },
          undo: function () {
            if (oldVal != null && oldVal !== '') el.setAttribute(attr, String(oldVal));
            else el.removeAttribute(attr);
          },
        };
      }

      function updateSelectionVisuals() {
        const content = document.getElementById('svg-content');
        if (!content) return;
        content.querySelectorAll('.selected').forEach(function (el) { el.classList.remove('selected'); });
        appState.selection.forEach(function (id) {
          const el = content.querySelector('#' + CSS.escape(id));
          if (el) el.classList.add('selected');
        });
        updateResizeHandles();
        updatePropertiesPanel();
      }

      function updateResizeHandles() {
        const group = document.getElementById('resize-handles');
        if (!group) return;
        group.innerHTML = '';
        group.style.pointerEvents = 'none';
        const ids = Array.from(appState.selection);
        if (ids.length !== 1) return;
        const content = document.getElementById('svg-content');
        if (!content) return;
        const el = content.querySelector('#' + CSS.escape(ids[0]));
        if (!el) return;
        const tag = (el.tagName || '').toLowerCase();
        const pad = 5;
        const handleSize = 8;
        if (tag === 'rect') {
          group.style.pointerEvents = 'all';
          const x = parseFloat(el.getAttribute('x') || 0);
          const y = parseFloat(el.getAttribute('y') || 0);
          const w = parseFloat(el.getAttribute('width') || 0);
          const h = parseFloat(el.getAttribute('height') || 0);
          const positions = [
            { x: x, y: y, c: 'nw' },
            { x: x + w, y: y, c: 'ne' },
            { x: x + w, y: y + h, c: 'se' },
            { x: x, y: y + h, c: 'sw' },
            { x: x + w / 2, y: y, c: 'n' },
            { x: x + w, y: y + h / 2, c: 'e' },
            { x: x + w / 2, y: y + h, c: 's' },
            { x: x, y: y + h / 2, c: 'w' }
          ];
          positions.forEach(function (p, i) {
            const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            r.setAttribute('x', p.x - handleSize / 2);
            r.setAttribute('y', p.y - handleSize / 2);
            r.setAttribute('width', handleSize);
            r.setAttribute('height', handleSize);
            r.setAttribute('class', 'resize-handle ' + p.c);
            r.setAttribute('data-handle-index', String(i));
            r.setAttribute('data-element-id', el.id || '');
            group.appendChild(r);
          });
        } else if (tag === 'circle' && !(el.classList && el.classList.contains('pin'))) {
          group.style.pointerEvents = 'all';
          const cx = parseFloat(el.getAttribute('cx') || 0);
          const cy = parseFloat(el.getAttribute('cy') || 0);
          const r = parseFloat(el.getAttribute('r') || 0);
          const positions = [
            { x: cx + r, y: cy, c: 'e' },
            { x: cx, y: cy + r, c: 's' },
            { x: cx - r, y: cy, c: 'w' },
            { x: cx, y: cy - r, c: 'n' }
          ];
          positions.forEach(function (p, i) {
            const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            handle.setAttribute('x', p.x - handleSize / 2);
            handle.setAttribute('y', p.y - handleSize / 2);
            handle.setAttribute('width', handleSize);
            handle.setAttribute('height', handleSize);
            handle.setAttribute('class', 'resize-handle ' + p.c);
            handle.setAttribute('data-handle-index', String(i));
            handle.setAttribute('data-element-id', el.id || '');
            group.appendChild(handle);
          });
        } else if (tag === 'line') {
          group.style.pointerEvents = 'all';
          const x1 = parseFloat(el.getAttribute('x1') || 0);
          const y1 = parseFloat(el.getAttribute('y1') || 0);
          const x2 = parseFloat(el.getAttribute('x2') || 0);
          const y2 = parseFloat(el.getAttribute('y2') || 0);
          const positions = [
            { x: x1, y: y1, c: 'nw' },
            { x: x2, y: y2, c: 'se' }
          ];
          positions.forEach(function (p, i) {
            const h = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            h.setAttribute('x', p.x - handleSize / 2);
            h.setAttribute('y', p.y - handleSize / 2);
            h.setAttribute('width', handleSize);
            h.setAttribute('height', handleSize);
            h.setAttribute('class', 'resize-handle ' + p.c);
            h.setAttribute('data-handle-index', String(i));
            h.setAttribute('data-element-id', el.id || '');
            group.appendChild(h);
          });
        }
      }

      function getHandleAtPoint(svgX, svgY) {
        const group = document.getElementById('resize-handles');
        if (!group || group.style.pointerEvents === 'none') return null;
        const handles = group.querySelectorAll('rect.resize-handle');
        for (let i = 0; i < handles.length; i++) {
          const h = handles[i];
          const x = parseFloat(h.getAttribute('x') || 0);
          const y = parseFloat(h.getAttribute('y') || 0);
          const w = parseFloat(h.getAttribute('width') || 8);
          const pad = 4;
          if (svgX >= x - pad && svgX <= x + w + pad && svgY >= y - pad && svgY <= y + w + pad) {
            const content = document.getElementById('svg-content');
            const el = content.querySelector('#' + CSS.escape(h.getAttribute('data-element-id') || ''));
            return el ? { el: el, handleIndex: parseInt(h.getAttribute('data-handle-index') || '0', 10) } : null;
          }
        }
        return null;
      }

      function getElementGeomAttrs(el) {
        const tag = (el.tagName || '').toLowerCase();
        if (tag === 'rect') {
          return {
            x: parseFloat(el.getAttribute('x') || 0),
            y: parseFloat(el.getAttribute('y') || 0),
            width: parseFloat(el.getAttribute('width') || 0),
            height: parseFloat(el.getAttribute('height') || 0),
          };
        }
        if (tag === 'circle' || tag === 'ellipse') {
          return {
            cx: parseFloat(el.getAttribute('cx') || 0),
            cy: parseFloat(el.getAttribute('cy') || 0),
            r: parseFloat(el.getAttribute('r') || 0),
          };
        }
        if (tag === 'line') {
          return {
            x1: parseFloat(el.getAttribute('x1') || 0),
            y1: parseFloat(el.getAttribute('y1') || 0),
            x2: parseFloat(el.getAttribute('x2') || 0),
            y2: parseFloat(el.getAttribute('y2') || 0),
          };
        }
        return null;
      }

      function applyRectResize(el, pt, handleIndex, startAttrs) {
        const s = startAttrs;
        const g = appState.grid;
        const snap = function (x, y) {
          if (appState.snapEnabled) {
            return { x: Math.round(x / g) * g, y: Math.round(y / g) * g };
          }
          return { x: x, y: y };
        };
        let x = s.x, y = s.y, w = s.width, h = s.height;
        const x2 = s.x + s.width, y2 = s.y + s.height;
        const sp = snap(pt.x, pt.y);
        if (handleIndex === 0) {
          x = sp.x; y = sp.y; w = Math.max(1, x2 - sp.x); h = Math.max(1, y2 - sp.y);
        } else if (handleIndex === 1) {
          y = sp.y; w = Math.max(1, sp.x - s.x); h = Math.max(1, y2 - sp.y);
        } else if (handleIndex === 2) {
          w = Math.max(1, sp.x - s.x); h = Math.max(1, sp.y - s.y);
        } else if (handleIndex === 3) {
          x = sp.x; w = Math.max(1, x2 - sp.x); h = Math.max(1, sp.y - s.y);
        } else if (handleIndex === 4) {
          y = sp.y; h = Math.max(1, y2 - sp.y);
        } else if (handleIndex === 5) {
          w = Math.max(1, sp.x - s.x);
        } else if (handleIndex === 6) {
          h = Math.max(1, sp.y - s.y);
        } else if (handleIndex === 7) {
          x = sp.x; w = Math.max(1, x2 - sp.x);
        }
        el.setAttribute('x', x);
        el.setAttribute('y', y);
        el.setAttribute('width', w);
        el.setAttribute('height', h);
      }

      function applyCircleResize(el, pt, handleIndex, startAttrs) {
        const s = startAttrs;
        let r = Math.hypot(pt.x - s.cx, pt.y - s.cy);
        if (appState.snapEnabled) r = Math.round(r / appState.grid) * appState.grid;
        r = Math.max(1, r);
        el.setAttribute('r', r);
      }

      function applyLineResize(el, pt, handleIndex, startAttrs) {
        const s = startAttrs;
        const g = appState.grid;
        const snap = function (x, y) {
          if (appState.snapEnabled) {
            return { x: Math.round(x / g) * g, y: Math.round(y / g) * g };
          }
          return { x: x, y: y };
        };
        const sp = snap(pt.x, pt.y);
        if (handleIndex === 0) {
          el.setAttribute('x1', sp.x);
          el.setAttribute('y1', sp.y);
        } else {
          el.setAttribute('x2', sp.x);
          el.setAttribute('y2', sp.y);
        }
      }

      function createResizeLineCommand(el, oldX1, oldY1, oldX2, oldY2, newX1, newY1, newX2, newY2) {
        return {
          execute: function () {
            el.setAttribute('x1', newX1);
            el.setAttribute('y1', newY1);
            el.setAttribute('x2', newX2);
            el.setAttribute('y2', newY2);
          },
          undo: function () {
            el.setAttribute('x1', oldX1);
            el.setAttribute('y1', oldY1);
            el.setAttribute('x2', oldX2);
            el.setAttribute('y2', oldY2);
          },
        };
      }

      function createResizeRectCommand(el, oldX, oldY, oldW, oldH, newX, newY, newW, newH) {
        return {
          execute: function () {
            el.setAttribute('x', newX);
            el.setAttribute('y', newY);
            el.setAttribute('width', Math.max(1, newW));
            el.setAttribute('height', Math.max(1, newH));
          },
          undo: function () {
            el.setAttribute('x', oldX);
            el.setAttribute('y', oldY);
            el.setAttribute('width', oldW);
            el.setAttribute('height', oldH);
          },
        };
      }

      function createResizeCircleCommand(el, oldR, newR) {
        return {
          execute: function () {
            el.setAttribute('r', Math.max(1, newR));
          },
          undo: function () {
            el.setAttribute('r', oldR);
          },
        };
      }

      function updatePropertiesPanel() {
        const panel = document.getElementById('properties-content');
        const popup = document.getElementById('properties-panel');
        if (!panel || !popup) return;
        const ids = Array.from(appState.selection);
        if (ids.length !== 1) {
          popup.classList.remove('popup-visible');
          return;
        }
        popup.classList.add('popup-visible');
        const content = document.getElementById('svg-content');
        if (!content) return;
        const el = content.querySelector('#' + CSS.escape(ids[0]));
        if (!el) return;
        const tag = (el.tagName || '').toLowerCase();
        let html = '<div class="prop-title">Properties</div>';
        if (tag === 'circle' && el.classList && el.classList.contains('pin')) {
          const name = el.getAttribute('data-pin-name') || '';
          html += '<div class="prop-row"><label>Name</label><input type="text" data-attr="data-pin-name" value="' + escapeHtml(name) + '"></div>';
        }
        if (tag === 'line') {
          html += propRow('x1', el.getAttribute('x1'));
          html += propRow('y1', el.getAttribute('y1'));
          html += propRow('x2', el.getAttribute('x2'));
          html += propRow('y2', el.getAttribute('y2'));
        } else if (tag === 'rect') {
          html += propRow('x', el.getAttribute('x'));
          html += propRow('y', el.getAttribute('y'));
          html += propRow('width', el.getAttribute('width'));
          html += propRow('height', el.getAttribute('height'));
        } else if (tag === 'circle' || tag === 'ellipse') {
          html += propRow('cx', el.getAttribute('cx'));
          html += propRow('cy', el.getAttribute('cy'));
          html += propRow('r', el.getAttribute('r'));
          if (!(el.classList && el.classList.contains('pin'))) { /* pin name already above */ }
        } else if (tag === 'text') {
          html += propRow('x', el.getAttribute('x'));
          html += propRow('y', el.getAttribute('y'));
          html += propRow('font-size', el.getAttribute('font-size') || '12');
          html += '<div class="prop-row"><label>Text</label><input type="text" data-attr="textContent" value="' + escapeHtml((el.textContent || '').trim()) + '"></div>';
        }
        if (tag === 'rect' || tag === 'circle' || tag === 'ellipse' || tag === 'text') {
          html += propSection('Fill');
          html += propRowColor('fill', el.getAttribute('fill'));
          html += propRowOpacity('fill-opacity', el.getAttribute('fill-opacity'));
        }
        if (tag === 'line' || tag === 'rect' || tag === 'circle' || tag === 'ellipse' || tag === 'text') {
          html += propSection('Stroke');
          html += propRowColor('stroke', el.getAttribute('stroke'));
          html += propRowNum('stroke-width', el.getAttribute('stroke-width') || '1', 0, 1000, 0.5);
          html += propRowOpacity('stroke-opacity', el.getAttribute('stroke-opacity'));
        }
        panel.innerHTML = html;
        panel.querySelectorAll('input[data-attr]').forEach(function (input) {
          const attr = input.getAttribute('data-attr');
          function commitChange() {
            let newVal = input.value.trim();
            let oldVal = attr === 'textContent' ? (el.textContent || '').trim() : (el.getAttribute(attr) || '');
            if (attr === 'fill-opacity' || attr === 'stroke-opacity') {
              const pct = Math.max(0, Math.min(100, parseFloat(newVal) || 100));
              newVal = String(Math.round(pct) / 100);
              oldVal = el.getAttribute(attr) || '1';
            }
            if (String(newVal) === String(oldVal)) return;
            const cmd = attr === 'textContent'
              ? { execute: function () { el.textContent = newVal || ''; }, undo: function () { el.textContent = oldVal || ''; } }
              : createSetAttributeCommand(el, attr, oldVal, newVal);
            executeCommand(cmd);
            updatePropertiesPanel();
          }
          input.addEventListener('change', commitChange);
          if (input.type === 'range') {
            const span = input.closest('.prop-row').querySelector('.prop-opacity-value');
            input.addEventListener('input', function () {
              const pct = Math.max(0, Math.min(100, parseFloat(input.value) || 100));
              el.setAttribute(attr, String(pct / 100));
              if (span) span.textContent = Math.round(pct) + '%';
            });
          }
        });
        wireColorPickers(panel, el);
      }

      function propRow(label, val) {
        return '<div class="prop-row"><label>' + escapeHtml(label) + '</label><input type="text" data-attr="' + escapeHtml(label) + '" value="' + escapeHtml(val || '') + '"></div>';
      }

      function propRowNum(label, val, min, max, step) {
        const m = min != null ? ' min="' + min + '"' : '';
        const mx = max != null ? ' max="' + max + '"' : '';
        const s = step != null ? ' step="' + step + '"' : '';
        return '<div class="prop-row"><label>' + escapeHtml(label) + '</label><input type="number" data-attr="' + escapeHtml(label) + '" value="' + escapeHtml(val || '') + '"' + m + mx + s + '></div>';
      }

      function propSection(title) {
        return '<div class="prop-title" style="margin-top:10px">' + escapeHtml(title) + '</div>';
      }

      function propRowOpacity(attr, val) {
        const v = parseFloat(val);
        const pct = isNaN(v) ? 100 : Math.max(0, Math.min(100, Math.round((v * 100) / 10) * 10));
        return '<div class="prop-row"><label>' + escapeHtml(attr.replace(/-/g, ' ')) + '</label><input type="range" data-attr="' + escapeHtml(attr) + '" min="0" max="100" step="10" value="' + pct + '"><span class="prop-opacity-value">' + pct + '%</span></div>';
      }

      function propRowColor(attr, val) {
        const hex = parseColorToHex(val);
        const displayVal = val && val.trim() ? val : (hex || '#000000');
        const swatchBg = hex || '#333';
        return '<div class="prop-row"><label>' + escapeHtml(attr) + '</label><div class="color-picker-wrap"><button type="button" class="color-swatch" data-attr="' + escapeHtml(attr) + '" style="background:' + escapeHtml(swatchBg) + '"></button><input type="text" class="color-picker-hex" data-attr="' + escapeHtml(attr) + '" value="' + escapeHtml(displayVal) + '"></div></div>';
      }

      function parseColorToHex(val) {
        if (!val || !val.trim()) return null;
        const s = val.trim();
        if (/^#[0-9a-fA-F]{3}$/.test(s)) {
          const r = parseInt(s[1] + s[1], 16), g = parseInt(s[2] + s[2], 16), b = parseInt(s[3] + s[3], 16);
          return '#' + [r, g, b].map(function (x) { return x.toString(16).padStart(2, '0'); }).join('');
        }
        if (/^#[0-9a-fA-F]{6}$/.test(s)) return s;
        const m = s.match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/);
        if (m) return '#' + [parseInt(m[1], 10), parseInt(m[2], 10), parseInt(m[3], 10)].map(function (x) { return Math.max(0, Math.min(255, x)).toString(16).padStart(2, '0'); }).join('');
        return null;
      }

      function hexToHsv(hex) {
        const m = hex.match(/^#?([0-9a-fA-F]{2})([0-9a-fA-F]{2})([0-9a-fA-F]{2})$/);
        if (!m) return { h: 0, s: 0, v: 0 };
        let r = parseInt(m[1], 16) / 255, g = parseInt(m[2], 16) / 255, b = parseInt(m[3], 16) / 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h = 0, s = max === 0 ? 0 : (max - min) / max;
        const v = max;
        if (max !== min) {
          const d = max - min;
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        return { h: h * 360, s: s, v: v };
      }

      function hsvToHex(h, s, v) {
        h = (h % 360 + 360) % 360 / 360;
        let r, g, b;
        const i = Math.floor(h * 6);
        const f = h * 6 - i;
        const p = v * (1 - s);
        const q = v * (1 - f * s);
        const t = v * (1 - (1 - f) * s);
        switch (i % 6) {
          case 0: r = v; g = t; b = p; break;
          case 1: r = q; g = v; b = p; break;
          case 2: r = p; g = v; b = t; break;
          case 3: r = p; g = q; b = v; break;
          case 4: r = t; g = p; b = v; break;
          default: r = v; g = p; b = q;
        }
        return '#' + [r, g, b].map(function (x) { return Math.round(x * 255).toString(16).padStart(2, '0'); }).join('');
      }

      function wireColorPickers(panel, el) {
        const popover = document.getElementById('color-picker-popover');
        const svArea = document.getElementById('color-picker-sv');
        const hueBar = document.getElementById('color-picker-hue');
        if (!popover || !svArea || !hueBar) return;
        hueBar.style.background = 'linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00)';
        var pickState = null;
        function updateFromHsv(h, s, v) {
          const hex = hsvToHex(h, s, v);
          pickState.el.setAttribute(pickState.attr, hex);
          pickState.input.value = hex;
          pickState.swatch.style.background = hex;
        }
        function onHuePick(clientX) {
          if (!pickState) return;
          const r = hueBar.getBoundingClientRect();
          const x = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
          pickState.h = x * 360;
          svArea.style.background = 'linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, transparent), ' + hsvToHex(pickState.h, 1, 1);
          updateFromHsv(pickState.h, pickState.s, pickState.v);
        }
        function onSvPick(clientX, clientY) {
          if (!pickState) return;
          const r = svArea.getBoundingClientRect();
          const x = Math.max(0, Math.min(1, (clientX - r.left) / r.width));
          const y = Math.max(0, Math.min(1, (clientY - r.top) / r.height));
          pickState.s = x;
          pickState.v = 1 - y;
          updateFromHsv(pickState.h, pickState.s, pickState.v);
        }
        function startPick(attr, input, swatch, isHue, clientX, clientY) {
          const val = el.getAttribute(attr) || input.value || '#000000';
          const hex = parseColorToHex(val) || '#000000';
          const hsv = hexToHsv(hex);
          pickState = { el: el, attr: attr, input: input, swatch: swatch, oldVal: val, h: hsv.h, s: hsv.s, v: hsv.v };
          svArea.style.background = 'linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, transparent), ' + hsvToHex(pickState.h, 1, 1);
          if (isHue) onHuePick(clientX); else onSvPick(clientX, clientY);
        }
        function endPick() {
          if (!pickState) return;
          const newVal = pickState.el.getAttribute(pickState.attr);
          if (String(newVal) !== String(pickState.oldVal)) {
            executeCommand(createSetAttributeCommand(pickState.el, pickState.attr, pickState.oldVal, newVal));
            updatePropertiesPanel();
          }
          pickState = null;
          popover.classList.remove('visible');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onEnd);
        }
        function onMove(e) {
          if (!pickState) return;
          if (pickState.mode === 'hue') onHuePick(e.clientX);
          else onSvPick(e.clientX, e.clientY);
        }
        function onEnd() { endPick(); }
        panel.querySelectorAll('.color-swatch').forEach(function (swatch) {
          swatch.addEventListener('click', function (e) {
            e.preventDefault();
            const attr = swatch.getAttribute('data-attr');
            const wrap = swatch.closest('.color-picker-wrap');
            const input = wrap ? wrap.querySelector('.color-picker-hex') : null;
            if (!input) return;
            const r = swatch.getBoundingClientRect();
            popover.style.left = r.left + 'px';
            popover.style.top = (r.bottom + 4) + 'px';
            popover.classList.add('visible');
            pickState = { el: el, attr: attr, input: input, swatch: swatch, oldVal: el.getAttribute(attr) || input.value || '', mode: 'sv', h: 0, s: 0, v: 1 };
            const val = el.getAttribute(attr) || input.value || '#000000';
            const hex = parseColorToHex(val) || '#000000';
            const hsv = hexToHsv(hex);
            pickState.h = hsv.h;
            pickState.s = hsv.s;
            pickState.v = hsv.v;
            svArea.style.background = 'linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, transparent), ' + hsvToHex(pickState.h, 1, 1);
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
          });
        });
        svArea.addEventListener('mousedown', function (e) {
          if (!pickState || !popover.classList.contains('visible')) return;
          pickState.mode = 'sv';
          onSvPick(e.clientX, e.clientY);
        });
        hueBar.addEventListener('mousedown', function (e) {
          if (!pickState || !popover.classList.contains('visible')) return;
          pickState.mode = 'hue';
          onHuePick(e.clientX);
        });
      }

      function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s == null ? '' : String(s);
        return div.innerHTML;
      }

      function screenToSvg(clientX, clientY) {
        const svg = document.getElementById('svg-root');
        const viewport = document.getElementById('svg-viewport');
        if (!svg || !viewport) return { x: 0, y: 0 };
        const pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        const vp = pt.matrixTransform(viewport.getScreenCTM().inverse());
        return { x: vp.x, y: vp.y };
      }

      function getSelectableElements() {
        const content = document.getElementById('svg-content');
        if (!content) return [];
        return Array.from(content.children).filter(function (el) {
          return el.id !== 'grid-bg' && el.tagName && !/^defs|metadata|title|desc$/i.test(el.tagName);
        });
      }

      function getElementAtPoint(svgX, svgY) {
        const elements = getSelectableElements();
        for (let i = elements.length - 1; i >= 0; i--) {
          const el = elements[i];
          if (el.getBBox && isPointInElement(el, svgX, svgY)) return el;
        }
        return null;
      }

      function isPointInElement(el, x, y) {
        try {
          const bbox = el.getBBox();
          const pad = 4;
          return x >= bbox.x - pad && x <= bbox.x + bbox.width + pad &&
            y >= bbox.y - pad && y <= bbox.y + bbox.height + pad;
        } catch (e) {
          return false;
        }
      }

      function elementsInRect(x1, y1, x2, y2) {
        const left = Math.min(x1, x2);
        const right = Math.max(x1, x2);
        const top = Math.min(y1, y2);
        const bottom = Math.max(y1, y2);
        const result = [];
        getSelectableElements().forEach(function (el) {
          try {
            const b = el.getBBox();
            if (b.x + b.width >= left && b.x <= right && b.y + b.height >= top && b.y <= bottom) {
              result.push(el);
            }
          } catch (err) { /* skip */ }
        });
        return result;
      }

      function loadSvg() {
        fetch('/api/block_diagram_symbol', { cache: 'no-store' })
          .then(function (r) {
            if (!r.ok) throw new Error('Failed to load symbol');
            return r.text();
          })
          .then(function (svgText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(svgText, 'image/svg+xml');
            const svg = doc.documentElement;
            if (!svg || svg.nodeName !== 'svg') throw new Error('Invalid SVG');
            appState.svgDoc = doc;
            const content = document.getElementById('svg-content');
            content.innerHTML = '';
            while (svg.firstChild) {
              const child = svg.firstChild;
              content.appendChild(child);
            }
            getSelectableElements().forEach(function (el) { ensureElementId(el); });
            appState.selection.clear();
            stylePins(content);
            updateSelectionVisuals();
            commandHistory.undoStack.length = 0;
            commandHistory.redoStack.length = 0;
            fitView();
            sendStatus(false);
            sendCanUndoRedo();
          })
          .catch(function (err) {
            console.warn('Block diagram symbol load error:', err);
            sendStatus(false);
          });
      }

      function stylePins(container) {
        if (!container) return;
        container.querySelectorAll('circle.pin').forEach(function (el) {
          el.style.fill = 'var(--accent)';
        });
      }

      function getViewBox() {
        const content = document.getElementById('svg-content');
        if (!content || !content.firstElementChild) return { x: 0, y: 0, w: 100, h: 80 };
        const bbox = content.getBBox();
        const pad = 20;
        return {
          x: bbox.x - pad,
          y: bbox.y - pad,
          w: Math.max(bbox.width + pad * 2, 50),
          h: Math.max(bbox.height + pad * 2, 50),
        };
      }

      function applyTransform() {
        const viewport = document.getElementById('svg-viewport');
        if (!viewport) return;
        viewport.setAttribute('transform',
          'translate(' + appState.panX + ',' + appState.panY + ') scale(' + appState.scale + ')');
      }

      function fitView() {
        const viewport = document.getElementById('svg-viewport');
        if (!viewport) return;
        const vb = getViewBox();
        const s = Math.min(400 / vb.w, 400 / vb.h, 4);
        appState.scale = s;
        appState.panX = (400 - vb.w * s) / 2 - vb.x * s;
        appState.panY = (400 - vb.h * s) / 2 - vb.y * s;
        applyTransform();
      }

      function updatePanZoom(dx, dy, dScale, clientX, clientY) {
        const root = document.getElementById('svg-root');
        if (root) {
          const cw = root.clientWidth, ch = root.clientHeight;
          if (cw && ch) {
            appState.panX += dx * (400 / cw);
            appState.panY += dy * (400 / ch);
          }
        }
        if (dScale != null && dScale !== 0 && clientX != null && clientY != null) {
          const svg = document.getElementById('svg-root');
          if (svg) {
            const pt = svg.createSVGPoint();
            pt.x = clientX;
            pt.y = clientY;
            const cursorSvg = pt.matrixTransform(svg.getScreenCTM().inverse());
            const cx = cursorSvg.x;
            const cy = cursorSvg.y;
            const newScale = Math.max(0.1, Math.min(10, appState.scale * (1 + dScale)));
            appState.panX = cx - (cx - appState.panX) * (newScale / appState.scale);
            appState.panY = cy - (cy - appState.panY) * (newScale / appState.scale);
            appState.scale = newScale;
          } else {
            appState.scale = Math.max(0.1, Math.min(10, appState.scale * (1 + dScale)));
          }
        } else if (dScale != null && dScale !== 0) {
          appState.scale = Math.max(0.1, Math.min(10, appState.scale * (1 + dScale)));
        }
        applyTransform();
      }

      function initPanZoom() {
        const container = document.getElementById('svg-container');
        if (!container) return;
        let lastX, lastY, lastDist;
        container.addEventListener('mousedown', function (e) {
          if (e.button !== 1 && e.button !== 2) return;
          e.preventDefault();
          lastX = e.clientX;
          lastY = e.clientY;
          lastDist = undefined;
          container.classList.add('panning');
        });
        container.addEventListener('mousemove', function (e) {
          if (!container.classList.contains('panning')) return;
          if (lastDist != null) {
            const dist = Math.hypot(e.clientX - lastX, e.clientY - lastY);
            const dScale = (dist - lastDist) / 100;
            updatePanZoom(0, 0, dScale, lastX, lastY);
            lastDist = dist;
          } else {
            updatePanZoom(e.clientX - lastX, e.clientY - lastY, 0);
            lastX = e.clientX;
            lastY = e.clientY;
          }
        });
        container.addEventListener('mouseup', function () {
          container.classList.remove('panning');
        });
        container.addEventListener('mouseleave', function () {
          container.classList.remove('panning');
        });
        container.addEventListener('contextmenu', function (e) {
          e.preventDefault();
        });
        container.addEventListener('wheel', function (e) {
          e.preventDefault();
          const delta = e.deltaY > 0 ? -0.1 : 0.1;
          updatePanZoom(0, 0, delta, e.clientX, e.clientY);
        }, { passive: false });
      }

      function initSelectTool() {
        const container = document.getElementById('svg-container');
        const rubberBand = document.getElementById('rubber-band');
        if (!container || !rubberBand) return;
        let dragStart = null;
        let isDragging = false;
        let moveStartPositions = [];

        container.addEventListener('mousedown', function (e) {
          if (e.button !== 0 || appState.activeTool !== 'select') return;
          const pt = screenToSvg(e.clientX, e.clientY);
          const handleHit = getHandleAtPoint(pt.x, pt.y);
          if (handleHit) {
            dragStart = {
              type: 'resize',
              el: handleHit.el,
              handleIndex: handleHit.handleIndex,
              x: pt.x,
              y: pt.y,
              startAttrs: getElementGeomAttrs(handleHit.el),
            };
            return;
          }
          const hit = getElementAtPoint(pt.x, pt.y);
          if (hit) {
            if (e.shiftKey) {
              const id = ensureElementId(hit);
              if (appState.selection.has(id)) {
                appState.selection.delete(id);
              } else {
                appState.selection.add(id);
              }
            } else {
              appState.selection.clear();
              appState.selection.add(ensureElementId(hit));
            }
            updateSelectionVisuals();
            isDragging = true;
            var snapBeforePinDrag = null;
            if (hit.classList && hit.classList.contains('pin')) {
              snapBeforePinDrag = appState.snapEnabled;
              sendSnap(true);
            }
            dragStart = { x: pt.x, y: pt.y, hit: hit, snapBeforePinDrag: snapBeforePinDrag };
            moveStartPositions = Array.from(appState.selection).map(function (id) {
              const el = document.getElementById(id);
              if (!el) return null;
              const b = el.getBBox();
              return { id: id, x: b.x, y: b.y, el: el };
            }).filter(Boolean);
          } else {
            appState.selection.clear();
            updateSelectionVisuals();
            rubberBand.setAttribute('x', pt.x);
            rubberBand.setAttribute('y', pt.y);
            rubberBand.setAttribute('width', 0);
            rubberBand.setAttribute('height', 0);
            rubberBand.setAttribute('visibility', 'visible');
            dragStart = { x: pt.x, y: pt.y, hit: null };
          }
        });

        container.addEventListener('mousemove', function (e) {
          if (!dragStart) return;
          const pt = screenToSvg(e.clientX, e.clientY);
          if (dragStart.type === 'resize') {
            const el = dragStart.el;
            const tag = (el.tagName || '').toLowerCase();
            if (tag === 'rect') {
              applyRectResize(el, pt, dragStart.handleIndex, dragStart.startAttrs);
            } else if (tag === 'circle' || tag === 'ellipse') {
              applyCircleResize(el, pt, dragStart.handleIndex, dragStart.startAttrs);
            } else if (tag === 'line') {
              applyLineResize(el, pt, dragStart.handleIndex, dragStart.startAttrs);
            }
            updateResizeHandles();
            return;
          }
          if (dragStart.hit) {
            let dx = pt.x - dragStart.x;
            let dy = pt.y - dragStart.y;
            var hit = dragStart.hit;
            if (hit && hit.classList && hit.classList.contains('pin')) {
              var origCx = parseFloat(hit.getAttribute('cx') || 0) - (hit._lastDx || 0);
              var origCy = parseFloat(hit.getAttribute('cy') || 0) - (hit._lastDy || 0);
              var snapped = snapToGrid(origCx + dx, origCy + dy, true);
              dx = snapped.x - origCx;
              dy = snapped.y - origCy;
            } else if (hit && appState.snapEnabled) {
              var anchor = getElementAnchor(hit);
              var origX = anchor.x - (hit._lastDx || 0);
              var origY = anchor.y - (hit._lastDy || 0);
              var snapped = snapToGrid(origX + dx, origY + dy, false);
              dx = snapped.x - origX;
              dy = snapped.y - origY;
            }
            moveStartPositions.forEach(function (p) {
              if (p && p.el) translateElement(p.el, dx - (p.el._lastDx || 0), dy - (p.el._lastDy || 0));
              if (p && p.el) {
                p.el._lastDx = dx;
                p.el._lastDy = dy;
              }
            });
            updateResizeHandles();
          } else {
            const x = Math.min(dragStart.x, pt.x);
            const y = Math.min(dragStart.y, pt.y);
            const w = Math.abs(pt.x - dragStart.x);
            const h = Math.abs(pt.y - dragStart.y);
            rubberBand.setAttribute('x', x);
            rubberBand.setAttribute('y', y);
            rubberBand.setAttribute('width', w);
            rubberBand.setAttribute('height', h);
          }
        });

        container.addEventListener('mouseup', function (e) {
          if (e.button !== 0 || !dragStart) return;
          const pt = screenToSvg(e.clientX, e.clientY);
          if (dragStart.type === 'resize') {
            const el = dragStart.el;
            const tag = (el.tagName || '').toLowerCase();
            const start = dragStart.startAttrs;
            if (tag === 'rect') {
              applyRectResize(el, pt, dragStart.handleIndex, start);
              const nx = parseFloat(el.getAttribute('x') || 0);
              const ny = parseFloat(el.getAttribute('y') || 0);
              const nw = parseFloat(el.getAttribute('width') || 0);
              const nh = parseFloat(el.getAttribute('height') || 0);
              if (nx !== start.x || ny !== start.y || nw !== start.width || nh !== start.height) {
                executeCommand(createResizeRectCommand(el, start.x, start.y, start.width, start.height, nx, ny, nw, nh));
              }
            } else if (tag === 'circle' || tag === 'ellipse') {
              applyCircleResize(el, pt, dragStart.handleIndex, start);
              const nr = parseFloat(el.getAttribute('r') || 0);
              if (Math.abs(nr - start.r) > 0.5) {
                executeCommand(createResizeCircleCommand(el, start.r, nr));
              }
            } else if (tag === 'line') {
              applyLineResize(el, pt, dragStart.handleIndex, start);
              const nx1 = parseFloat(el.getAttribute('x1') || 0);
              const ny1 = parseFloat(el.getAttribute('y1') || 0);
              const nx2 = parseFloat(el.getAttribute('x2') || 0);
              const ny2 = parseFloat(el.getAttribute('y2') || 0);
              if (nx1 !== start.x1 || ny1 !== start.y1 || nx2 !== start.x2 || ny2 !== start.y2) {
                executeCommand(createResizeLineCommand(el, start.x1, start.y1, start.x2, start.y2, nx1, ny1, nx2, ny2));
              }
            }
            updateSelectionVisuals();
            dragStart = null;
            moveStartPositions = [];
            return;
          }
          if (dragStart.hit) {
            let dx = pt.x - dragStart.x;
            let dy = pt.y - dragStart.y;
            var hit = dragStart.hit;
            if (hit && hit.classList && hit.classList.contains('pin')) {
              var origCx = parseFloat(hit.getAttribute('cx') || 0) - (hit._lastDx || 0);
              var origCy = parseFloat(hit.getAttribute('cy') || 0) - (hit._lastDy || 0);
              var snapped = snapToGrid(origCx + dx, origCy + dy, true);
              dx = snapped.x - origCx;
              dy = snapped.y - origCy;
            } else if (hit && appState.snapEnabled) {
              var anchor = getElementAnchor(hit);
              var origX = anchor.x - (hit._lastDx || 0);
              var origY = anchor.y - (hit._lastDy || 0);
              var snapped = snapToGrid(origX + dx, origY + dy, false);
              dx = snapped.x - origX;
              dy = snapped.y - origY;
            }
            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
              const ids = Array.from(appState.selection);
              const cmd = createMoveElementsCommand(ids, dx, dy);
              moveStartPositions.forEach(function (p) {
                if (p && p.el) {
                  translateElement(p.el, -(p.el._lastDx || 0), -(p.el._lastDy || 0));
                  delete p.el._lastDx;
                  delete p.el._lastDy;
                }
              });
              executeCommand(cmd);
            }
          } else {
            rubberBand.setAttribute('visibility', 'hidden');
            const x1 = dragStart.x;
            const y1 = dragStart.y;
            const x2 = pt.x;
            const y2 = pt.y;
            if (Math.abs(x2 - x1) > 2 || Math.abs(y2 - y1) > 2) {
              const els = elementsInRect(x1, y1, x2, y2);
              els.forEach(function (el) {
                appState.selection.add(ensureElementId(el));
              });
              updateSelectionVisuals();
            }
          }
          if (dragStart && dragStart.snapBeforePinDrag != null) {
            sendSnap(dragStart.snapBeforePinDrag);
          }
          dragStart = null;
          isDragging = false;
          moveStartPositions = [];
        });

        document.addEventListener('keydown', function (e) {
          if (appState.activeTool !== 'select') return;
          if (e.key === 'Escape') {
            appState.selection.clear();
            updateSelectionVisuals();
            return;
          }
          if (e.key === 'Delete' || e.key === 'Backspace') {
            if (appState.selection.size === 0) return;
            e.preventDefault();
            const ids = Array.from(appState.selection);
            const content = document.getElementById('svg-content');
            const cmds = ids.map(function (id) {
              const el = content.querySelector('#' + CSS.escape(id));
              return el ? createDeleteElementCommand(el) : null;
            }).filter(Boolean);
            if (cmds.length) executeCommand(batch(cmds));
            return;
          }
        });
      }

      function initDrawTools() {
        const container = document.getElementById('svg-container');
        const rubberBand = document.getElementById('rubber-band');
        const previewLine = document.getElementById('preview-line');
        const previewCircle = document.getElementById('preview-circle');
        if (!container || !rubberBand) return;
        const drawTools = ['line', 'rect', 'circle', 'text', 'pin'];
        let drawDrag = { active: false, tool: null, x1: 0, y1: 0 };

        function hidePreviews() {
          rubberBand.setAttribute('visibility', 'hidden');
          if (previewLine) previewLine.setAttribute('visibility', 'hidden');
          if (previewCircle) previewCircle.setAttribute('visibility', 'hidden');
        }

        container.addEventListener('mousedown', function (e) {
          if (e.button !== 0 || !drawTools.includes(appState.activeTool)) return;
          const raw = screenToSvg(e.clientX, e.clientY);
          const pt = snapToGrid(raw.x, raw.y, appState.activeTool === 'pin');
          drawDrag = { active: true, tool: appState.activeTool, x1: pt.x, y1: pt.y };
        });

        container.addEventListener('mousemove', function (e) {
          if (!drawDrag.active) return;
          const pt = snapToGrid(screenToSvg(e.clientX, e.clientY).x, screenToSvg(e.clientX, e.clientY).y);
          if (drawDrag.tool === 'line') {
            if (previewLine) {
              previewLine.setAttribute('x1', drawDrag.x1);
              previewLine.setAttribute('y1', drawDrag.y1);
              previewLine.setAttribute('x2', pt.x);
              previewLine.setAttribute('y2', pt.y);
              previewLine.setAttribute('visibility', 'visible');
            }
          } else if (drawDrag.tool === 'rect') {
            const x = Math.min(drawDrag.x1, pt.x);
            const y = Math.min(drawDrag.y1, pt.y);
            const w = Math.abs(pt.x - drawDrag.x1);
            const h = Math.abs(pt.y - drawDrag.y1);
            rubberBand.setAttribute('x', x);
            rubberBand.setAttribute('y', y);
            rubberBand.setAttribute('width', w);
            rubberBand.setAttribute('height', h);
            rubberBand.setAttribute('visibility', 'visible');
          } else if (drawDrag.tool === 'circle') {
            const r = Math.hypot(pt.x - drawDrag.x1, pt.y - drawDrag.y1);
            if (previewCircle) {
              previewCircle.setAttribute('cx', drawDrag.x1);
              previewCircle.setAttribute('cy', drawDrag.y1);
              previewCircle.setAttribute('r', Math.max(0, r));
              previewCircle.setAttribute('visibility', 'visible');
            }
          } else if (drawDrag.tool === 'pin') {
            const pinPt = snapToGrid(pt.x, pt.y, true);
            if (previewCircle) {
              previewCircle.setAttribute('cx', pinPt.x);
              previewCircle.setAttribute('cy', pinPt.y);
              previewCircle.setAttribute('r', 5);
              previewCircle.setAttribute('visibility', 'visible');
            }
          }
        });

        container.addEventListener('mouseup', function (e) {
          if (e.button !== 0 || !drawDrag.active) return;
          const raw = screenToSvg(e.clientX, e.clientY);
          const pt = drawDrag.tool === 'pin'
            ? snapToGrid(raw.x, raw.y, true)
            : snapToGrid(raw.x, raw.y);
          const content = document.getElementById('svg-content');
          if (!content) { drawDrag = { active: false, tool: null }; return; }
          const dx = Math.abs(pt.x - drawDrag.x1);
          const dy = Math.abs(pt.y - drawDrag.y1);
          if (drawDrag.tool === 'line') {
            if (dx > 0.5 || dy > 0.5) {
              const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
              line.setAttribute('x1', drawDrag.x1);
              line.setAttribute('y1', drawDrag.y1);
              line.setAttribute('x2', pt.x);
              line.setAttribute('y2', pt.y);
              line.setAttribute('stroke', 'var(--text)');
              executeCommand(createAddElementCommand(line));
            }
          } else if (drawDrag.tool === 'rect') {
            if (dx > 0.5 || dy > 0.5) {
              const x = Math.min(drawDrag.x1, pt.x);
              const y = Math.min(drawDrag.y1, pt.y);
              const w = Math.abs(pt.x - drawDrag.x1);
              const h = Math.abs(pt.y - drawDrag.y1);
              const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
              rect.setAttribute('x', x);
              rect.setAttribute('y', y);
              rect.setAttribute('width', w);
              rect.setAttribute('height', h);
              rect.setAttribute('fill', 'none');
              rect.setAttribute('stroke', 'var(--text)');
              executeCommand(createAddElementCommand(rect));
            }
          } else if (drawDrag.tool === 'circle') {
            const r = Math.hypot(pt.x - drawDrag.x1, pt.y - drawDrag.y1);
            if (r > 0.5) {
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('cx', drawDrag.x1);
              circle.setAttribute('cy', drawDrag.y1);
              circle.setAttribute('r', r);
              circle.setAttribute('fill', 'none');
              circle.setAttribute('stroke', 'var(--text)');
              executeCommand(createAddElementCommand(circle));
            }
          } else if (drawDrag.tool === 'text') {
            const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            textEl.setAttribute('x', drawDrag.x1);
            textEl.setAttribute('y', drawDrag.y1);
            textEl.setAttribute('font-family', 'Segoe UI, sans-serif');
            textEl.setAttribute('fill', 'var(--text)');
            textEl.setAttribute('font-size', '12');
            textEl.textContent = 'Text';
            executeCommand(createAddElementCommand(textEl));
            startTextEdit(textEl);
          } else if (drawDrag.tool === 'pin') {
            const pinRadius = 5;
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', pt.x);
            circle.setAttribute('cy', pt.y);
            circle.setAttribute('r', pinRadius);
            circle.setAttribute('class', 'pin');
            const name = window.prompt('Pin name:', 'pin');
            if (name != null && name.trim()) {
              circle.setAttribute('data-pin-name', name.trim());
              executeCommand(createAddElementCommand(circle));
            }
          }
          hidePreviews();
          drawDrag = { active: false, tool: null };
        });

        function startTextEdit(textEl) {
          const svg = document.getElementById('svg-root');
          const viewport = document.getElementById('svg-viewport');
          if (!svg || !viewport) return;
          const bbox = textEl.getBBox();
          const ctms = [textEl, textEl.parentNode];
          let m = textEl.getCTM();
          if (!m) m = viewport.getScreenCTM();
          const fo = document.createElementNS('http://www.w3.org/2000/svg', 'foreignObject');
          fo.setAttribute('x', bbox.x - 2);
          fo.setAttribute('y', bbox.y - 2);
          fo.setAttribute('width', Math.max(80, bbox.width + 4));
          fo.setAttribute('height', bbox.height + 8);
          fo.setAttribute('style', 'overflow:visible');
          const div = document.createElement('div');
          div.contentEditable = true;
          div.style.cssText = 'font:12px sans-serif;color:var(--text);background:var(--bg2);border:1px solid var(--border);padding:2px 4px;min-width:60px;outline:none;';
          div.textContent = textEl.textContent || 'Text';
          fo.appendChild(div);
          viewport.appendChild(fo);
          div.focus();
          document.execCommand('selectAll', false, null);
          function finish() {
            textEl.textContent = (div.textContent || '').trim() || 'Text';
            fo.remove();
            div.removeEventListener('blur', finish);
            div.removeEventListener('keydown', onKey);
            sendStatus(true);
          }
          function onKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              div.blur();
            }
          }
          div.addEventListener('blur', finish);
          div.addEventListener('keydown', onKey);
        }

        document.addEventListener('dblclick', function (e) {
          if (appState.activeTool !== 'select') return;
          const content = document.getElementById('svg-content');
          if (!content) return;
          const pt = screenToSvg(e.clientX, e.clientY);
          const hit = getElementAtPoint(pt.x, pt.y);
          if (hit && (hit.tagName || '').toLowerCase() === 'text') {
            startTextEdit(hit);
          }
        });
      }

      function initKeyboardShortcuts() {
        document.addEventListener('keydown', function (e) {
          const target = e.target;
          if (target && (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA' || target.isContentEditable)) return;
          const ctrl = e.ctrlKey || e.metaKey;
          if (ctrl && e.key === 'z') {
            e.preventDefault();
            if (e.shiftKey) redo();
            else undo();
          } else if (ctrl && e.key === 'y') {
            e.preventDefault();
            redo();
          }
        });
      }

      if (embedded) {
        window.addEventListener('message', function (e) {
          if (!e.data || e.data.type !== 'harnice-graph-action') return;
          const a = e.data.action;
          if (a === 'setTool' && e.data.tool) {
            sendTool(e.data.tool);
          }
          if (a === 'toggleSnap') {
            sendSnap(!appState.snapEnabled);
          }
          if (a === 'fitView') {
            fitView();
          }
          if (a === 'undo') { undo(); }
          if (a === 'redo') { redo(); }
        });
      }

      sendTool('select');
      sendSnap(true);
      loadSvg();
      initPanZoom();
      initSelectTool();
      initDrawTools();
      initKeyboardShortcuts();
      window.addEventListener('resize', fitView);
    })();
  </script>
</body>
